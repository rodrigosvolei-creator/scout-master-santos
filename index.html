/* === FIX CRITICO: texto escuro em TODOS os cards de fundo branco do scout === */
/* A Fase D tornou --navy/--gray/--txl claras (pro fundo escuro do app), mas
   .sc-pcard / .sc-fund / .sc-fitem tem fundo BRANCO fixo -> texto sumia (claro
   sobre branco). Forca escuro no normal; branco no selecionado (.on tem fundo
   colorido). Cobre app principal (rs-shell) E pagina PG (usa-scout-wrap).
   VARREDURA COMPLETA do painel: numero, nome, fundamentos, feed de acoes. */
/* Cards de atleta */
body.rs-shell .app-content .sc-pcard .num,
.usa-scout-wrap .sc-pcard .num{color:#0f172a!important}
body.rs-shell .app-content .sc-pcard .nm,
.usa-scout-wrap .sc-pcard .nm{color:#475569!important}
body.rs-shell .app-content .sc-pcard.on .num,
.usa-scout-wrap .sc-pcard.on .num{color:#fff!important}
body.rs-shell .app-content .sc-pcard.on .nm,
.usa-scout-wrap .sc-pcard.on .nm{color:rgba(255,255,255,.9)!important}
/* Fundamentos (SAQUE, RECEPCAO, ATAQUE...) — eram invisiveis */
body.rs-shell .app-content .sc-fund,
.usa-scout-wrap .sc-fund{color:#0f172a!important}
body.rs-shell .app-content .sc-fund.on,
.usa-scout-wrap .sc-fund.on{color:#fff!important}
/* Feed de ultimas acoes (texto do fundamento + badge do set) */
body.rs-shell .app-content .sc-fitem .ffund,
.usa-scout-wrap .sc-fitem .ffund{color:#475569!important}
body.rs-shell .app-content .sc-fitem .fset,
.usa-scout-wrap .sc-fitem .fset{color:#475569!important}

/* Carimbo de build — discreto no canto inferior, nao atrapalha toque (pointer-events:none) */
#buildStamp{position:fixed;bottom:4px;right:6px;z-index:9998;font-size:9px;font-weight:700;letter-spacing:.3px;color:rgba(148,163,184,.55);background:rgba(10,15,28,.45);padding:2px 7px;border-radius:6px;pointer-events:none;font-family:'Inter',sans-serif;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
@media print{#buildStamp{display:none!important}}

/* === Escalacao: row com toggle visual proprio (sem checkbox nativo) === */
/* Funciona robusto no iOS — area de toque grande, estado obvio. */
.lu-row{display:flex;align-items:center;gap:12px;padding:12px 12px;border-bottom:1px solid var(--brd);cursor:pointer;-webkit-tap-highlight-color:transparent;background:transparent;transition:background .12s;user-select:none}
.lu-row:active{background:rgba(0,0,0,.04)}
.lu-row.on{background:rgba(22,163,74,.10)}
.lu-toggle{width:28px;height:28px;border-radius:8px;border:2px solid #cbd5e1;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.lu-toggle-check{color:#fff;font-size:16px;font-weight:900;line-height:1;opacity:0;transition:opacity .12s}
.lu-row.on .lu-toggle{background:#16a34a;border-color:#16a34a;box-shadow:0 2px 8px rgba(22,163,74,.4)}
.lu-row.on .lu-toggle .lu-toggle-check{opacity:1}
.lu-remove{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.35);color:#dc2626;width:32px;height:32px;border-radius:8px;font-weight:800;cursor:pointer;flex-shrink:0;font-size:15px;-webkit-tap-highlight-color:transparent}
.lu-remove:active{background:rgba(220,38,38,.25)}
/* Contraste do nome/posicao da row independente do tema */
.lu-row > div > div{color:#0f172a}
.lu-row .lu-nu{color:#0f172a;background:#fff;border:1px solid #cbd5e1;border-radius:8px}

/* === Overlay de PDF inline (sem iframe — print funciona via @media print) === */
.pdf-overlay{position:fixed;inset:0;background:#fff;z-index:99999;display:flex;flex-direction:column;overflow:hidden}
.pdf-overlay-bar{background:#0f172a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-shrink:0}
.pdf-overlay-back,.pdf-overlay-print{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:9px 14px;border-radius:9px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:.3px;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.pdf-overlay-back:active{background:rgba(255,255,255,.2)}
.pdf-overlay-print{background:#dc2626;border-color:#b91c1c;box-shadow:0 4px 14px rgba(220,38,38,.4)}
.pdf-overlay-print:active{background:#991b1b}
.pdf-overlay-title{flex:1;text-align:center;font-weight:700;font-size:14px;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fde68a}
.pdf-overlay-doc{flex:1;overflow:auto;background:#fff;padding:0;-webkit-overflow-scrolling:touch}
.pdf-overlay-doc table{max-width:100%}
@media(max-width:480px){
  .pdf-overlay-title{font-size:11px}
  .pdf-overlay-back,.pdf-overlay-print{padding:7px 10px;font-size:11px}
}
/* Print: esconde TUDO menos o conteudo do PDF. Funciona consistente em
   desktop, Android e iOS — sem depender de iframe.contentWindow.print(). */
body.pdf-overlay-open{overflow:hidden}
@media print{
  body > *:not(#pdfOverlay){display:none!important}
  body.pdf-overlay-open{overflow:visible}
  #pdfOverlay{position:static;height:auto;overflow:visible;display:block}
  #pdfOverlay .no-print{display:none!important}
  #pdfOverlay .pdf-overlay-doc{overflow:visible;padding:0}
  @page{margin:1cm}
}

/* === SCOUT — selecao de jogos em cards GAME DAY (tema escuro) === */
.sct-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:14px;color:var(--rs-gold)}
.sct-period{display:flex;gap:6px;margin-bottom:16px;background:rgba(255,255,255,.04);padding:4px;border-radius:12px;border:1px solid var(--rs-line)}
.sct-period button{flex:1;padding:9px 0;border:none;background:transparent;color:var(--rs-fg-mute);font-size:12px;font-weight:800;letter-spacing:.4px;cursor:pointer;font-family:inherit;border-radius:9px;transition:all .15s}
.sct-period button:hover{color:var(--rs-fg)}
.sct-period button.on{background:linear-gradient(135deg,var(--rs-gold),#f59e0b);color:#1a1410;box-shadow:0 4px 12px rgba(251,191,36,.3)}
.sct-live-banner{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,rgba(220,38,38,.2),rgba(220,38,38,.06));border:1.5px solid rgba(220,38,38,.45);border-radius:16px;padding:14px 16px;margin-bottom:16px;cursor:pointer;box-shadow:0 8px 24px rgba(220,38,38,.18);transition:transform .15s}
.sct-live-banner:hover{transform:translateY(-2px)}
.sct-live-pulse{width:12px;height:12px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:scPulse 1.4s infinite}
.sct-live-info{flex:1;min-width:0}
.sct-live-label{font-size:10px;font-weight:800;letter-spacing:2px;color:#fca5a5;margin-bottom:3px}
.sct-live-match{font-size:15px;font-weight:800;color:#fff;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sct-live-score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#fff;flex-shrink:0;letter-spacing:1px}
.sct-cards{display:flex;flex-direction:column;gap:12px}
.sct-card{display:flex;background:linear-gradient(155deg,#101a30 0%,#16223d 55%,#0d1525 100%);border:1px solid var(--rs-line);border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);transition:transform .18s,box-shadow .18s;position:relative}
.sct-card:hover{transform:translateY(-2px);box-shadow:0 16px 38px rgba(0,0,0,.5)}
.sct-card-stripe{flex-shrink:0;width:64px;background:linear-gradient(180deg,var(--scol,#2563eb),color-mix(in srgb,var(--scol,#2563eb) 55%,#0a0f1c));display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:14px 0;box-shadow:0 0 18px color-mix(in srgb,var(--scol,#2563eb) 30%,transparent)}
.sct-card-day{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:.95}
.sct-card-month{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.92;margin-top:2px}
.sct-card-body{flex:1;padding:14px 40px 14px 15px;min-width:0;position:relative}
.sct-card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.sct-card-logo{width:38px;height:38px;border-radius:9px;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.sct-card-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.sct-card-team{font-size:12.5px;font-weight:800;color:var(--scol,#60a5fa);line-height:1.15;text-transform:uppercase;letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sct-card-vs{font-size:14px;font-weight:600;color:var(--rs-fg-mute);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sct-card-vs b{color:#fff;font-weight:800}
.sct-card-meta{font-size:11px;color:var(--rs-fg-mute);margin-bottom:10px}
.sct-card-badges{display:flex;gap:6px;flex-wrap:wrap}
.sct-badge{font-size:10px;font-weight:800;letter-spacing:.4px;padding:4px 10px;border-radius:99px;text-transform:uppercase}
.sct-badge-when{background:rgba(251,191,36,.14);color:#fbbf24;border:1px solid rgba(251,191,36,.35)}

.sct-badge-when.tomorrow{background:rgba(37,99,235,.18);color:#93c5fd;border:1px solid rgba(37,99,235,.4)}

.sct-empty{background:linear-gradient(165deg,#101a30 0%,#16223d 55%,#0d1525 100%);border:1px solid var(--rs-line);border-radius:18px;padding:44px 24px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.4)}

@media(max-width:380px){
  .sct-card-stripe{width:54px}

  .sct-card-body{padding-right:34px}

/* ===== Landing / gate de acesso (tela de senha) — redesenho ===== */
.rsgate{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;color:#fff;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(1100px 560px at 50% -12%,rgba(216,27,121,.20),transparent 60%),radial-gradient(820px 480px at 108% 112%,rgba(139,47,160,.22),transparent 55%),radial-gradient(700px 420px at -8% 90%,rgba(37,99,235,.12),transparent 60%),linear-gradient(160deg,#0b1020,#0e1430 55%,#080c18)}
.rsgate-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0}
.rsgate-wm img{width:min(125vw,860px);max-width:none;opacity:.07;filter:saturate(1.25) drop-shadow(0 0 60px rgba(216,27,121,.25));transform:translateY(-3%)}
.rsgate-card{position:relative;z-index:1;width:100%;max-width:336px;text-align:center;padding:32px 26px 28px;border-radius:24px;
  background:rgba(15,22,40,.6);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
  border:1px solid rgba(255,255,255,.10);box-shadow:0 28px 80px rgba(0,0,0,.6),0 0 0 1px rgba(216,27,121,.10),inset 0 1px 0 rgba(255,255,255,.07);
  animation:rsgateIn .6s cubic-bezier(.2,.9,.2,1.12) both}
@keyframes rsgateIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.rsgate-logo{width:90px;height:90px;object-fit:contain;border-radius:22px;margin-bottom:11px;filter:drop-shadow(0 10px 30px rgba(216,27,121,.5));animation:rsgateFloat 5.5s ease-in-out infinite}
@keyframes rsgateFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.rsgate-title{font-family:'Bebas Neue',system-ui,sans-serif;font-size:42px;letter-spacing:4px;line-height:1;margin:0;
  background:linear-gradient(95deg,#ff5fa8,#d81b79 48%,#9b35b3);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#ff4d9d}
.rsgate-sub{font-size:13.5px;color:#9fb0cc;margin:9px auto 24px;max-width:282px;line-height:1.55}
.rsgate-input{display:block;width:100%;background:rgba(7,11,20,.72);border:1px solid rgba(255,255,255,.13);border-radius:13px;color:#fff;padding:14px 16px;font-size:15px;text-align:center;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:12px}
.rsgate-input::placeholder{color:#6b7a93}
.rsgate-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.26)}
.rsgate-btn{display:block;width:100%;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:800;letter-spacing:.5px;cursor:pointer;color:#fff;font-family:inherit;background:linear-gradient(95deg,#2563eb,#06b6d4);box-shadow:0 12px 30px rgba(37,99,235,.42);transition:transform .12s,box-shadow .2s,filter .2s}
.rsgate-btn:hover{transform:translateY(-1px);box-shadow:0 16px 38px rgba(37,99,235,.55);filter:brightness(1.06)}
.rsgate-btn:active{transform:translateY(0)}
.rsgate-err{color:#fca5a5;font-size:13px;margin-top:14px}
.rsgate-foot{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:11px;color:#516074;z-index:1;letter-spacing:1.5px;text-transform:uppercase}
@media(max-width:480px){.rsgate-title{font-size:42px}.rsgate-card{padding:34px 24px 28px}.rsgate-logo{width:92px;height:92px}}

function aFind(aid){
  if(!D||!D.athletes)return null;
  for(var i=0;i<D.athletes.length;i++){
    var a=D.athletes[i];
    if(a.aid===aid)return a;

  }

}
// Encontra número da camisa de um atleta num jogo específico
// Prioridade: g.lineup → a.last_nu_by_team[tid] → 0
function getNu(aid,gameId,teamId){
  // 1. Lineup do jogo
  if(gameId){
    var g=gF(gameId);
    if(g&&g.lineup){
      for(var i=0;i<g.lineup.length;i++){
        if(g.lineup[i].aid===aid)return g.lineup[i].nu;
      }
    }
  }
  // 2. Histórico do atleta na equipe
  var a=aFind(aid);
  if(a&&a.last_nu_by_team&&teamId&&a.last_nu_by_team[teamId]!==undefined){
    return a.last_nu_by_team[teamId];
  }
  // 3. Sem número conhecido
  return 0;
}
// Numero da camisa pra escalacao: o que veio na lineup; senao o ultimo cadastrado
// pra equipe (last_nu_by_team); senao null. Evita o "UNDEFINED" na quadra e
// "assume o numero definido" do atleta quando a lineup nasceu so com {aid}.
function _lineupNu(le, ath, tid){
  if(le && le.nu!=null && le.nu!=='') return le.nu;
  if(ath && ath.last_nu_by_team && tid && ath.last_nu_by_team[tid]!=null) return ath.last_nu_by_team[tid];
  return null;
}

// Compat: pFind retorna a "visão" de um atleta dentro de um contexto (jogo + equipe)
// Aceita: pFind(pid), pFind(pid, gameId), pFind(pid, gameId, preferTid)
function pFind(pid,gameId,preferTid){
  if(!D)return null;
  var a=aFind(pid);
  // Atleta ad-hoc (PG, fluxo isolado): nao esta em D.athletes, vive so na lineup
  // do jogo. Sintetiza um objeto minimo pra a action display funcionar.
  if(!a && gameId){
    var __g=gF(gameId);
    if(__g && __g.lineup){
      for(var __i=0;__i<__g.lineup.length;__i++){
        var __le=__g.lineup[__i];
        if(__le.aid===pid && __le.nm){
          var __team=__g.tid?tF(__g.tid):null;
          return {id:pid,aid:pid,nm:__le.nm,nu:__le.nu||0,po:__le.po||"",tid:__g.tid,tn:__team?__team.n:"",tc:__team?__team.c:"#64748b",adhoc:true};
        }
      }
    }
  }
  // Orfao (pid sem atleta cadastrado, ex: atleta removido do banco): NUNCA descarta —
  // devolve um stub rotulado pra a acao aparecer no relatorio (total bate) e o operador
  // poder corrigir via "Corrigir atleta". Antes retornava null e a acao sumia silenciosa.
  if(!a)return {id:pid,aid:pid,nm:"#"+pid+" (sem cadastro)",nu:null,po:"",tid:null,tn:"?",tc:"#94a3b8",orphan:true};
  // Determinar equipe
  var team=null;
  // Se gameId, usa o tid do jogo
  if(gameId){
    var g=gF(gameId);
    if(g&&g.tid){var t=tF(g.tid);if(t)team=t;}
  }
  // Se preferTid explícito, sobrescreve
  if(preferTid){
    var pt=tF(preferTid);
    if(pt)team=pt;
  }
  // Fallback: primeira equipe ativa onde está no roster
  if(!team)for(var ti=0;ti<D.teams.length;ti++){
    var tt=D.teams[ti];
    if(tt.archived)continue;
    if(!tt.roster)continue;
    for(var j=0;j<tt.roster.length;j++){
      if(tt.roster[j].aid===a.aid){team=tt;break;}
    }
    if(team)break;
  }
  // Fallback final: qualquer equipe
  if(!team)for(var ti=0;ti<D.teams.length;ti++){
    var tt=D.teams[ti];
    if(!tt.roster)continue;
    for(var j=0;j<tt.roster.length;j++){
      if(tt.roster[j].aid===a.aid){team=tt;break;}
    }
    if(team)break;
  }
  // Número: lineup do jogo OU last_nu_by_team
  var nu=getNu(a.aid,gameId,team?team.id:null);
  return {
    id:a.aid,
    aid:a.aid,
    nm:a.nm,
    nu:nu,
    po:a.po||"",
    gender:a.gender||"",
    tags:a.tags||[],
    tc:team?team.c:"#64748b",
    tn:team?team.n:"\u2014",
    tid:team?team.id:null
  };
}

function getFinGames(teamId){
  var out=[];if(!D||!D.games)return out;
  for(var i=0;i<D.games.length;i++){
    var g=D.games[i];
    if(!g.act||!g.act.length)continue;
    if(!torneioMode&&isSpecialGame(g))continue;
    if(g.st!=="live"&&g.st!=="done")continue;
    if(teamId&&teamId!=="all"&&g.tid!==teamId)continue;
    out.push(g);
  }
  return out;
}
// Coleta ações de um conjunto de jogos, opcionalmente filtrado por jogo específico
function collectActs(games,gameId){
  var acts=[];
  if(gameId&&gameId!=="all"){
    var g=gF(gameId);
    if(g&&g.act)acts=g.act.slice();
  }else{
    for(var i=0;i<games.length;i++){if(games[i].act)acts=acts.concat(games[i].act);}
  }
  return acts;
}

function rFilters(teamVar,gameVar,onTeamChange,onGameChange){
  var teams=D.teams||[];
  var allGames=getFinGames("all");
  var filteredGames=teamVar==="none"?[]:getFinGames(teamVar);
  var h='<div class="cd" style="padding:12px;margin-bottom:14px"><div class="rw">';
  h+='<div style="flex:1"><span class="lb">Equipe</span><select onchange="'+onTeamChange+'">';
  h+='<option value="none"'+(teamVar==="none"?" selected":"")+'>\u2014 Selecione \u2014</option>';
  h+='<option value="all"'+(teamVar==="all"?" selected":"")+'>Todas as equipes</option>';
  for(var i=0;i<teams.length;i++){
    // Esconde equipes arquivadas dos filtros de Stats
    if(teams[i].archived)continue;
    // Mostra equipe só se tem ao menos 1 jogo finalizado/ao vivo
    var hasGame=false;for(var j=0;j<allGames.length;j++)if(allGames[j].tid===teams[i].id){hasGame=true;break;}
    if(!hasGame&&teams[i].id!==teamVar)continue;
    h+='<option value="'+teams[i].id+'"'+(teamVar===teams[i].id?" selected":"")+'>'+esc(teams[i].n)+'</option>';
  }
  h+='</select></div>';
  h+='<div style="flex:1"><span class="lb">Jogo</span><select onchange="'+onGameChange+'"'+(teamVar==="none"?" disabled":"")+'>';
  h+='<option value="none"'+(gameVar==="none"?" selected":"")+'>\u2014 Selecione \u2014</option>';
  if(teamVar!=="none")h+='<option value="all"'+(gameVar==="all"?" selected":"")+'>Todos os jogos</option>';
  for(var i=0;i<filteredGames.length;i++){
    var fg=filteredGames[i];
    h+='<option value="'+fg.id+'"'+(gameVar===fg.id?" selected":"")+'>vs '+esc(fg.opp)+(fg.dt?" \u00b7 "+fD(fg.dt):"")+'</option>';
  }
  h+='</select></div></div></div>';
  return h;
}

// Escape de HTML para prevenir XSS em dados vindos do Firebase / inputs
function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
// Toast simples para feedback não-modal de validação
function toast(msg,type){
  var t=document.getElementById("rsToast");if(t)t.remove();
  t=document.createElement("div");t.id="rsToast";
  var bg=type==="error"?"#dc2626":type==="ok"?"#059669":"#334155";
  t.style.cssText="position:fixed;left:50%;top:24px;transform:translateX(-50%);background:"+bg+";color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:90%;text-align:center;animation:rsToastIn .25s ease";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){if(t&&t.parentNode){t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(function(){if(t.parentNode)t.remove();},300);}},2800);
}

// Modal de confirmação genérico — substitui confirm() nativo
// opts: {title, body, confirmLabel, confirmStyle, cancelLabel, onConfirm, onCancel}
function confirmModal(opts){
  var existing=document.getElementById("rsConfirm");if(existing)existing.remove();
  var cs=opts.confirmStyle||"bp";
  var cancel=opts.cancelLabel||"Cancelar";
  var confirm=opts.confirmLabel||"Confirmar";
  var hideCancel=!!opts.hideCancel;
  var m='<div class="admin-modal" onclick="closeConfirmModal()"><div class="admin-box" onclick="event.stopPropagation()" style="text-align:left;max-width:380px">';
  m+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:var(--navy);margin-bottom:14px;text-align:center">'+esc(opts.title||"Confirmar")+'</div>';
  m+='<div style="font-size:14px;line-height:1.5;color:var(--ink);margin-bottom:18px">'+(opts.body||"")+'</div>';
  m+='<div style="display:flex;gap:8px">';
  if(!hideCancel)m+='<button class="bt bg" style="flex:1" onclick="closeConfirmModal()">'+cancel+'</button>';
  m+='<button class="bt '+cs+'" style="flex:1" id="rsConfirmOk">'+confirm+'</button>';
  m+='</div>';
  m+='</div></div>';
  var d=document.createElement("div");d.id="rsConfirm";d.innerHTML=m;document.body.appendChild(d);
  document.getElementById("rsConfirmOk").onclick=function(){
    closeConfirmModal();
    if(opts.onConfirm)try{opts.onConfirm();}catch(e){console.warn(e);toast("Erro: "+e.message,"error");}
  };
  // Cancel handler do clique no backdrop também chama onCancel se houver
  if(opts.onCancel){
    var bg=d.querySelector(".admin-modal");
    bg.addEventListener("click",function(e){if(e.target===bg){try{opts.onCancel();}catch(_){}}});
  }
}

// --- Filtro "special": torneios acessiveis APENAS por deep-link ---
// USA (?torneio=usa) e PG (?torneio=pg) nao aparecem em Scout, Torneios,
// Agenda, Stats e Landing. Em torneioMode (tela isolada) o filtro eh desativado.
function isSpecialTour(t){
  if(!t) return false;
  if(t.special===true) return true;
  if(typeof TOURNEY_ACCESS!=='undefined'){
    for(var __k in TOURNEY_ACCESS){
      if(TOURNEY_ACCESS[__k] && TOURNEY_ACCESS[__k].torId===t.id) return true;
    }
  }
  return false;
}
function isSpecialGame(g){
  if(!g||!g.torId) return false;
  var t=(typeof tFnd==='function')?tFnd(g.torId):null;
  if(t && isSpecialTour(t)) return true;
  if(typeof TOURNEY_ACCESS!=='undefined'){
    for(var __k in TOURNEY_ACCESS){
      if(TOURNEY_ACCESS[__k] && TOURNEY_ACCESS[__k].torId===g.torId) return true;
    }
  }
  return false;
}

// Equipes "special": vinculadas a um TOURNEY_ACCESS standalone (ex: PRAIA GRANDE
// no PG). Nao devem aparecer no signup do RS pra evitar mistura. Mesma logica
// do isSpecialTour/Game — em torneioMode o filtro fica desligado.
function isSpecialTeam(tid){
  if(!tid || typeof TOURNEY_ACCESS==='undefined') return false;
  for(var __k in TOURNEY_ACCESS){
    var __a=TOURNEY_ACCESS[__k];
    if(__a && __a.standalone && __a.teamId===tid) return true;
    if(__a && __a.teamsVar && typeof window!=="undefined" && window[__a.teamsVar]){
      var __dz=window[__a.teamsVar];
      for(var __i=0;__i<__dz.length;__i++){ if(__dz[__i].id===tid) return true; }
    }
  }
  return false;
}
function getPublicTeams(){
  var arr=(D&&D.teams)?D.teams:[];
  if(torneioMode) return arr.slice();
  return arr.filter(function(t){return !isSpecialTeam(t.id);});

// --- Helpers de data pra janela da agenda do Scout ---
function scoutDaysUntil(dtStr){
  if(!dtStr) return null;
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var d=new Date(dtStr+"T12:00:00"); d.setHours(0,0,0,0);
  return Math.round((d-hoje)/86400000);
}
function scoutWhenBadge(diff){
  if(diff===0) return {txt:"HOJE",cls:"today"};
  if(diff===1) return {txt:"AMANH\u00c3",cls:"tomorrow"};
  return {txt:"EM "+diff+" DIAS",cls:""};
}

// --- Tela de selecao de jogo do scout (cards GAME DAY no tema escuro) ---
function renderScoutSelection(){
  var pub=getPublicGames();
  // Em torneioMode (USA/PG/minis) a selecao so mostra jogos do torneio ativo —
  // evita vazar jogos do app principal na pagina isolada.
  if(torneioMode && torneioId) pub=pub.filter(function(g){return g.torId===torneioId;});
  var liveGames=pub.filter(function(g){return g.st==="live";});
  var N=scoutPeriod;
  var upcoming=pub.filter(function(g){
    if(g.st==="done"||g.st==="live") return false;       // done e live fora da lista
    var diff=scoutDaysUntil(g.dt);
    return diff!==null && diff>=0 && diff<=N;             // so dt>=hoje e dt<=hoje+N
  });
  upcoming.sort(function(a,b){
    var da=(a.dt||"")+(a.tm||""), db=(b.dt||"")+(b.tm||"");
    return da<db?-1:da>db?1:0;
  });
  var h='<div class="sct-title">\uD83D\uDCCB PR\u00d3XIMOS JOGOS</div>';
  // filtro de periodo
  h+='<div class="sct-period">';
  h+='<button class="'+(scoutPeriod===7?"on":"")+'" onclick="setScoutPeriod(7)">7 DIAS</button>';
  h+='<button class="'+(scoutPeriod===14?"on":"")+'" onclick="setScoutPeriod(14)">2 SEMANAS</button>';
  h+='<button class="'+(scoutPeriod===30?"on":"")+'" onclick="setScoutPeriod(30)">M\u00caS</button>';
  h+='</div>';
  // banner AO VIVO AGORA
  for(var i=0;i<liveGames.length;i++) h+=renderScoutLiveBanner(liveGames[i]);
  // cards
  if(!upcoming.length){
    var per=scoutPeriod===7?"os pr\u00f3ximos 7 dias":scoutPeriod===14?"as pr\u00f3ximas 2 semanas":"o pr\u00f3ximo m\u00eas";
    h+='<div class="sct-empty"><div class="sct-empty-icon">\uD83D\uDCC5</div><div class="sct-empty-title">Nenhum jogo no per\u00edodo</div><div class="sct-empty-sub">N\u00e3o h\u00e1 jogos agendados para '+per+'.<br>Ajuste o filtro acima ou cadastre jogos em <b>Config \u2192 Jogos</b>.</div></div>';
  }else{
    h+='<div class="sct-cards">';
    for(var i=0;i<upcoming.length;i++) h+=renderScoutGameCard(upcoming[i]);
    h+='</div>';
  }
  return h;
}

function renderScoutLiveBanner(g){
  var t=tF(g.tid);

  if(g.ss&&g.ss.length){ var cur=g.ss[g.ss.length-1]; scoreLabel=cur.u+"-"+cur.t; }
  var h='<div class="sct-live-banner" onclick="openG(\''+g.id+'\')">';
  h+='<div class="sct-live-pulse"></div>';
  h+='<div class="sct-live-info"><div class="sct-live-label">\u25CF AO VIVO AGORA</div>';

  h+='<div style="color:#fca5a5;font-size:18px;flex-shrink:0">\u2192</div>';
  h+='</div>';

}

function renderScoutGameCard(g){
  var t=tF(g.tid);
  var tc=t?t.c:"#2563eb";
  var parts=(g.dt||"").split("-");
  var day=parts[2]?parseInt(parts[2],10):"--";
  var meses=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  var month=parts[1]?meses[parseInt(parts[1],10)-1]:"";
  var diff=scoutDaysUntil(g.dt);
  var when=diff!==null?scoutWhenBadge(diff):null;
  var hasLineup=!!(g.lineup && g.lineup.length);
  // logo do time (upload do time > url fixa > fallback RS)
  var logoSrc=LR;
  if(t){ if(t.logoData) logoSrc=t.logoData; else if(t.logo && typeof t.logo==='string' && t.logo.indexOf('data:')===0) logoSrc=t.logo; }
  var h='<div class="sct-card" style="--scol:'+tc+'" onclick="openG(\''+g.id+'\')">';
  h+='<div class="sct-card-stripe"><div class="sct-card-day">'+day+'</div><div class="sct-card-month">'+month+'</div></div>';
  h+='<div class="sct-card-body">';
  h+='<div class="sct-card-top"><div class="sct-card-logo"><img src="'+logoSrc+'" alt=""></div>';
  h+='<div style="flex:1;min-width:0"><div class="sct-card-team">'+esc(t?t.n:"")+'</div><div class="sct-card-vs">vs <b>'+esc(g.opp||"")+'</b></div></div></div>';
  var meta=[];
  if(g.tm) meta.push("\uD83D\uDD52 "+g.tm.substring(0,5));
  if(g.loc) meta.push("\uD83D\uDCCD "+esc(g.loc));
  if(g.phase) meta.push(esc(g.phase));
  if(meta.length) h+='<div class="sct-card-meta">'+meta.join(" \u00b7 ")+'</div>';
  h+='<div class="sct-card-badges">';
  if(when) h+='<span class="sct-badge sct-badge-when '+when.cls+'">'+when.txt+'</span>';
  if(g.st==="live") h+='<span class="sct-badge sct-badge-live">\u25CF AO VIVO</span>';
  h+='<span class="sct-badge '+(hasLineup?"sct-badge-ok":"sct-badge-no")+'">'+(hasLineup?"\u2713 ESCALADO":"SEM ESCALA\u00c7\u00c3O")+'</span>';
  h+='</div></div>';
  h+='<div class="sct-card-arrow">\u2192</div>';
  h+='</div>';
  return h;
}

// Monta o lineup default: acha cada atleta por nome (cria se nao existir) e retorna [{aid,nu}]
function buildUsaLineup(rosterOverride){
  // Fase PG: aceita roster custom. Sem arg, mantem o padrao USA (backward compat).
  var roster = rosterOverride && rosterOverride.length ? rosterOverride : USA_ROSTER;
  if(!D.athletes)D.athletes=[];
  var lineup=[];
  for(var i=0;i<roster.length;i++){
    var r=roster[i];
    var ath=null;
    for(var j=0;j<D.athletes.length;j++){
      var a=D.athletes[j];
      if(a&&a.nm&&a.nm.trim().toLowerCase()===r.nm.toLowerCase()){ath=a;break;}
    }
    if(!ath){
      // atleta nao existe no banco — cria
      ath={aid:uid("a_"),nm:r.nm,po:r.po,gender:(r.gender||"M"),legacy_ids:[],tags:[]};
      D.athletes.push(ath);
    }else if(!ath.po){
      // atleta existe mas sem posicao — completa
      ath.po=r.po;
    }
    lineup.push({aid:ath.aid,nu:r.nu});
  }
  return lineup;
}
// Escala a partir do roster da EQUIPE (tid). Substitui o buildUsaLineup() no
// fluxo gameday dos torneios comuns — nunca mais o USA_ROSTER masculino.
// Sem roster na equipe, retorna [] e o scout mostra "Escalar antes de iniciar".
function lineupFromTeam(tid){
  var t=(typeof tF==='function')?tF(tid):null;
  var L=[];
  if(t&&t.roster)for(var i=0;i<t.roster.length;i++){
    var e=t.roster[i];
    if(!e||!e.aid)continue;
    // Assume os dados JA definidos do atleta: numero da camisa salvo pra esta
    // equipe (last_nu_by_team[tid]); cai pro nu do roster ou null se nao houver.
    var ath=(typeof aFind==='function')?aFind(e.aid):null;
    var nu=(e.nu!=null)?e.nu
          :((ath&&ath.last_nu_by_team&&ath.last_nu_by_team[tid]!==undefined)?ath.last_nu_by_team[tid]:null);
    L.push({aid:e.aid,nu:nu});
  }
  return L;
}

function getBrand(token){
  var access=(token && TOURNEY_ACCESS[token]) || {};
  // 1. Logo do constante (placeholder PG_LOGO, etc)
  var logo=LR;
  if(access.logoVar && typeof window!=='undefined' && typeof window[access.logoVar]!=='undefined'){
    logo=window[access.logoVar];
  }
  // 2. Tentar pegar o torneio do banco — se admin ja personalizou, prevalece.
  var tor=null;
  if(access.torId && typeof tFnd==='function'){
    try{ tor=tFnd(access.torId); }catch(e){}
  }
  if(tor && tor.brandLogoData) logo=tor.brandLogoData;
  return {
    logo: logo,
    flag: (tor&&tor.brandFlag) || access.brandFlag || '🏆 USA TOURNAMENT',
    sub: (tor&&tor.brandSub) || access.brandSub || 'RS-VOLEIBOL · ADULTO MASCULINO',
    title: (tor&&tor.n) || access.brandTitle || '2026 ADULT OPEN CHAMPIONSHIP',
    cat: (tor&&tor.brandCat) || access.brandCat || 'ADULTO<br>MASCULINO',
    team: (tor&&tor.brandTeam) || access.brandTeam || 'RS VOLEIBOL',
    color: (tor&&tor.color) || (tor&&tor.brandColor) || access.brandColor || '#1d7a3a',
    teamLogoCls: access.teamLogoCls || 'usa-rs-logo'
  };
}

// Detectar URL params no boot
(function detectUrlParams(){
  try{
    var url=new URL(window.location.href);
    var cadastro=url.searchParams.get("cadastro");
    if(cadastro){
      signupMode=true;
      signupToken=cadastro;
      showLanding=false;
    }
    // Deep-link ?torneio=<token>.
    // - access.standalone=true (PG): pagina isolada com senha (modo legado).
    // - sem standalone (USA): redireciona pro fluxo unificado (B1.2).
    var torneio=url.searchParams.get("torneio");
    if(torneio&&TOURNEY_ACCESS[torneio]){
      var __access=TOURNEY_ACCESS[torneio];
      if(__access.standalone){
        torneioMode=true;
        torneioToken=torneio;
        torneioId=__access.torId;
        showLanding=false;
        if(__access.openAccess){ torneioUnlocked=true; torneioAdminUnlocked=true; }
        // Cache de senha em sessionStorage — evita pedir senha em cada reload.
        // Standalone (PG): a senha de acesso ja destrava admin junto.
        try{
          if(window.sessionStorage && window.sessionStorage.getItem("tourney_"+torneio)==="1"){
            torneioUnlocked=true;
            if(__access.standalone) torneioAdminUnlocked=true;
          }
        }catch(e){}
      }else{
        selTor=__access.torId;
        tab="torneios";
        showLanding=false;
      }
    }
    // Modo TELÃO: ?telao=<token> — tela cheia que segue o jogo ao vivo do torneio.
    var telao=url.searchParams.get("telao");
    if(telao){
      telaoMode=true; telaoToken=telao; showLanding=false;
      var __t=TOURNEY_ACCESS[telao];
      if(__t && __t.torId) telaoTorId=__t.torId;
    }
    // Permite pular landing com ?app=1
    if(url.searchParams.get("app")==="1"){
      showLanding=false;
    }
  }catch(e){}
})();

// === LEITURA: separada por filho (compatível com Security Rules granulares) ===
// Cada filho tem .read próprio. Lemos paralelamente e montamos D.
var _dataLoaded = {teams:false, games:false, tournaments:false, athletes:false, invites:false};
function _checkAllLoaded(){
  if(_dataLoaded.teams && _dataLoaded.games && _dataLoaded.tournaments && _dataLoaded.athletes && _dataLoaded.invites){
    if(appStarted) render();
  }
}
function _initD(){
  if(!D) D = {tournaments:[], games:[], teams:[], athletes:[], users:{}, invites:{}};
  if(!D.tournaments) D.tournaments=[];
  if(!D.games) D.games=[];
  if(!D.teams) D.teams=[];
  if(!D.athletes) D.athletes=[];
  if(!D.users) D.users={};
  if(!D.invites) D.invites={};
}
// Seguranca XSS: o RTDB e ABERTO p/ escrita — um "logo" malicioso (ex: x" onerror=...)
// gravado por REST cairia cru dentro de src="..." e executaria JS no telao/cards/mesa.
// Sanitiza na ENTRADA: so aceita data:image (sem svg, que pode conter script).
var _OK_LOGO=/^data:image\/(png|jpe?g|webp|gif);base64,/i;
function clnLogo(s){ return (typeof s==="string" && _OK_LOGO.test(s)) ? s : null; }
_initD();

// === ESCRITA: granular por filho COM PROTEÇÃO contra estado parcial ===
// CRÍTICO: save() só escreve se TODOS os filhos foram carregados.
// Caso contrário, podemos sobrescrever o banco com versão incompleta.
function save(){
  if(!D) return;
  if(!currentUser)return false;
  // GUARD: não escrever se algum dos filhos ainda não foi carregado
  if(!_dataLoaded.teams || !_dataLoaded.games || !_dataLoaded.tournaments || !_dataLoaded.athletes){
    console.error("[save] BLOQUEADO: dados ainda nao terminaram de carregar. teams="+_dataLoaded.teams+" games="+_dataLoaded.games+" tournaments="+_dataLoaded.tournaments+" athletes="+_dataLoaded.athletes);
    if(typeof toast==="function")toast("Aguarde os dados terminarem de carregar antes de salvar","error");
    return false;
  }
  // GUARD: não escrever arrays vazios sem motivo
  if(D.games && !Array.isArray(D.games)){console.error("[save] D.games nao e array");return false;}
  if(D.teams && !Array.isArray(D.teams)){console.error("[save] D.teams nao e array");return false;}
  if(D.athletes && !Array.isArray(D.athletes)){console.error("[save] D.athletes nao e array");return false;}
  // Escrever cada filho. .catch silencia (permissão negada por rule é OK pra papéis sem acesso).
  if(D.teams) db.ref("torneio-master-santos/teams").set(D.teams).catch(function(e){console.warn("save teams:",e.code||e.message);});
  if(D.games) db.ref("torneio-master-santos/games").set(D.games).catch(function(e){console.warn("save games:",e.code||e.message);});
  if(D.tournaments) db.ref("torneio-master-santos/tournaments").set(D.tournaments).catch(function(e){console.warn("save tournaments:",e.code||e.message);});
  if(D.athletes) db.ref("torneio-master-santos/athletes").set(D.athletes).catch(function(e){console.warn("save athletes:",e.code||e.message);});
  return true;
}
// Salvar apenas UM jogo (uso recomendado em vez de sobrescrever array todo)
function saveGame(g){
  if(!currentUser)return Promise.reject(new Error("login_necessario"));
  if(!g||!g.id||!D.games)return Promise.reject(new Error("Jogo invalido"));
  var idx=-1;for(var i=0;i<D.games.length;i++)if(D.games[i].id===g.id){idx=i;break;}
  if(idx<0)return Promise.reject(new Error("Jogo nao existe no estado local"));
  return db.ref("torneio-master-santos/games/"+idx).set(g);
}
// Salvar apenas UMA equipe
function saveTeam(t){
  if(!currentUser)return Promise.reject(new Error("login_necessario"));
  if(!t||!t.id||!D.teams)return Promise.reject(new Error("Equipe invalida"));
  var idx=-1;for(var i=0;i<D.teams.length;i++)if(D.teams[i].id===t.id){idx=i;break;}
  if(idx<0)return Promise.reject(new Error("Equipe nao existe no estado local"));
  return db.ref("torneio-master-santos/teams/"+idx).set(t);
}
// Salvar apenas UMA atleta
function saveAthlete(a){
  if(!currentUser)return Promise.reject(new Error("login_necessario"));
  if(!a||!a.aid||!D.athletes)return Promise.reject(new Error("Atleta invalida"));
  var idx=-1;for(var i=0;i<D.athletes.length;i++)if(D.athletes[i].aid===a.aid){idx=i;break;}
  if(idx<0)return Promise.reject(new Error("Atleta nao existe no estado local"));
  return db.ref("torneio-master-santos/athletes/"+idx).set(a);
}
// Salvar uma chave inteira (uso restrito, evitar)
function saveChild(key, value){
  if(!currentUser)return Promise.reject(new Error("login_necessario"));
  if(!_dataLoaded.teams || !_dataLoaded.games || !_dataLoaded.tournaments || !_dataLoaded.athletes){

// Helpers de papéis (roles é array)
function userHasRole(role){
  if(!userProfile)return false;
  var roles=userProfile.roles||(userProfile.role?[userProfile.role]:[]);
  return roles.indexOf(role)>=0;
}
function updateRoleFlags(){
  isAdmin=userHasRole("admin");
  isCoord=userHasRole("coordenador")||isAdmin;
  isScouter=userHasRole("scouter")||isCoord;
  isAtleta=userHasRole("atleta");
}
// Retorna ids de equipes que o usuário atual pode ver dados detalhados (Stats/Destaques/PDF)
// Coord/Scouter/Admin: todas
// Atleta: só equipes em que ela está vinculada
// Visitor: nenhuma
function visibleTeamIds(){
  if(isCoord||isScouter)return null; // null = todas
  if(isAtleta&&userProfile&&userProfile.athleteId){
    var aid=userProfile.athleteId;
    var ids=[];
    if(D.teams)for(var i=0;i<D.teams.length;i++){
      var t=D.teams[i];
      if(t.roster)for(var j=0;j<t.roster.length;j++){
        if(t.roster[j].aid===aid){ids.push(t.id);break;}
      }
    }
    return ids;
  }
  return []; // visitor sem vínculo
}
function canSeeTeamStats(tid){
  var v=visibleTeamIds();
  if(v===null)return true;
  return v.indexOf(tid)>=0;
}

// === AUTH: detecta login/logout em tempo real ===
auth.onAuthStateChanged(function(user){
  currentUser=user;
  if(!user){
    userProfile=null;
    updateRoleFlags();
    if(tab==="config")tab="torneios";
    render();
    return;
  }
  // Usuário logado — buscar/criar profile no banco
  var uid=user.uid;
  db.ref("torneio-master-santos/users/"+uid).once("value").then(function(snap){
    var prof=snap.val();
    if(!prof){
      // Primeira vez — criar profile básico
      // Regra: se email == ADMIN_EMAIL, vira admin. Senão, visitor (até completar cadastro).
      var emailLc=(user.email||"").toLowerCase();
      var preset=PRESET_ROLES[emailLc];
      var roles;
      if(emailLc===ADMIN_EMAIL.toLowerCase()) roles=["admin"];
      else if(preset&&preset.roles&&preset.roles.length) roles=preset.roles.slice();
      else roles=["visitor"];
      prof={
        uid:uid,
        email:user.email||"",
        displayName:(preset&&preset.displayName)||user.displayName||(user.email?user.email.split("@")[0]:"Usu\u00e1rio"),
        photoURL:user.photoURL||"",
        roles:roles,
        athleteId:null,
        apelido:"",
        createdAt:Date.now()
      };
      db.ref("torneio-master-santos/users/"+uid).set(prof);
    }else{
      // Migrar formato antigo (role string) para novo (roles array)
      if(prof.role&&!prof.roles){
        prof.roles=[prof.role];
        db.ref("torneio-master-santos/users/"+uid+"/roles").set(prof.roles);
      }
    }
    // Pre-autorizacao por email: garante o papel mesmo se o profile ja existia
    // (so ADICIONA, nunca rebaixa; remove visitor ao ganhar papel real). Idempotente.
    try{
      var _emailLc2=(user.email||"").toLowerCase();
      var _preset2=PRESET_ROLES[_emailLc2];
      if(_preset2&&_preset2.roles&&_preset2.roles.length){
        if(!prof.roles)prof.roles=[];
        var _changed=false;
        for(var _pr=0;_pr<_preset2.roles.length;_pr++){
          if(prof.roles.indexOf(_preset2.roles[_pr])<0){prof.roles.push(_preset2.roles[_pr]);_changed=true;}
        }
        if(_changed){
          prof.roles=prof.roles.filter(function(r){return r!=="visitor";});
          db.ref("torneio-master-santos/users/"+uid+"/roles").set(prof.roles);
        }
      }
    }catch(e){}
    userProfile=prof;
    updateRoleFlags();
    // Admin: carregar lista global de usuários para sub-aba Usuários
    if(isAdmin){
      db.ref("torneio-master-santos/users").on("value",function(s){
        var v=s.val();
        D.users=v||{};
        render();
      });
    }
    // Se está em modo cadastro e usuário ainda não tem athleteId/atleta, ir para form
    if(signupMode&&!prof.athleteId&&!userHasRole("atleta")){
      signupStep="form";
      // Pré-preencher apelido com primeiro nome
      if(!signupApelido&&prof.displayName){
        signupApelido=prof.displayName.split(" ")[0];
      }
    }
    render();
  }).catch(function(e){
    console.error("Erro ao buscar profile:",e);
    userProfile={roles:["visitor"],displayName:user.email||"Usu\u00e1rio"};
    updateRoleFlags();
    render();
  });
});

  if(loginLoading)return;

function translateAuthError(err){
  var code=err.code||"";
  if(code==="auth/user-not-found"||code==="auth/wrong-password"||code==="auth/invalid-credential"||code==="auth/invalid-login-credentials")return "Email ou senha incorretos";
  if(code==="auth/invalid-email")return "Email inv\u00e1lido";
  if(code==="auth/email-already-in-use")return "Este email j\u00e1 est\u00e1 cadastrado. Use o bot\u00e3o Entrar";
  if(code==="auth/weak-password")return "Senha muito fraca (m\u00ednimo 6 caracteres)";
  if(code==="auth/popup-closed-by-user")return "Login cancelado";
  if(code==="auth/popup-blocked")return "Popup bloqueado pelo navegador. Permita popups e tente novamente";
  if(code==="auth/network-request-failed")return "Sem conex\u00e3o com a internet";
  if(code==="auth/too-many-requests")return "Muitas tentativas. Tente novamente em alguns minutos";
  return "Erro: "+(err.message||code||"desconhecido");
}

function enterSignupMode(){
  // Força entrada no modo cadastro (clique no botão "Sou atleta")
  signupMode=true;
  signupToken="rs2026";
  showLanding=false;
  // Atualiza URL sem recarregar
  try{
    var u=new URL(window.location.href);
    u.searchParams.set("cadastro","rs2026");
    window.history.replaceState({},"",u.toString());
  }catch(e){}
  if(currentUser&&userProfile&&!userProfile.athleteId&&!userHasRole("atleta")){
    signupStep="form";
    if(!signupApelido&&userProfile.displayName){
      signupApelido=userProfile.displayName.split(" ")[0];
    }
  }else if(!currentUser){
    signupStep="welcome";
  }else{
    // Já está vinculada
    signupStep="already";
  }
  render();
}

function submitSignup(){
  if(signupLoading)return;
  if(!currentUser){signupError="Voc\u00ea precisa estar logado(a)";render();return;}
  var apelidoEl=document.getElementById("su-apelido");
  if(apelidoEl)signupApelido=apelidoEl.value.trim();
  if(!signupApelido){signupError="Digite um apelido (como quer ser chamado(a) no app)";render();return;}
  if(!signupTeams.length){signupError="Selecione pelo menos uma equipe";render();return;}
  signupLoading=true;signupError="";render();
  
  // Validar token de invite
  var inv=(D.invites||{})[signupToken];
  if(!inv||!inv.active){
    signupLoading=false;
    signupError="Link de cadastro inv\u00e1lido ou desativado. Procure o administrador.";
    render();return;
  }
  
  // Inferir gênero pela primeira equipe selecionada
  var firstTeam=tF(signupTeams[0]);
  var gender="";
  if(firstTeam){
    if(/FEMININO|FEM/i.test(firstTeam.n))gender="F";
    else if(/MASCULINO|MASC/i.test(firstTeam.n))gender="M";
  }
  
  // Criar atleta no banco
  var newAid=uid("a_");
  var newAth={
    aid:newAid,
    nm:userProfile.displayName||signupApelido,
    apelido:signupApelido,
    po:signupPos,
    gender:gender,
    legacy_ids:[],
    tags:[],
    selfReported:true,
    linkedUid:currentUser.uid,
    photoURL:userProfile.photoURL||"",
    createdAt:Date.now()
  };
  if(!D.athletes)D.athletes=[];
  D.athletes.push(newAth);
  
  // Adicionar nos rosters das equipes selecionadas
  for(var i=0;i<signupTeams.length;i++){
    var t=tF(signupTeams[i]);
    if(t){
      if(!t.roster)t.roster=[];
      t.roster.push({aid:newAid});
    }
  }
  
  // Atualizar profile do user
  var newRoles=(userProfile.roles||[]).slice();
  if(newRoles.indexOf("atleta")<0)newRoles.push("atleta");
  // Remove "visitor" se existir
  newRoles=newRoles.filter(function(r){return r!=="visitor";});
  
  var profUpdate={
    roles:newRoles,
    athleteId:newAid,
    apelido:signupApelido,
    selectedTeams:signupTeams.slice()
  };
  
  // Salvar tudo (em paralelo, granular):
  // 1) profile do usuário
  // 2) athletes (escreve banco inteiro pra incluir o novo)
  // 3) teams afetadas (cada uma)
  Promise.all([
    db.ref("torneio-master-santos/users/"+currentUser.uid).update(profUpdate),
    db.ref("torneio-master-santos/athletes").set(D.athletes),
    db.ref("torneio-master-santos/teams").set(D.teams)
  ]).then(function(){
    userProfile.roles=newRoles;
    userProfile.athleteId=newAid;
    userProfile.apelido=signupApelido;
    updateRoleFlags();
    signupLoading=false;
    signupStep="done";
    render();
  }).catch(function(e){
    signupLoading=false;
    signupError="Erro ao salvar: "+(e.message||e);
    render();
  });
}

function finishSignup(){
  // Limpar URL e ir pro app
  try{
    var u=new URL(window.location.href);
    u.searchParams.delete("cadastro");
    window.history.replaceState({},"",u.pathname);
  }catch(e){}
  signupMode=false;
  signupToken=null;
  signupStep="welcome";
  showLanding=false;
  tab="torneios";
  render();
}

function exAllAthPDF(gid){
var games=[];var label="Todos os Jogos";
if(gid&&gid!=="all"){var sg=gF(gid);if(sg){games=[sg];label="vs "+esc(sg.opp)+(sg.dt?" - "+fD(sg.dt):"");}}
else{if(D.games)for(var i=0;i<D.games.length;i++){if(!torneioMode&&isSpecialGame(D.games[i]))continue;if(D.games[i].act&&D.games[i].act.length&&(D.games[i].st==="live"||D.games[i].st==="done"))games.push(D.games[i]);}}
if(!games.length){alert("Sem dados");return;}

function ranking(){

    var sg2=D.games[gj];if(!sg2.act||sg2.tid!==pf.tid)continue;

// Bootstrap multi-equipe (Minis): cria torneio + 5 equipes + atletas no 1o acesso.
// So roda quando o access tem teamsVar (minis). PG/USA nao tem -> no-op.
function ensureStandaloneTeams(access){
  if(!access || !access.teamsVar) return;
  var defs=(typeof window!=="undefined" && window[access.teamsVar]) ? window[access.teamsVar] : null;
  if(!defs || !defs.length || typeof D==="undefined" || !D) return;
  // So faz bootstrap depois que TODOS os dados carregaram — senao uma atualizacao
  // parcial (listener chegando um a um) sobrescreveria atletas/equipes recem-criados.
  if(typeof _dataLoaded!=="undefined" && _dataLoaded && (!_dataLoaded.teams||!_dataLoaded.games||!_dataLoaded.tournaments||!_dataLoaded.athletes)) return;
  if(!D.tournaments) D.tournaments=[];
  if(!D.teams) D.teams=[];
  if(!D.athletes) D.athletes=[];
  var changed=false;
  if(!tFnd(access.torId)){
    D.tournaments.push({id:access.torId,n:access.brandTitle||"Torneio",c:access.brandColor||"#7c3aed",color:access.brandColor||"#7c3aed",cat:access.brandCat||"",season:(new Date()).getFullYear()+"",layout:"gameday",st:"live"});
    changed=true;
  }
  for(var i=0;i<defs.length;i++){
    var d=defs[i];
    // Garante os atletas SEMPRE (mesmo se a equipe ja existe) — roster nunca orfao.
    var roster=[];
    for(var j=0;j<d.roster.length;j++){
      var aid=d.id+"_a"+j;
      var ex=aFind(aid);
      if(!ex){ D.athletes.push({aid:aid,nm:d.roster[j],po:""}); changed=true; }
      else if(ex.nm!==d.roster[j]){ ex.nm=d.roster[j]; changed=true; } // alinha nome (ex: KAUAN->JAQUES, BILA->IGOR)
      roster.push({aid:aid});
    }
    if(tF(d.id)) continue;
    var logo=(d.logoVar && typeof window!=="undefined" && window[d.logoVar])?window[d.logoVar]:"";
    var tdef={id:d.id,n:d.n,c:d.c,color:d.c,roster:roster};
    if(logo) tdef.brandLogoData=logo;
    D.teams.push(tdef);
    changed=true;
  }
  if(changed && typeof save==="function") save();
}
function renderTorneioIsolado(){
  var tor=tFnd(torneioId);
  // Fase PG: torneios standalone (PG) voltam a ter o gate de senha de acesso.
  // USA (sem standalone) ja foi redirecionado pra aba unificada no URL parser,
  // entao nao chega aqui no fluxo normal — mas se chegar, entra direto.
  var __access = torneioToken ? TOURNEY_ACCESS[torneioToken] : null;
  ensureStandaloneTeams(__access);
  if(__access && __access.standalone && !torneioUnlocked){
    return renderTorneioSenha(tor);
  }
  if(torneioGameOpen){
    return renderTorneioScout(torneioGameOpen);
  }
  return renderTorneioCards(tor);
}

function renderTorneioSenha(tor){
  // Fase PG: brand parametrizado (logo + nome) \u2014 USA usa LR, PG usa PG_LOGO.
  var brand=getBrand(torneioToken);
  var nome=tor?tor.n:(brand.title||"Torneio");
  var h='<div class="usa-wrap" style="--rs-watermark:url(\''+brand.logo+'\')"><div class="usa-lock-screen">';
  h+='<div class="usa-lock-card">';
  h+='<div class="usa-lock-crest"><img src="'+brand.logo+'" alt="logo"></div>';
  h+='<div class="usa-lock-title">'+esc(nome)+'</div>';
  h+='<div class="usa-lock-sub">Acesso restrito \u00b7 Scout do torneio</div>';
  h+='<div class="usa-lock-field"><input type="password" id="usa-pwd" placeholder="Senha de acesso" autocomplete="off" onkeydown="if(event.key===\'Enter\')checkTorneioPwd()"></div>';
  if(torneioPwdError)h+='<div class="usa-lock-err">'+esc(torneioPwdError)+'</div>';
  h+='<button class="usa-lock-btn" onclick="checkTorneioPwd()">Entrar</button>';
  h+='<div class="usa-lock-foot">RS-Voleibol \u00b7 2026</div>';
  h+='</div></div></div>';
  return h;
}

function checkTorneioPwd(){
  var inp=document.getElementById("usa-pwd");
  if(!inp)return;
  var val=inp.value.trim();
  var access=TOURNEY_ACCESS[torneioToken];
  if(!access){torneioPwdError="Torneio inv\u00e1lido";render();return;}
  if(val===access.pwd){
    torneioUnlocked=true;
    // PG e outros standalone: senha de acesso ja libera TUDO (sem 2a senha).
    // Mantemos compat com o fluxo legado caso algum dia exista pwd != adminPwd.
    if(access.standalone) torneioAdminUnlocked=true;
    torneioPwdError="";
    try{if(window.sessionStorage)window.sessionStorage.setItem("tourney_"+torneioToken,"1");}catch(e){}
    render();
  }else{
    torneioPwdError="Senha incorreta. Tente novamente.";
    inp.value="";
    render();
  }
}

// Resolve a chave do logo do adversario — usa oppLogo explicito OU detecta pelo nome
function resolveOppLogo(oppLogo,opp){
  if(oppLogo&&OPP_LOGOS[oppLogo])return oppLogo;
  var n=(opp||"").toLowerCase();
  if(n.indexOf("arlington")>=0||n.indexOf("empire")>=0)return "ae";
  if(n.indexOf("tall")>=0)return "tallones";
  if(n.indexOf("highline")>=0||n.indexOf("vba")>=0||n.indexOf("vla")>=0)return "vla";
  return null;
}
function oppLogoSvg(oppLogo,opp,oppLogoData){
  // 1) Logo enviado por upload (base64 no proprio jogo)
  if(oppLogoData){
    return '<div class="usa-opp-logo usa-opp-logo-img"><img src="'+oppLogoData+'" alt="'+esc(opp||"")+'"></div>';
  }
  // 2) Logo real (explicito ou detectado pelo nome)
  var key=resolveOppLogo(oppLogo,opp);
  if(key&&OPP_LOGOS[key]){
    return '<div class="usa-opp-logo usa-opp-logo-img"><img src="'+OPP_LOGOS[key]+'" alt="'+esc(opp||"")+'"></div>';
  }
  // 3) Fallback: escudo por iniciais
  var initials="";
  if(opp){
    var words=opp.split(" ").filter(function(w){return w.length;});
    if(words.length>=2)initials=words[0][0]+words[1][0];
    else if(words.length===1)initials=words[0].substring(0,2);
    initials=initials.toUpperCase();
  }
  return '<div class="usa-opp-logo" style="background:#1e293b">'+initials+'</div>';
}

function renderTorneioCards(tor){
  var nome=tor?tor.n:"Torneio";
  // Buscar jogos do torneio
  var games=[];
  if(D.games)for(var i=0;i<D.games.length;i++){
    if(D.games[i].torId===torneioId)games.push(D.games[i]);
  }
  games.sort(function(a,b){
    var da=(a.dt||"")+(a.tm||"");var db=(b.dt||"")+(b.tm||"");
    return db.localeCompare(da);
  });
  // "Proximo jogo": entre os pendentes (nao live, nao done), o de data/hora
  // mais cedo a partir de agora. Se nenhum for futuro, pega o pendente mais cedo.
  var nextGameId=null;
  (function(){
    var nowKey=(function(){
      var d=new Date(),z=function(n){return(n<10?"0":"")+n;};
      return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())+z(d.getHours())+":"+z(d.getMinutes());
    })();
    var pend=[];
    for(var i=0;i<games.length;i++){
      var g=games[i];
      if(g.st==="live"||g.st==="done")continue;
      pend.push({id:g.id,key:(g.dt||"")+(g.tm||"")});
    }
    pend.sort(function(a,b){return a.key.localeCompare(b.key);});
    for(var j=0;j<pend.length;j++){ if(pend[j].key>=nowKey){nextGameId=pend[j].id;break;} }
    if(!nextGameId&&pend.length)nextGameId=pend[pend.length-1].id;
  })();
  
  // Fase PG: brand parametrizado pelo torneioToken (USA=RS, PG=Praia Grande etc).
  var brand=getBrand(torneioToken);
  var h='<div class="usa-wrap" style="--rs-watermark:url(\''+brand.logo+'\')">';
  // Header
  h+='<div class="usa-header">';
  h+='<div class="usa-header-flag">'+brand.flag+'</div>';
  h+='<div class="usa-header-title">'+esc(nome)+'</div>';
  h+='<div class="usa-header-sub">'+brand.sub+'</div>';
  // Fase PG: admin pode editar logo + nome + subtitulo do celular sem deploy.

// CARD ESTILO "GAME DAY"
function renderGameDayCard(g,isNext){
  var done=g.st==="done";
  var live=g.st==="live";
  var hasData=g.act&&g.act.length>0;
  // Placar (se houver)
  var scoreLabel="";
  if(g.ss&&g.ss.length){
    var us=0,them=0;
    for(var s=0;s<g.ss.length;s++){
      if(g.ss[s].u>g.ss[s].t)us++;else if(g.ss[s].t>g.ss[s].u)them++;
    }
    scoreLabel=us+" \u00d7 "+them;
  }
  var dtLabel="";
  if(g.dt){
    var p=g.dt.split("-");
    var meses=["JANEIRO","FEVEREIRO","MAR\u00c7O","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    dtLabel=parseInt(p[2])+" DE "+meses[parseInt(p[1])-1]+" DE "+p[0];
  }
  var tmLabel=g.tm?g.tm.substring(0,5):"";
  
  var statusBadge="";
  if(live)statusBadge='<div class="gd-status gd-status-live">\u25CF AO VIVO</div>';
  else if(done)statusBadge='<div class="gd-status gd-status-done">FINALIZADO</div>';
  else statusBadge='<div class="gd-status gd-status-pending">A JOGAR</div>';
  
  // Fase B2.1: tarja unificada (CANCELADO / SEM DADOS) via gameAutoTarja.
  // data-tarja no card escurece/dessatura o conteudo (CSS .gd-card[data-tarja]).
  var gdTarja = (typeof gameAutoTarja==='function') ? gameAutoTarja(g) : null;
  // Fase PG: brand parametrizado por torneioToken \u2014 quando o card eh renderizado
  // FORA do modo isolado (aba unificada), usa o brand do proprio torneio do jogo.
  var cardBrandToken = torneioMode ? torneioToken : null;
  if(!cardBrandToken){
    // No fluxo unificado, descobre o token via torId \u2014 varre TOURNEY_ACCESS.
    for(var __tk in TOURNEY_ACCESS){
      if(TOURNEY_ACCESS[__tk]&&TOURNEY_ACCESS[__tk].torId===g.torId){cardBrandToken=__tk;break;}
    }
  }
  var brand;
  if(cardBrandToken){
    brand=getBrand(cardBrandToken); // torneios legados (USA/PG/Taca/minis)
  }else{
    // Torneio comum: a brand vem do PROPRIO torneio + da equipe mandante do jogo
    // (g.tid). Nada de defaults USA ("ADULTO MASCULINO / ADULT OPEN CHAMPIONSHIP").
    var _ct=(typeof tFnd==='function')?tFnd(g.torId):null;
    var _cteam=(typeof tF==='function')?tF(g.tid):null;
    brand={
      logo:(_cteam&&_cteam.brandLogoData)||LR,
      flag:'', sub:'',
      title:(_ct&&_ct.n)||'',
      cat:(_ct&&_ct.cat)||'',
      team:(_cteam&&_cteam.n)||'',
      color:(_ct&&_ct.color)||'#2563eb',
      teamLogoCls:'usa-pg-logo'
    };
  }
  var h='<div class="gd-card'+(isNext?" gd-next":"")+'"'+(gdTarja?' data-tarja="'+gdTarja+'"':'')+' onclick="openGameDayCard(\''+g.id+'\')">';
  if(isNext)h+='<div class="gd-next-tag">\u25B6 PR\u00d3XIMO JOGO</div>';
  // Faixa lateral
  h+='<div class="gd-side">'+brand.title+'</div>';
  h+='<div class="gd-body">';
  // Header GAME DAY
  h+='<div class="gd-head"><span class="gd-game">GAME</span><span class="gd-day">DAY</span><span class="gd-cat">'+brand.cat+'</span></div>';
  // Fase
  h+='<div class="gd-phase">'+esc(g.phase||"FASE DE CLASSIFICA\u00c7\u00c3O").toUpperCase()+'</div>';
  // Confronto
  // Mandante: padrao = brand do torneio (USA/PG). No minis o mandante e a
  // propria equipe da casa (g.tid) — usa logo/nome dela.
  var homeLogo=brand.logo, homeName=brand.team, homeCls=brand.teamLogoCls;
  if(cardBrandToken==='minis'){ var _ht=(typeof tF==='function')?tF(g.tid):null; if(_ht){ if(_ht.brandLogoData)homeLogo=_ht.brandLogoData; homeName=_ht.n||homeName; homeCls='usa-pg-logo'; } }
  h+='<div class="gd-match">';
  h+='<div class="gd-team"><div class="'+homeCls+'"><img src="'+homeLogo+'" alt="logo"></div><div class="gd-team-name">'+esc(homeName)+'</div></div>';
  h+='<div class="gd-x">X</div>';
  // Adversaria: padrao oppLogoSvg (USA/PG). No minis usa o MESMO estilo do mandante
  // (usa-pg-logo, sem moldura branca) com o logo da equipe B.
  var awayHtml;
  if(cardBrandToken==='minis'){
    var _bt=(typeof tF==='function')?tF(g.tidB):null;
    var _bl=(_bt&&_bt.brandLogoData)?_bt.brandLogoData:g.oppLogoData;
    awayHtml=_bl?('<div class="usa-pg-logo"><img src="'+_bl+'" alt="logo"></div>'):oppLogoSvg(g.oppLogo,g.opp,g.oppLogoData);
  }else{
    awayHtml=oppLogoSvg(g.oppLogo,g.opp,g.oppLogoData);
  }
  h+='<div class="gd-team">'+awayHtml+'<div class="gd-team-name">'+esc(g.opp||"").toUpperCase()+'</div></div>';
  h+='</div>';
  // Data e hora
  h+='<div class="gd-date">'+dtLabel+'</div>';
  if(tmLabel)h+='<div class="gd-time">'+tmLabel+' <span style="font-size:13px">\uD83C\uDDE7\uD83C\uDDF7</span></div>';
  // Status / Placar
  if(scoreLabel){
    h+='<div class="gd-score">'+scoreLabel+'</div>';
  }
  h+=statusBadge;
  // Ação
  h+='<div class="gd-action">'+(done||hasData?"\uD83D\uDCCA Ver estat\u00edsticas":"\u25B6 Abrir scout")+'</div>';
  // Fase B2: botao "Painel AO VIVO" direto no card \u2014 qualquer usuario abre o
  // overlay sem precisar entrar no scout. So aparece se o jogo tem acoes.
  if(hasData){
    h+='<button class="gd-live-btn" onclick="event.stopPropagation();openLivePanel(\''+g.id+'\')" title="Abrir painel ao vivo">\uD83D\uDCCA Painel AO VIVO</button>';
  }
  // Botao editar (so jogos pendentes) + excluir.
  // Fase B2.2: aparecem pra quem pode gerenciar. No isolado legado todo usuario
  // ve (a senha eh pedida no clique). No fluxo unificado so admin/coord ve.
  // Fase C: nunca mostra se o torneio do jogo esta arquivado (so-leitura).
  var cardTor = (typeof tFnd==='function') ? tFnd(g.torId) : null;
  var showAdminBtns = (torneioMode || isAdmin || isCoord) && !isArchivedTor(cardTor);
  if(showAdminBtns){
    if(!live&&!done){
      h+='<button class="gd-edit" onclick="event.stopPropagation();openTorneioEditarJogo(\''+g.id+'\')" title="Editar jogo">\u270F\uFE0F Editar jogo</button>';
    }
    h+='<button class="gd-del" onclick="event.stopPropagation();excluirTorneioJogo(\''+g.id+'\')" title="Excluir jogo">\uD83D\uDDD1 Excluir jogo</button>';
  }
  h+='</div>';
  // Tarja CANCELADO / SEM DADOS (overlay) \u2014 fora do .gd-body pra cobrir o card inteiro.
  if(gdTarja){
    var gdTxt = gdTarja==='cancelled' ? 'CANCELADO' : 'SEM DADOS';
    var gdMod = gdTarja==='cancelled' ? ' is-cancelled' : '';
    h+='<div class="gd-tarja"><span class="gd-tarja-text'+gdMod+'">'+gdTxt+'</span></div>';
  }
  h+='</div>';
  return h;
}

function openTorneioGame(gid){
  torneioGameOpen=gid;
  // Setar S pra apontar pro jogo (motor de scout)
  var g=gF(gid);
  if(g){
    // Garantir estruturas do scout (igual openG faz) — jogos importados podem nao ter ss/act
    if(!g.ss||!g.ss.length)g.ss=[{u:0,t:0}];
    if(!g.act)g.act=[];
    // Jogo do torneio sem escalacao — Fase PG: pega o roster certo via TOURNEY_ACCESS.
    if((!g.lineup||!g.lineup.length)&&g.torId===torneioId){
      var __acc=TOURNEY_ACCESS[torneioToken];
      var __roster=null;
      if(__acc && __acc.rosterVar && typeof window!=='undefined' && window[__acc.rosterVar] && window[__acc.rosterVar].length){
        __roster=window[__acc.rosterVar];
      }
      var built=buildUsaLineup(__roster);
      if(built && built.length){
        g.lineup=built;
        save();
      }
    }
    S={aid:gid,sp:null,sa:null,cs:g.ss.length,us:[],tm:0,rn:false,ti:null};
  }
  render();
}

// === Fase B1.1: helpers do fluxo unificado de torneios ===
// tnyLayout(tor): qual layout o detalhe do torneio usa ('gameday' = cards
// GAME DAY estilo USA; 'default' = listagem de jogos padrao via team-hub).
// Fallback hardcoded p/ o torneio USA legado (id 't_usa_open') ate que o
// campo tor.layout seja preenchido no banco.
function tnyLayout(tor){
  if(!tor) return 'default';
  if(tor.layout==='gameday') return 'gameday';
  if(tor.id==='t_usa_open') return 'gameday';
  return 'gameday'; // PADRAO: todo torneio usa o estilo GAME DAY (cards USA/PG/Taca) + modal escuro de novo jogo
}

// openGameDayCard(gid): dispatcher unificado do click no GAME DAY card.
// Em modo isolado (torneioMode) delega pro fluxo legado openTorneioGame.
// Em modo aba prepara o jogo (ss/act/lineup) e navega pra tab=scout.
function openGameDayCard(gid){
  if(torneioMode){ openTorneioGame(gid); return; }
  var g=gF(gid);
  if(!g) return;
  if(!g.ss||!g.ss.length) g.ss=[{u:0,t:0}];
  if(!g.act) g.act=[];
  var tor = (typeof tFnd==='function') ? tFnd(g.torId) : null;
  if((!g.lineup||!g.lineup.length) && tor && tnyLayout(tor)==='gameday'){
    // Escala a EQUIPE do jogo (g.tid) — nunca mais o USA_ROSTER hardcoded.
    // Sem roster, fica vazio e o scout pede "Escalar antes de iniciar".
    var _lu=(typeof lineupFromTeam==='function')?lineupFromTeam(g.tid):[];
    if(_lu.length){ g.lineup=_lu; if(typeof save==='function') save(); }
  }
  S={aid:gid,sp:null,sa:null,cs:g.ss.length,us:[],tm:0,rn:false,ti:null};
  tab='scout';
  render();
}

// === Fase B2.2: gate unificado pra gestao do torneio ===
// Antes era apenas torneioAdminUnlocked (senha de admin no modo isolado).
// Agora quem tem papel admin/coord no login geral destrava direto na aba.
function canManageTorneio(){
  if(torneioMode && torneioAdminUnlocked) return true;
  if(!torneioMode && (isAdmin || isCoord)) return true;
  return false;
}

// === Fase B2.1: helper unico de tarja do card de jogo ===
// gameAutoTarja(g): retorna 'cancelled', 'no_data' ou null.
// Prioridade: tarja manual setada por admin (g.status_tag) prevalece sobre auto.
// Auto: jogo passado (g.dt anterior a hoje) + sem acoes registradas
// + sem resultado declarado (g.result.type) => 'no_data'.
function gameAutoTarja(g){
  if(!g) return null;
  if(g.status_tag==='cancelled') return 'cancelled';
  if(g.status_tag==='no_data') return 'no_data';
  if(!g.dt) return null;
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dt=new Date(g.dt+"T12:00:00");
  if(dt>=hoje) return null;
  var nActions=(g.act&&g.act.length)||0;
  if(nActions>0) return null;
  if(g.result && g.result.type) return null;
  return 'no_data';
}

// === Fase C: torneio encerrado / historico ===
// Torneio com tor.archived=true vira so-leitura (sem criar/editar/excluir jogo).
// Visualmente: card cinza no rTor + selo ENCERRADO, rTorDetail tambem.
// O bloqueio das ACOES de scout fica como follow-up — por ora a UI admin some.
function isArchivedTor(t){ return !!(t && t.archived); }

// canEditTorneioGames(tor): admin pode gerenciar jogos do torneio NAO encerrado.
function canEditTorneioGames(tor){
  return canManageTorneio() && !isArchivedTor(tor);
}

// Toggle do status arquivado (admin/coord) — confirma antes de re-ativar.
function toggleTorneioArchived(torId){
  if(!canManageTorneio()){
    if(typeof toast==='function') toast('So admin pode mudar o status do torneio.','bad');
    return;
  }
  var t = tFnd(torId); if(!t) return;
  t.archived = !t.archived;
  if(typeof save==='function') save();
  if(typeof toast==='function') toast(t.archived?'Torneio marcado como encerrado.':'Torneio reativado.','ok');
  render();
}

var _tnjLogoData=null; // base64 do logo carregado
var _tnjEditId=null;   // id do jogo em edicao (null = modo criar)

// Abre o formulario em modo EDICAO para um jogo pendente.
function openTorneioEditarJogo(gid){
  var g=gF(gid);
  if(!g){if(typeof toast==="function")toast("Jogo nao encontrado.","bad");return;}
  if(g.st==="live"||g.st==="done"){
    if(typeof toast==="function")toast("So jogos pendentes podem ser editados.","bad");
    return;
  }
  // Fase C: torneio arquivado nao aceita edicao de jogo (defense-in-depth).
  var jTor = tFnd(g.torId);
  if(isArchivedTor(jTor)){ if(typeof toast==="function")toast("Torneio encerrado — só leitura.","bad"); return; }
  if(!canManageTorneio()){ _tnjEditId=gid; openTorneioAdminGate(); return; }
  _tnjEditId=gid;
  openTorneioNovoJogo();
}

function checkTorneioAdminPwd(){

}

function salvarMinisJogo(editId){
  var err=document.getElementById("mn-err");
  var aId=(document.getElementById("mn-a")||{}).value;
  var bId=(document.getElementById("mn-b")||{}).value;
  var dt=(document.getElementById("mn-dt")||{}).value;
  var tm=(document.getElementById("mn-tm")||{}).value;
  var fmt=(document.getElementById("mn-fmt")||{}).value;
  if(["single","bo3","bo5","fixed3"].indexOf(fmt)<0)fmt="single";
  var pts=parseInt((document.getElementById("mn-pts")||{}).value,10);
  var tie=parseInt((document.getElementById("mn-tie")||{}).value,10);
  if(isNaN(pts)||pts<1)pts=21;
  if(isNaN(tie)||tie<1)tie=15;
  if(!aId||!bId){ if(err)err.textContent="Escolha as duas equipes."; return; }
  if(aId===bId){ if(err)err.textContent="As duas equipes precisam ser diferentes."; return; }
  if(!dt){ if(err)err.textContent="Informe a data."; return; }
  var tA=tF(aId), tB=tF(bId);
  if(!tA||!tB){ if(err)err.textContent="Equipe nao encontrada."; return; }
  var maxSets=(fmt==="single")?1:((fmt==="bo5")?5:3);
  function lineupOf(t){ var L=[]; if(t.roster)for(var i=0;i<t.roster.length;i++){ L.push({aid:t.roster[i].aid,nu:null}); } return L; }
  if(editId){
    var g=gF(editId); if(!g){ if(err)err.textContent="Jogo nao encontrado."; return; }
    if(g.st==="done"){ if(err)err.textContent="Jogo finalizado nao pode ser editado."; return; }
    g.tid=aId; g.tidB=bId; g.opp=tB.n; g.oppLogoData=tB.brandLogoData||null;
    g.dt=dt; g.tm=tm||""; g.format=fmt; g.maxSets=maxSets; g.setPoints=pts; g.tiePoints=tie;
    g.tor=tFnd(g.torId)?tFnd(g.torId).n:""; g.cat="MINIS";
    if(g.st!=="live"){ g.lineup=lineupOf(tA); g.lineupB=lineupOf(tB); }
    if(typeof toast==="function")toast("Jogo atualizado!","ok");
  }else{
    var torId=torneioMode?torneioId:"t_minis_open";
    var ng={ id:uid("g_"), tid:aId, tidB:bId, torId:torId, tor:(tFnd(torId)?tFnd(torId).n:""),
      cat:"MINIS", phase:"", opp:tB.n, oppLogoData:tB.brandLogoData||null,
      dt:dt, tm:tm||"", format:fmt, maxSets:maxSets, setPoints:pts, tiePoints:tie,
      lineup:lineupOf(tA), lineupB:lineupOf(tB), pl:[], act:[], ss:[], st:"pending" };
    if(!D.games)D.games=[];
    D.games.push(ng);
    if(typeof toast==="function")toast("Jogo criado!","ok");
  }
  _tnjEditId=null;
  closeTorneioModal();
  save();
  render();
}

function excluirTorneioJogo(gid){

    return;
  }
  // Fase C: torneio do jogo arquivado bloqueia exclusao (defense-in-depth).
  var dgg = gF(gid);
  if(dgg && isArchivedTor(tFnd(dgg.torId))){
    if(typeof toast==="function") toast("Torneio encerrado — não aceita exclusão.","bad");

  }
  var g=gF(gid);if(!g)return;
  var nome="RS vs "+(g.opp||"advers\u00e1rio");
  var temDados=g.act&&g.act.length;
  var m='<div class="tnj-modal" onclick="cancelTorneioModal()"><div class="tnj-box" onclick="event.stopPropagation()" style="max-width:340px">';

  if(temDados)m+='<div class="tnj-inherit" style="background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:#fca5a5">\u26A0\uFE0F Este jogo tem <b style="color:#fff">'+g.act.length+' a\u00e7\u00f5es de scout</b> registradas. Elas ser\u00e3o perdidas.</div>';
  else m+='<div style="font-size:12px;color:#94a3b8;text-align:center;margin-bottom:16px">Tem certeza que deseja excluir este jogo?</div>';
  m+='<div class="tnj-actions"><button class="tnj-cancel" onclick="cancelTorneioModal()">Cancelar</button>';
  m+='<button class="tnj-save" style="background:linear-gradient(135deg,#dc2626,#b91c1c)" onclick="confirmarExclusaoTorneioJogo(\''+gid+'\')">Excluir</button></div>';

function confirmarExclusaoTorneioJogo(gid){
  if(!D.games)return;
  var idx=-1;for(var i=0;i<D.games.length;i++){if(D.games[i].id===gid){idx=i;break;}}
  if(idx<0){closeTorneioModal();return;}
  D.games.splice(idx,1);
  save();
  closeTorneioModal();
  if(typeof toast==="function")toast("Jogo exclu\u00eddo","ok");

}

function salvarTorneioJogo(){
  var opp=(document.getElementById("tnj-opp")||{}).value;
  var dt=(document.getElementById("tnj-dt")||{}).value;
  var tm=(document.getElementById("tnj-tm")||{}).value;
  var phase=(document.getElementById("tnj-phase")||{}).value;
  var fmt=parseInt((document.getElementById("tnj-fmt")||{}).value,10);
  if(fmt!==5)fmt=3; // melhor de 3 por padrao
  var errEl=document.getElementById("tnj-err");
  opp=(opp||"").trim();
  if(!opp){if(errEl)errEl.textContent="Informe o nome do advers\u00e1rio.";return;}
  if(!dt){if(errEl)errEl.textContent="Informe a data do jogo.";return;}
  // Fase B2.2: torneio ativo. No modo isolado, vem do global torneioId.
  // No fluxo unificado (aba) vem do selTor (torneio selecionado em rTorDetail).
  var activeTorId = torneioMode ? torneioId : selTor;
  // Fase PG: bootstrap standalone \u2014 se o torneio configurado nao existe ainda,
  // cria o torneio + a equipe (Praia Grande etc) no primeiro jogo. Garante que
  // o time NAO eh herdado do RS (que seria o D.teams[0] fallback).
  var __access = torneioMode && TOURNEY_ACCESS[torneioToken];
  if(__access && __access.standalone){
    // 1. Garante torneio
    if(!tFnd(__access.torId)){
      if(!D.tournaments) D.tournaments=[];
      D.tournaments.push({
        id:__access.torId, n:__access.brandTitle||"Torneio",
        c:__access.brandColor||"#06b6d4", color:__access.brandColor||"#06b6d4",
        cat:__access.brandSub||"", season:(new Date()).getFullYear()+"",
        layout:"gameday", st:"live"
      });
    }
    // 2. Garante equipe
    if(__access.teamId && !tF(__access.teamId)){
      if(!D.teams) D.teams=[];
      D.teams.push({
        id:__access.teamId, n:__access.brandTeam||"Time",
        c:__access.brandColor||"#06b6d4",
        roster:[]
      });
    }
  }
  // Herdar a equipe: teamId standalone > equipe do PROPRIO torneio (tor.tid) >
  // 1o jogo do torneio > fallback. Antes pulava tor.tid e caia no D.teams[0],
  // herdando equipe errada nos torneios comuns.
  var tid="";
  var _atTor = activeTorId ? tFnd(activeTorId) : null;
  // Standalone legado (PG/taca) tem equipe fixa e manda primeiro. No fluxo
  // unificado, a equipe escolhida no modal vale (multi-equipe: torneio com varias).
  var _selTeam=(document.getElementById("tnj-team")||{}).value||"";
  if(__access && __access.standalone && __access.teamId) tid=__access.teamId;
  if(!tid && _selTeam && tF(_selTeam)) tid=_selTeam;
  if(!tid && _atTor && _atTor.tid && tF(_atTor.tid)) tid=_atTor.tid;
  if(!tid && D.games)for(var i=0;i<D.games.length;i++){if(D.games[i].torId===activeTorId){tid=D.games[i].tid;break;}}
  if(!tid&&D.teams&&D.teams.length)tid=D.teams[0].id;
  if(!tid){if(errEl)errEl.textContent="Nenhuma equipe encontrada para o torneio.";return;}
  var t=tF(tid);
  // Fase B2.2: ler radio da tarja admin (vazio = sem tarja).
  var newStatusTag="";
  var tarjaRadios=document.getElementsByName("tnj-tarja");
  for(var tri=0;tri<tarjaRadios.length;tri++){ if(tarjaRadios[tri].checked){ newStatusTag=tarjaRadios[tri].value||""; break; } }
  // ---- MODO EDICAO: atualiza um jogo pendente existente ----
  if(_tnjEditId){
    var eg=gF(_tnjEditId);
    if(!eg){if(errEl)errEl.textContent="Jogo nao encontrado.";return;}
    if(eg.st==="live"||eg.st==="done"){
      if(errEl)errEl.textContent="Este jogo nao esta mais pendente e nao pode ser editado.";
      return;
    }
    eg.opp=opp;eg.dt=dt;eg.tm=tm||"";
    // Multi-equipe: trocou a equipe na edicao -> atualiza e re-escala pela nova.
    if(tid && tid!==eg.tid){ eg.tid=tid; if(typeof lineupFromTeam==='function') eg.lineup=lineupFromTeam(tid); }
    eg.phase=phase||"Fase de Classifica\u00e7\u00e3o";
    eg.maxSets=fmt;
    if(_tnjLogoData)eg.oppLogoData=_tnjLogoData;
    // Fase B2.2: persiste tarja admin (vazio remove a tarja manual; auto continua valendo)
    if(newStatusTag) eg.status_tag=newStatusTag; else delete eg.status_tag;
    save();
    _tnjLogoData=null;_tnjEditId=null;
    closeTorneioModal();
    if(typeof toast==="function")toast("Jogo atualizado!","ok");
    render();
    return;
  }
  // ---- MODO CRIAR ----
  var novoJogo={
    id:uid("g_"),tid:tid,torId:activeTorId,tor:(t?t.n:""),
    cat:(_atTor&&_atTor.cat)||"",phase:phase||"Fase de Classifica\u00e7\u00e3o",
    maxSets:fmt,
    opp:opp,dt:dt,tm:tm||"",loc:"",
    pl:[],act:[],ss:[],st:"pending",result:null,
    // Fase PG: standalone usa o roster proprio (PG_ROSTER, etc). Default = USA.
    lineup:(function(){
      if(typeof buildUsaLineup!=='function') return [];
      if(__access && __access.standalone && __access.rosterVar){
        var customRoster=(typeof window!=='undefined' && window[__access.rosterVar]) ? window[__access.rosterVar] : null;
        if(customRoster && customRoster.length) return buildUsaLineup(customRoster);
        return []; // roster ainda vazio (cliente vai enviar)
      }
      return (typeof lineupFromTeam==='function')?lineupFromTeam(tid):[];
    })()
  };
  // Logo: se enviou imagem, guarda no proprio jogo (base64)
  if(_tnjLogoData)novoJogo.oppLogoData=_tnjLogoData;
  // Fase B2.2: persiste tarja admin (se selecionada)
  if(newStatusTag) novoJogo.status_tag=newStatusTag;
  if(!D.games)D.games=[];
  D.games.push(novoJogo);
  save();
  _tnjLogoData=null;
  closeTorneioModal();

    if(chks[i].checked)newRoles.push(chks[i].getAttribute("data-role"));
  }
  if(!newRoles.length){toast("Selecione pelo menos um papel ou exclua o usu\u00e1rio","error");return;}
  // Não pode remover admin do próprio
  if(currentUser&&currentUser.uid===uid&&newRoles.indexOf("admin")<0){
    toast("Voc\u00ea n\u00e3o pode remover seu pr\u00f3prio acesso de admin","error");return;
  }
  db.ref("torneio-master-santos/users/"+uid+"/roles").set(newRoles).then(function(){
    if(D.users&&D.users[uid])D.users[uid].roles=newRoles;
    closeUserEditor();
    toast("Pap\u00e9is atualizados","ok");
    render();
  }).catch(function(e){toast("Erro: "+e.message,"error");});
}

function unlinkUserAthlete(uid){

    body:"Remover o v\u00ednculo entre "+(u.displayName||"este usu\u00e1rio")+" e a atleta no banco? O usu\u00e1rio continua existindo, mas perde a refer\u00eancia.",

function renderAthletesListInner(){
  var q=(document.getElementById("ab-search")?document.getElementById("ab-search").value:"").toLowerCase().trim();
  var gen=document.getElementById("ab-gen")?document.getElementById("ab-gen").value:"all";
  var st=document.getElementById("ab-st")?document.getElementById("ab-st").value:"all";
  // Coletar atletas com info de equipes
  var rows=[];
  for(var i=0;i<D.athletes.length;i++){
    var a=D.athletes[i];
    if(q&&(a.nm||"").toLowerCase().indexOf(q)<0)continue;
    if(gen!=="all"&&a.gender!==gen)continue;
    // Encontrar equipes (ativas)
    var teamsActive=[],teamsArchived=[];
    for(var ti=0;ti<D.teams.length;ti++){
      var t=D.teams[ti];
      if(!t.roster)continue;
      for(var j=0;j<t.roster.length;j++){
        if(t.roster[j].aid===a.aid){
          (t.archived?teamsArchived:teamsActive).push({n:t.n,c:t.c});
          break;
        }
      }
    }
    if(st==="active"&&!teamsActive.length)continue;
    if(st==="orphan"&&(teamsActive.length||teamsArchived.length))continue;
    if(st==="santos"&&(a.tags||[]).indexOf("santos2026")<0)continue;
    rows.push({a:a,active:teamsActive,archived:teamsArchived});
  }
  // Ordenar por nome
  rows.sort(function(x,y){return (x.a.nm||"").localeCompare(y.a.nm||"");});
  if(!rows.length)return '<div class="cd" style="padding:24px;text-align:center;color:var(--gray)">Nenhum atleta encontrado.</div>';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:var(--gray);font-weight:600">'+rows.length+' atleta'+(rows.length===1?"":"s")+'</span></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';
  for(var k=0;k<rows.length;k++){
    var r=rows[k],a=r.a;
    var genIcon=a.gender==="F"?"\u2640":a.gender==="M"?"\u2642":"";
    var santosTag=(a.tags||[]).indexOf("santos2026")>=0;
    h+='<div class="cd" style="padding:12px 14px;cursor:pointer;margin-bottom:0" onclick="editAthleteFromBank(\''+a.aid+'\')">';
    h+='<div style="display:flex;align-items:flex-start;gap:10px">';
    h+='<div style="width:36px;height:36px;border-radius:8px;background:var(--card2);color:var(--gray);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">'+(a.nm?a.nm[0].toUpperCase():"?")+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:14px;font-weight:700;line-height:1.2">'+esc(a.nm)+(genIcon?' <span style="color:var(--gray);font-weight:400">'+genIcon+'</span>':'')+'</div>';
    if(a.po)h+='<div style="font-size:11px;color:var(--gray);margin-top:2px">'+esc(a.po)+'</div>';
    var chips=[];
    for(var ti2=0;ti2<r.active.length;ti2++){var ta=r.active[ti2];chips.push('<span style="background:'+ta.c+'15;color:'+ta.c+';padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">'+esc(ta.n.replace(/^RS\s*/,""))+'</span>');}
    if(santosTag)chips.push('<span style="background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">\u{1F4E6} Santos</span>');
    if(chips.length)h+='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">'+chips.join("")+'</div>';
    h+='</div></div></div>';
  }
  h+='</div>';
  return h;
}
function renderAthletesList(){var c=document.getElementById("ab-list");if(c)c.innerHTML=renderAthletesListInner();}

function editAthleteFromBank(aid){

  m+='<div class="rw" style="margin-bottom:10px"><div style="flex:1"><span class="lb">Posi\u00e7\u00e3o</span><select id="ab-po">';
  for(var k=0;k<POS.length;k++)m+='<option'+(POS[k]===ath.po?' selected':'')+'>'+POS[k]+'</option>';
  m+='</select></div>';
  m+='<div style="flex:1"><span class="lb">G\u00eanero</span><select id="ab-genE"><option value="">\u2014</option><option value="F"'+(ath.gender==="F"?" selected":"")+'>Feminino</option><option value="M"'+(ath.gender==="M"?" selected":"")+'>Masculino</option></select></div></div>';

      if(t.roster[j].aid===aid){
        teamsList.push({tid:t.id,tn:t.n,c:t.c,arch:t.archived,lastNu:(ath.last_nu_by_team&&ath.last_nu_by_team[t.id]!==undefined)?ath.last_nu_by_team[t.id]:null});
        break;
      }
