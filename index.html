// AGENDA — calendário cronológico
// ==========================================================
function rAge(){
  var allGames=getPublicGames();
  if(gAgTor!=="all")allGames=allGames.filter(function(g){return g.torId===gAgTor;});
  if(gAgCat!=="all")allGames=allGames.filter(function(g){return g.cat===gAgCat;});
  var todayStr=new Date().toISOString().slice(0,10);
  if(gAgPeriod==="upcoming")allGames=allGames.filter(function(g){return (g.dt||"")>=todayStr&&g.st!=="done";});
  else if(gAgPeriod==="past")allGames=allGames.filter(function(g){return (g.dt||"")<todayStr||g.st==="done";});
  allGames.sort(function(a,b){var da=(a.dt||"")+(a.tm||""),db=(b.dt||"")+(b.tm||"");return da<db?-1:da>db?1:0;});
  var h='<div class="cd" style="padding:12px;margin-bottom:14px"><div class="rw">';
  h+='<div style="flex:1"><span class="lb">Per\u00edodo</span><select onchange="gAgPeriod=this.value;render()">';
  h+='<option value="upcoming"'+(gAgPeriod==="upcoming"?" selected":"")+'>Pr\u00f3ximos</option>';
  h+='<option value="past"'+(gAgPeriod==="past"?" selected":"")+'>Passados</option>';
  h+='<option value="all"'+(gAgPeriod==="all"?" selected":"")+'>Todos</option>';
  h+='</select></div>';
  h+='<div style="flex:1"><span class="lb">Torneio</span><select onchange="gAgTor=this.value;render()">';
  h+='<option value="all"'+(gAgTor==="all"?" selected":"")+'>Todos</option>';
  var _pubT=getPublicTournaments();for(var i=0;i<_pubT.length;i++){var t=_pubT[i];h+='<option value="'+t.id+'"'+(gAgTor===t.id?" selected":"")+'>'+esc(t.n)+'</option>';}
  h+='</select></div>';
  var cats={};var _pgC=getPublicGames();for(var i=0;i<_pgC.length;i++){if(_pgC[i].cat)cats[_pgC[i].cat]=true;}
  var catKeys=Object.keys(cats).sort();
  h+='<div style="flex:1"><span class="lb">Categoria</span><select onchange="gAgCat=this.value;render()">';
  h+='<option value="all"'+(gAgCat==="all"?" selected":"")+'>Todas</option>';
  for(var i=0;i<catKeys.length;i++)h+='<option value="'+esc(catKeys[i])+'"'+(gAgCat===catKeys[i]?" selected":"")+'>'+esc(catKeys[i])+'</option>';
  h+='</select></div>';
  h+='</div></div>';
  if(isCoord){h+='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bp" onclick="openGameEditor(null)">\u2795 Novo Jogo</button></div>';}
  // Toggle de visualização
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;background:var(--card2);padding:4px;border-radius:10px">';
  h+='<button class="bt '+(gAgView==="team"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gAgView=\'team\';render()">\uD83C\uDFC6 Por Equipe</button>';
  h+='<button class="bt '+(gAgView==="month"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gAgView=\'month\';render()">\uD83D\uDCC5 Por M\u00eas</button>';
  h+='</div>';
  if(!allGames.length){h+='<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Nenhum jogo encontrado para esses filtros.</div>';return h;}
  
  // Visualização agrupada por equipe (default)
  if(gAgView==="team"){
    h+=renderTeamHub(allGames,{showHistory:true});
    return h;
  }
  
  // Visualização legacy: por mês
  var byMonth={},months=[];
  for(var i=0;i<allGames.length;i++){
    var g=allGames[i];
    var key=g.dt?g.dt.substring(0,7):"sem-data";
    if(!byMonth[key]){byMonth[key]=[];months.push(key);}
    byMonth[key].push(g);
  }
  var MES_NM=["Janeiro","Fevereiro","Mar\u00e7o","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  for(var i=0;i<months.length;i++){
    var key=months[i];
    var label;
    if(key==="sem-data")label="Sem data";
    else{var parts=key.split("-");label=MES_NM[parseInt(parts[1])-1]+" "+parts[0];}
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:2px;color:var(--navy);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--brd)">'+label.toUpperCase()+'</div>';
    for(var j=0;j<byMonth[key].length;j++){
      var g=byMonth[key][j];
      var tor=tFnd(g.torId);
      h+=renderGameCard(g,tor?tor.color:null);
    }
  }
  return h;
}

// === TELA "MEU PERFIL" (atleta vinculada) ===
function rPerfilAtleta(){
  if(!userProfile||!userProfile.athleteId){
    return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Voc\u00ea n\u00e3o est\u00e1 vinculada a um perfil de atleta.</div>';
  }
  var aid=userProfile.athleteId;
  var ath=aFind(aid);
  if(!ath){
    return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Atleta n\u00e3o encontrada no banco.</div>';
  }
  // Equipes em que está
  var minhasEquipes=[];
  if(D.teams)for(var i=0;i<D.teams.length;i++){
    var t=D.teams[i];
    if(!t.roster||t.archived)continue;
    for(var j=0;j<t.roster.length;j++){
      if(t.roster[j].aid===aid){minhasEquipes.push(t);break;}
    }

// Presença
function setPresence(gameId,status){
  if(!userProfile||!userProfile.athleteId)return;
  var aid=userProfile.athleteId;
  var ath=aFind(aid);
  if(!ath)return;
  if(!ath.presence)ath.presence={};
  ath.presence[gameId]=status;
  // Toast contextual
  var msg=status==="yes"?"Presen\u00e7a confirmada!":status==="no"?"Aus\u00eancia registrada":"Marcado como talvez";
  toast(msg,"ok");
  save();
}

// PDF próprio do atleta
function exMyAthPDF(){
  if(!userProfile||!userProfile.athleteId){toast("Voc\u00ea n\u00e3o est\u00e1 vinculada","error");return;}
  exAthPDF(userProfile.athleteId);
}
// PDF próprio em um JOGO específico
function exMyAthPDFForGame(gid){
  if(!userProfile||!userProfile.athleteId){toast("Voc\u00ea precisa estar logada como atleta","error");return;}
  // Verificar se atleta está no lineup do jogo
  var g=gF(gid);
  if(!g){toast("Jogo n\u00e3o encontrado","error");return;}
  var aid=userProfile.athleteId;
  var inLineup=false;
  if(g.lineup)for(var i=0;i<g.lineup.length;i++){if(g.lineup[i].aid===aid){inLineup=true;break;}}
  if(!inLineup){
    // Atleta não estava escalada — mostra mensagem amigável
    toast("Voc\u00ea n\u00e3o estava escalada nesse jogo","error");
    return;
  }
  exAthPDF(aid,gid,"all");
}

// Travar/destravar jogo (admin/coord)
function toggleLockGame(gid){
  var g=gF(gid);if(!g)return;
  if(!isCoord){toast("Apenas coordenadores podem travar/destravar jogos","error");return;}
  var willLock=!g.locked;
  confirmModal({
    title:willLock?"TRAVAR JOGO":"DESTRAVAR JOGO",
    body:willLock
      ?"Travar este jogo deixa ele em <b>somente leitura</b>. Ningu\u00e9m poder\u00e1 fazer scout, escalar, ou alterar o placar.<br><br><span style=\"font-size:12px;color:var(--gray)\">Atletas escaladas conseguem exportar seu PDF normalmente. Voc\u00ea pode destravar a qualquer momento.</span>"
      :"Destravar este jogo permite que ele volte a ser <b>editado</b> normalmente.",
    confirmLabel:willLock?"\uD83D\uDD12 Travar":"\uD83D\uDD13 Destravar",
    confirmStyle:willLock?"bd":"bs",
    onConfirm:function(){
      g.locked=willLock;
      save();
      toast(willLock?"Jogo travado":"Jogo destravado","ok");
      render();
    }
  });
}

function delP(tid,aid){

  if(!available.length){toast("Todos os atletas do banco j\u00e1 est\u00e3o nesta equipe","error");return;}
  // Filtrar por gênero da equipe (sugestão, não obrigatório)
  var teamGender=/FEMININO|FEM/i.test(t.n)?"F":/MASCULINO|MASC/i.test(t.n)?"M":null;
  var m='<div class="admin-modal" onclick="closeLinkP()"><div class="admin-box" onclick="event.stopPropagation()" style="text-align:left;max-width:480px;max-height:90vh;overflow-y:auto"><div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px;color:var(--navy);margin-bottom:14px;text-align:center">VINCULAR ATLETA \u00c0 EQUIPE</div>';

  m+='<div id="lp-list" style="max-height:50vh;overflow-y:auto;border:1px solid var(--brd);border-radius:10px">';
  // Ordenar: gênero certo primeiro
  available.sort(function(a,b){
    if(teamGender){
      var aMatch=a.gender===teamGender?0:1;
      var bMatch=b.gender===teamGender?0:1;
      if(aMatch!==bMatch)return aMatch-bMatch;
    }

    if(a.gender==="F")meta.push("\u2640");
    else if(a.gender==="M")meta.push("\u2642");
    if(santosTag)meta.push("\uD83D\uDCE6 Santos");
    if(meta.length)m+='<div style="font-size:11px;color:var(--gray);margin-top:2px">'+meta.join(" \u00b7 ")+'</div>';
    m+='</div><span style="color:var(--brd);font-size:18px">+</span></div>';
  }
  m+='</div>';
  m+='<div style="margin-top:14px"><button class="bt bg" style="width:100%" onclick="closeLinkP()">Fechar</button></div>';

function saveGameEditor(gameId){
  var tid=document.getElementById("g-tid").value;
  var torId=document.getElementById("g-torId").value;
  var cat=document.getElementById("g-cat").value;
  var phase=document.getElementById("g-phase").value.trim();
  var opp=document.getElementById("g-opp").value.trim();
  var dt=document.getElementById("g-dt").value;
  var tm=document.getElementById("g-tm").value;
  var loc=document.getElementById("g-loc").value.trim();
  var rtype=document.getElementById("g-rtype").value;
  var rsets=document.getElementById("g-rsets").value.trim();
  var rtitle=document.getElementById("g-rtitle").value.trim();
  if(!opp){toast("Informe o advers\u00e1rio","error");return;}
  if(!tid){toast("Selecione a equipe","error");return;}
  // Construir result
  var result=null;
  if(rtype){
    result={type:rtype,sets:rsets||null,title:rtitle||null};
  }
  // Definir status do jogo: se tem resultado, "done"; caso contrário preserva ou "pending"
  var st="pending";
  if(rtype)st="done";
  if(!D.games)D.games=[];
  if(gameId){
    var g=gF(gameId);if(!g){toast("Jogo n\u00e3o encontrado","error");return;}
    // Não sobrescrever st="live" se já está em scout ao vivo
    if(g.st!=="live")g.st=st;
    g.tid=tid;g.torId=torId||null;g.cat=cat;g.phase=phase;g.opp=opp;g.dt=dt;g.tm=tm;g.loc=loc;
    g.result=result;
    // Sync campo legado tor
    var t=tFnd(torId);g.tor=t?t.n:"";
    toast("Jogo atualizado","ok");
  }else{
    var t=tFnd(torId);
    D.games.push({id:uid("g_"),tid:tid,torId:torId||null,tor:t?t.n:"",cat:cat,phase:phase,opp:opp,dt:dt,tm:tm,loc:loc,pl:[],act:[],ss:[],st:st,result:result});
    toast("Jogo criado","ok");
  }
  closeGameEditor();
  save();
}

function openLineup(gameId){
  var g=gF(gameId);if(!g){toast("Jogo n\u00e3o encontrado","error");return;}
  var t=tF(g.tid);
  var roster=(t&&t.roster)||[];
  // Estado atual da lineup (mantem ordem dos entries existentes)
  var lineupNow={}, lineupOrder=[];
  if(g.lineup){
    for(var i=0;i<g.lineup.length;i++){
      var le=g.lineup[i]; lineupNow[le.aid]=le; lineupOrder.push(le.aid);
    }
  }
  // Lista: 1) atletas ja na lineup (mantem ordem), 2) atletas do roster
  // que ainda nao foram escalados. Ad-hoc = nao esta em D.athletes.
  // Default: jogo SEM lineup ainda -> marca todos. Com lineup -> so quem ja esta.
  var hadLineup = lineupOrder.length>0;
  var seen={}, list=[];
  for(var i=0;i<lineupOrder.length;i++){
    var aid=lineupOrder[i]; if(seen[aid])continue; seen[aid]=true;
    var entry=lineupNow[aid]; var ath=aFind(aid);
    var nm=(entry&&entry.nm)||(ath&&ath.nm)||"";
    var po=(entry&&entry.po)||(ath&&ath.po)||"";
    var adhoc=!ath;
    list.push({aid:aid,nm:nm,po:po,nu:entry.nu,checked:true,adhoc:adhoc});
  }
  for(var i=0;i<roster.length;i++){
    var aid=roster[i].aid; if(seen[aid])continue; seen[aid]=true;
    var ath=aFind(aid); if(!ath)continue;
    var nu="";
    if(ath.last_nu_by_team&&t&&ath.last_nu_by_team[t.id]!==undefined) nu=ath.last_nu_by_team[t.id];
    list.push({aid:aid,nm:ath.nm,po:ath.po||"",nu:nu,checked:!hadLineup,adhoc:false});
  }
  
  var m='<div class="admin-modal" onclick="closeLineup()"><div class="admin-box" onclick="event.stopPropagation()" style="text-align:left;max-width:480px;max-height:90vh;display:flex;flex-direction:column">';
  m+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:var(--navy);margin-bottom:6px;text-align:center">ESCALA\u00c7\u00c3O</div>';
  m+='<div style="font-size:13px;color:var(--gray);margin-bottom:14px;text-align:center">vs <b>'+esc(g.opp||"")+'</b>'+(t?' \u00b7 '+esc(t.n):'')+'</div>';
  m+='<div style="background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:8px 12px;border-radius:8px;font-size:11px;margin-bottom:12px">\u{1F4A1} Desmarque quem n\u00e3o veio. Ajuste os n\u00fameros conforme as camisas de hoje.</div>';
  m+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px"><span>Atleta</span><span>N\u00ba</span></div>';
  m+='<div id="lu-list" style="overflow-y:auto;flex:1;border:1px solid var(--brd);border-radius:10px;background:var(--card2);max-height:50vh">';
  for(var i=0;i<list.length;i++){
    var it=list[i];
    var rowExtra = it.adhoc?'<button class="lu-remove" data-aid="'+it.aid+'" title="Remover" onclick="event.preventDefault();event.stopPropagation();removeLineupRow(\''+it.aid+'\')">\u2715</button>':'';
    // Row com toggle visual proprio (sem checkbox nativo) \u2014 toque robusto no iOS.
    // Clicar na row inteira alterna marcado/nao. data-on guarda o estado.
    m+='<div class="lu-row'+(it.adhoc?' lu-adhoc':'')+(it.checked?' on':'')+'" data-aid="'+it.aid+'" data-on="'+(it.checked?1:0)+'" onclick="toggleLuRow(this,event)">';
    m+='<div class="lu-toggle"><span class="lu-toggle-check">\u2713</span></div>';
    m+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(it.nm)+(it.adhoc?' <span style="font-size:9px;color:#fbbf24;font-weight:800;letter-spacing:.5px;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px;margin-left:4px">NOVO</span>':'')+'</div>';
    if(it.po)m+='<div style="font-size:10px;color:var(--gray)">'+esc(it.po)+'</div>';
    m+='</div>';
    m+='<input type="number" class="lu-nu" data-aid="'+it.aid+'" value="'+(it.nu===""?"":it.nu)+'" min="0" max="99" placeholder="\u2014" onclick="event.stopPropagation()" style="width:58px;text-align:center;font-weight:800;font-size:16px;padding:8px 4px">';
    m+=rowExtra;
    m+='</div>';
  }
  m+='</div>';
  m+='<div style="display:flex;gap:6px;margin-top:12px"><button class="bt bg bsm" onclick="lineupAll(true)">\u2713 Marcar todos</button><button class="bt bg bsm" onclick="lineupAll(false)">\u2715 Desmarcar todos</button></div>';
  
  // UI de adicionar atleta ad-hoc — fica so na lineup, nao mexe no banco
  m+='<div style="background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:10px;margin-top:12px">';
  m+='<div style="font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.5px;margin-bottom:8px">\u2795 ADICIONAR ATLETA (so neste jogo)</div>';
  m+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  m+='<input id="lu-new-nu" type="number" min="0" max="99" placeholder="N\u00ba" style="width:60px;padding:8px;text-align:center;font-weight:800;font-size:14px">';

  m+='<div style="display:flex;gap:8px;margin-top:12px"><button class="bt bg" style="flex:1" onclick="closeLineup()">Cancelar</button><button class="bt bs" style="flex:2" onclick="saveLineup(\''+gameId+'\')">\u2713 Salvar Escala\u00e7\u00e3o</button></div>';
  m+='</div></div>';
  var d=document.createElement("div");d.id="lineupModal";d.innerHTML=m;document.body.appendChild(d);
}
// Alterna o estado marcado/nao de uma row (toggle visual). Ignora cliques que
// vieram do input de numero ou do botao remover (esses tem stopPropagation).
function toggleLuRow(el,ev){
  if(!el)return;
  var on = el.getAttribute("data-on")==="1";
  on = !on;
  el.setAttribute("data-on", on?"1":"0");
  if(on) el.classList.add("on"); else el.classList.remove("on");
}
function lineupAll(checked){
  var rows=document.querySelectorAll(".lu-row");

function saveLineup(gameId){

    if(seen[nuV]){toast("N\u00famero "+nuV+" repetido na escala\u00e7\u00e3o","error");return;}
    seen[nuV]=true;
    var isAdhoc = row.classList && row.classList.contains("lu-adhoc");
    var entry={aid:aid,nu:nuV};
    if(isAdhoc){
      // Preserva nm/po dentro do proprio entry — atleta vive so na lineup
      entry.nm=labelNm;
      var poEl=row.querySelector('div[style*="color:var(--gray)"]');
      if(poEl)entry.po=(poEl.textContent||"").trim();
    }
    newLineup.push(entry);
  }
  if(!newLineup.length){toast("Selecione pelo menos uma atleta","error");return;}
  g.lineup=newLineup;
  // Atualizar last_nu_by_team so dos atletas que existem em D.athletes
  if(t){
    for(var i=0;i<newLineup.length;i++){
      var ath=aFind(newLineup[i].aid);

        if(!ath.last_nu_by_team)ath.last_nu_by_team={};
        ath.last_nu_by_team[t.id]=newLineup[i].nu;
      }
    }
  }
  closeLineup();
  toast("Escala\u00e7\u00e3o salva ("+newLineup.length+" atletas)","ok");
  save();
}

// Ponto automatico parcial: Ace/Ataque-Ponto/Bloqueio-Ponto => RS marca ponto;
// Saque/Ataque/Bloqueio com Erro => adversario marca ponto. Outros => nada.
function autoScoreSide(ak,oc){
  if(oc==="Ace")return"u";
  if((ak==="ataque"||ak==="bloqueio")&&oc==="Ponto")return"u";
  if((ak==="saque"||ak==="ataque"||ak==="bloqueio")&&oc==="Erro")return"t";
  return null;
}
// ==========================================================
// SCOUT COM QUADRA — posicionamento 1-6 + rotacao automatica (Q0: logica pura)
// Tudo aqui e NO-OP se o jogo nao tem g.courtMode. Nao afeta o scout classico.
// Modelo: g.court[setNumero] = { pos:[aidP1,aidP2,aidP3,aidP4,aidP5,aidP6], serving:"us"|"them" }
//   pos[0]=Posicao 1 (sacador) ... pos[5]=Posicao 6.
// ==========================================================
// Rotacao horaria do volei: quem estava na P2 vai sacar (P1); P1 -> P6; P6 -> P5; etc.
function rotateCourt(pos){
  if(!pos||pos.length!==6)return pos?pos.slice():pos;
  return [pos[1],pos[2],pos[3],pos[4],pos[5],pos[0]];
}
// Inverso (botao "voltar rotacao" / corrigir engano)
function rotateCourtBack(pos){
  if(!pos||pos.length!==6)return pos?pos.slice():pos;
  return [pos[5],pos[0],pos[1],pos[2],pos[3],pos[4]];
}
// Regra side-out. cs={pos,serving}. scoredSide="us"|"them". Retorna NOVO estado (imutavel).
// So rotacionamos quando GANHAMOS o ponto E nao estavamos sacando (recuperamos o saque).
function courtApplyPoint(cs,scoredSide){
  if(!cs||!cs.pos)return cs;
  var next={pos:cs.pos.slice(),serving:cs.serving};
  if(scoredSide==="us"){
    if(cs.serving!=="us"){ next.pos=rotateCourt(cs.pos); next.serving="us"; }
  }else if(scoredSide==="them"){
    if(cs.serving!=="them"){ next.serving="them"; }
  }
  return next;
}
// Estado da quadra do set atual (ou null se nao for modo quadra)
function courtCur(gm){ if(!gm||!gm.courtMode||!gm.court)return null; return gm.court[String(S.cs)]||null; }
// Hook chamado APOS um ponto. side="u"(nosso)|"t"(deles). No-op fora do modo quadra.
// Retorna o snapshot ANTERIOR (pra o undo restaurar) ou null.
function courtRegisterPoint(side){
  var gm=gF(S.aid);
  if(!gm||!gm.courtMode||!gm.court)return null;
  var k=String(S.cs); var cs=gm.court[k];
  if(!cs||!cs.pos)return null;
  var snap={pos:cs.pos.slice(),serving:cs.serving};
  gm.court[k]=courtApplyPoint(cs, side==="u"?"us":"them");
  return snap;
}

    if(tok){ var b=getBrand(tok); if(b && b.logo) return b.logo; }
  }
  return LR;
}

        if(/^body\b/i.test(s)) return '#pdfOverlay-doc'+s.replace(/^body/i,'');
        if(/^html\b/i.test(s)) return '#pdfOverlay-doc'+s.replace(/^html/i,'');
        return '#pdfOverlay-doc '+s;

      return brk+' '+prefixed+'{';
    });
    styleBlocks += '<style>'+scoped+'</style>';
    return '';
  });
  // Remove tags <!DOCTYPE>, <html>, <head>, <body> wrappers
  bodyContent = bodyContent
    .replace(/<!DOCTYPE[^>]*>/gi,'')
    .replace(/<\/?html[^>]*>/gi,'')
    .replace(/<head[\s\S]*?<\/head>/gi,'')
    .replace(/<\/?body[^>]*>/gi,'')
    .replace(/<meta[^>]*>/gi,'')
    .replace(/<title[\s\S]*?<\/title>/gi,'');

  var overlay=document.createElement("div");
  overlay.id="pdfOverlay";
  overlay.className="pdf-overlay";
  var bar='<div class="pdf-overlay-bar no-print">';
  bar+='<button class="pdf-overlay-back" onclick="closePdfOverlay()">\u2190 Voltar</button>';
  bar+='<div class="pdf-overlay-title">'+esc(title||"PDF")+'</div>';
  bar+='<button class="pdf-overlay-print" onclick="printPdfOverlay()">\ud83d\udda8\ufe0f Salvar PDF</button>';
  bar+='</div>';
  var doc='<div id="pdfOverlay-doc" class="pdf-overlay-doc">'+bodyContent+'</div>';
  overlay.innerHTML=bar+styleBlocks+doc;
  document.body.appendChild(overlay);
  document.body.classList.add("pdf-overlay-open");
}
function printPdfOverlay(){
  // window.print() imprime a pagina inteira, mas @media print esconde tudo
  // exceto #pdfOverlay \u2014 resultado: PDF tem so o conteudo do relatorio.
  try{ window.print(); }catch(e){ alert("Nao foi possivel abrir o dialogo de impressao."); }
}
function closePdfOverlay(){
  var el=document.getElementById("pdfOverlay");
  if(el) el.parentNode.removeChild(el);
  document.body.classList.remove("pdf-overlay-open");
}

/* ===== PAINEL AO VIVO (torneio) — so leitura de gm.act ===== */
/* Calcula as estatisticas do painel a partir das acoes de um jogo.
   scope: "set" usa so as acoes do set informado; "game" usa o jogo todo.
   Retorna {team:{...}, prev:{...}|null, players:[...]}. Funcao pura, testavel. */
function livePanelStats(gm,scope,curSet){
  var acts=(gm&&gm.act)?gm.act:[];
  function calc(list){
    var atk={pt:0,err:0,n:0}, rec={good:0,n:0}, errAll=0, byP={};
    for(var i=0;i<list.length;i++){
      var a=list[i];
      if(a.ak==="ataque"){atk.n++;if(a.oc==="Ponto")atk.pt++;else if(a.oc==="Erro")atk.err++;}
      if(a.ak==="recepcao"){rec.n++;if(a.oc==="A"||a.oc==="B")rec.good++;}
      if(a.oc==="Erro")errAll++;
      if(!byP[a.pid])byP[a.pid]={pid:a.pid,n:0,f:{}};
      byP[a.pid].n++;
      if(!byP[a.pid].f[a.ak])byP[a.pid].f[a.ak]={n:0,o:{}};
      byP[a.pid].f[a.ak].n++;
      byP[a.pid].f[a.ak].o[a.oc]=(byP[a.pid].f[a.ak].o[a.oc]||0)+1;
    }
    return {
      atkEff: atk.n? Math.round((atk.pt-atk.err)/atk.n*100):null,
      recApr: rec.n? Math.round(rec.good/rec.n*100):null,
      errAll: errAll,
      byP: byP
    };
  }
  var inScope, prevList=null;
  if(scope==="set"){
    inScope=acts.filter(function(a){return (a.set||1)===curSet;});
    if(curSet>1)prevList=acts.filter(function(a){return (a.set||1)===(curSet-1);});
  }else{
    inScope=acts.slice();
  }
  var cur=calc(inScope);
  var prev=prevList?calc(prevList):null;
  // monta lista de atletas (ordenada por volume de acoes, desc)
  var players=[];
  var pids=Object.keys(cur.byP);
  for(var i=0;i<pids.length;i++){
    var p=cur.byP[pids[i]];
    var atk=p.f["ataque"], rec=p.f["recepcao"];
    var atkPt=atk?(atk.o["Ponto"]||0):0, atkErr=atk?(atk.o["Erro"]||0):0;
    var atkEff=(atk&&atk.n)?Math.round((atkPt-atkErr)/atk.n*100):null;
    var recGood=rec?((rec.o["A"]||0)+(rec.o["B"]||0)):0;
    var recApr=(rec&&rec.n)?Math.round(recGood/rec.n*100):null;
    // veredito: bad se ataque eficiencia negativa OU passe abaixo de 50%
    var verdict="neutral";
    if((atkEff!==null&&atkEff<0)||(recApr!==null&&recApr<50))verdict="bad";
    else if((atkEff!==null&&atkEff>=50)||(recApr!==null&&recApr>=70))verdict="good";
    players.push({pid:p.pid,n:p.n,f:p.f,atkPt:atkPt,atkErr:atkErr,atkEff:atkEff,
                  recGood:recGood,recApr:recApr,verdict:verdict});
  }
  players.sort(function(a,b){return b.n-a.n;});
  return {team:cur,prev:prev,players:players};
}

var _livePanelGid=null, _livePanelScope="set";
function openLivePanel(gid){ _livePanelGid=gid; _livePanelScope="set"; renderLivePanel(); }
function closeLivePanel(){ var o=document.getElementById("_livePanel"); if(o)o.parentNode.removeChild(o); _livePanelGid=null; }
function setLivePanelScope(sc){ _livePanelScope=sc; renderLivePanel(); }

function renderLivePanel(){
  var gm=gF(_livePanelGid); if(!gm)return;
  var old=document.getElementById("_livePanel"); if(old)old.parentNode.removeChild(old);
  var curSet=(gm.ss&&gm.ss.length)?gm.ss.length:1;
  var st=livePanelStats(gm,_livePanelScope,curSet);
  var setLbl=(gm.ss&&gm.ss.length)?("SET "+curSet+" \u00b7 "+gm.ss[curSet-1].u+"-"+gm.ss[curSet-1].t):"";
  function trend(cur,prev,invert){
    if(cur===null||prev===null)return "";
    var d=cur-prev; if(d===0)return "<span style=\"color:#64748b\">\u2014 0</span>";
    var up=d>0, goodDir=invert?!up:up;
    var col=goodDir?"#22c55e":"#dc2626";
    var ic=up?"\u2197":"\u2198";
    return "<span style=\"color:"+col+"\">"+ic+" "+(d>0?"+":"")+d+"</span>";
  }
  function cls(v,lo,hi,invert){
    if(v===null)return "";
    if(invert){ if(v<=lo)return "ok"; if(v<=hi)return "warn"; return "bad"; }
    if(v>=hi)return "ok"; if(v>=lo)return "warn"; return "bad";
  }
  function col(c){ return c==="ok"?"#22c55e":c==="warn"?"#fbbf24":c==="bad"?"#f87171":"#cbd5e1"; }
  var t=st.team, p=st.prev;
  var h='<div class="lv-ov" id="_livePanel" onclick="if(event.target===this)closeLivePanel()">';
  h+='<div class="lv-panel" style="--rs-watermark:url(\''+LR+'\')">';
  h+='<div class="lv-hd"><div class="lv-ttl"><span class="lv-dot"></span>PAINEL AO VIVO</div>';
  h+='<button class="lv-x" onclick="closeLivePanel()">\u2715</button></div>';
  h+='<div class="lv-sub">RS vs '+esc(gm.opp||"")+(setLbl?" \u00b7 "+setLbl:"")+'</div>';
  h+='<div class="lv-tgl">';
  h+='<div class="lv-tbtn'+(_livePanelScope==="set"?" on":"")+'" onclick="setLivePanelScope(\'set\')">SET ATUAL</div>';
  h+='<div class="lv-tbtn'+(_livePanelScope==="game"?" on":"")+'" onclick="setLivePanelScope(\'game\')">JOGO TODO</div>';
  h+='</div>';
  // Bloco 1 - Termometro
  h+='<div class="lv-sec"><div class="lv-seclbl">TERM\u00d4METRO DO TIME<span></span></div>';
  var c1=cls(t.atkEff,0,50,false), c2=cls(t.recApr,50,70,false), c3=cls(t.errAll,4,8,true);
  h+='<div class="lv-kpis">';
  h+='<div class="lv-kpi '+c1+'"><div class="lv-kval" style="color:'+col(c1)+'">'+(t.atkEff===null?"\u2013":t.atkEff+"%")+'</div><div class="lv-klbl">EFIC.<br>ATAQUE</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.atkEff,p?p.atkEff:null,false):"")+'</div></div>';
  h+='<div class="lv-kpi '+c2+'"><div class="lv-kval" style="color:'+col(c2)+'">'+(t.recApr===null?"\u2013":t.recApr+"%")+'</div><div class="lv-klbl">APROV.<br>PASSE</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.recApr,p?p.recApr:null,false):"")+'</div></div>';
  h+='<div class="lv-kpi '+c3+'"><div class="lv-kval" style="color:'+col(c3)+'">'+t.errAll+'</div><div class="lv-klbl">ERROS<br>N/ FOR\u00c7.</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.errAll,p?p.errAll:null,true):"")+'</div></div>';
  h+='</div></div>';
  // Bloco 2 - Por atleta
  h+='<div class="lv-sec"><div class="lv-seclbl">POR ATLETA<span></span><small>ORDEM: VOLUME</small></div>';
  if(!st.players.length){
    h+='<div class="lv-empty">Nenhuma a\u00e7\u00e3o registrada neste recorte.</div>';
  }else{
    var fLbl={saque:"Saque",recepcao:"Passe",levantamento:"Levant.",ataque:"Ataque",bloqueio:"Bloqueio",defesa:"Defesa"};
    for(var i=0;i<st.players.length;i++){
      var pl=st.players[i];
      var pf=pFind(pl.pid,_livePanelGid);
      var nm=pf?pf.nm.split(" ")[0]:"?";
      var nu=pf?pf.nu:"-";
      var stripCol=pl.verdict==="bad"?"#dc2626":pl.verdict==="good"?"#16a34a":"#475569";
      h+='<div class="lv-card '+(pl.verdict==="bad"?"bad":pl.verdict==="good"?"good":"")+'">';
      h+='<div class="lv-strip" style="background:'+stripCol+'"></div>';
      h+='<div class="lv-cbody"><div class="lv-chd">';
      h+='<span class="lv-num">'+nu+'</span><span class="lv-nm">'+esc(nm)+'</span>';
      if(pl.verdict==="bad")h+='<span class="lv-tag bad">ATEN\u00c7\u00c3O</span>';
      else if(pl.verdict==="good")h+='<span class="lv-tag good">EM ALTA</span>';
      h+='</div>';
      // ataque com barra
      if(pl.f["ataque"]){
        var an=pl.f["ataque"].n, gp=an?Math.round(pl.atkPt/an*100):0, ge=an?Math.round(pl.atkErr/an*100):0;
        h+='<div class="lv-frow"><span class="lv-flbl">Ataque</span>';
        h+='<span class="lv-bar"><i style="width:'+gp+'%;background:#16a34a"></i><i style="width:'+ge+'%;background:#dc2626"></i></span>';
        h+='<span class="lv-fval">'+pl.atkPt+'p \u00b7 '+pl.atkErr+'e \u00b7 <b style="color:'+(pl.atkEff>=50?"#22c55e":pl.atkEff>=0?"#fbbf24":"#f87171")+'">'+(pl.atkEff===null?"\u2013":pl.atkEff+"%")+'</b></span></div>';
      }
      // passe com barra
      if(pl.f["recepcao"]){
        var ro=pl.f["recepcao"].o, rn=pl.f["recepcao"].n;
        var pA=Math.round((ro["A"]||0)/rn*100),pB=Math.round((ro["B"]||0)/rn*100),pC=Math.round((ro["C"]||0)/rn*100),pE=Math.round((ro["Erro"]||0)/rn*100);
        h+='<div class="lv-frow"><span class="lv-flbl">Passe</span>';
        h+='<span class="lv-bar"><i style="width:'+pA+'%;background:#16a34a"></i><i style="width:'+pB+'%;background:#d97706"></i><i style="width:'+pC+'%;background:#ea580c"></i><i style="width:'+pE+'%;background:#dc2626"></i></span>';
        h+='<span class="lv-fval">A'+(ro["A"]||0)+' B'+(ro["B"]||0)+' C'+(ro["C"]||0)+' <b style="color:'+(pl.recApr>=70?"#22c55e":pl.recApr>=50?"#fbbf24":"#f87171")+'">'+(pl.recApr===null?"\u2013":pl.recApr+"%")+'</b></span></div>';
      }
      // demais fundamentos em texto enxuto
      var others=["saque","levantamento","bloqueio","defesa"];
      for(var j=0;j<others.length;j++){
        var ak=others[j];
        if(pl.f[ak]){
          var o=pl.f[ak].o, parts=[];
          for(var k in o)parts.push(o[k]+" "+k.toLowerCase());
          h+='<div class="lv-frow"><span class="lv-flbl">'+fLbl[ak]+'</span><span class="lv-ftxt">'+parts.join(" \u00b7 ")+'</span></div>';
        }
      }
      h+='</div></div>';
    }
  }
  h+='</div></div></div>';
  var wrap=document.createElement("div");
  wrap.innerHTML=h;
  document.body.appendChild(wrap.firstChild);
}
