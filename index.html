  }
  m+='<div style="margin-bottom:14px"><span class="lb">Em equipes</span>';
  if(teamsList.length){
    m+='<div style="display:flex;flex-direction:column;gap:6px">';
    for(var i=0;i<teamsList.length;i++){
      var tl=teamsList[i];
      m+='<div style="background:var(--card2);padding:8px 10px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:13px"><span style="background:'+tl.c+'30;color:'+tl.c+';padding:2px 8px;border-radius:5px;font-weight:800" title="\u00daltimo n\u00famero usado">'+(tl.lastNu!==null?"#"+tl.lastNu:"\u2014")+'</span><span style="flex:1">'+esc(tl.tn)+(tl.arch?' <span style="font-size:10px;color:var(--gray)">[arquivada]</span>':'')+'</span></div>';
    }
    m+='</div>';
  }else{
    m+='<div style="color:var(--gray);font-size:12px;font-style:italic">Atleta n\u00e3o vinculado(a) a nenhuma equipe</div>';
  }
  m+='</div>';
  // Tags
  var tags=ath.tags||[];
  if(tags.length){
    m+='<div style="margin-bottom:14px"><span class="lb">Tags</span><div style="display:flex;flex-wrap:wrap;gap:4px">';
    for(var i=0;i<tags.length;i++)m+='<span style="background:#fef3c7;color:#92400e;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600">'+esc(tags[i])+'</span>';
    m+='</div></div>';
  }
  m+='<div style="display:flex;gap:8px">';
  if(!teamsList.length)m+='<button class="bt bd bsm" onclick="delAthleteFromBank(\''+aid+'\')">\u{1F5D1}</button>';
  m+='<button class="bt bg" style="flex:1" onclick="closeAthBank()">Cancelar</button>';
  m+='<button class="bt bs" style="flex:1" onclick="saveAthBank(\''+aid+'\')">\u2713 Salvar</button></div>';
  m+='</div></div>';
  var d=document.createElement("div");d.id="abModal";d.innerHTML=m;document.body.appendChild(d);
}

function rArchive(){
  var arc=getArchivedTeams();
  if(!arc.length)return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Nenhuma equipe arquivada.</div>';
  // Agrupar por archive_label
  var byLabel={};
  for(var i=0;i<arc.length;i++){
    var lbl=arc[i].archive_label||"Arquivo";
    if(!byLabel[lbl])byLabel[lbl]=[];
    byLabel[lbl].push(arc[i]);
  }
  var h='<div style="background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:14px">\u{1F4E6} As equipes arquivadas guardam o hist\u00f3rico de torneios passados. Atletas e dados s\u00e3o preservados como refer\u00eancia, mas n\u00e3o aparecem na opera\u00e7\u00e3o ativa do app. Para reativar uma equipe, use o bot\u00e3o <b>Restaurar</b> ao lado dela.</div>';
  var labels=Object.keys(byLabel);
  for(var li=0;li<labels.length;li++){
    var lbl=labels[li];
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:var(--navy);margin:18px 0 10px">\u{1F4E6} '+esc(lbl).toUpperCase()+'</div>';
    var grp=byLabel[lbl];
    for(var i=0;i<grp.length;i++){
      var t=grp[i];
      var pc=t.roster?t.roster.length:0;
      var gc=0;if(D.games)for(var j=0;j<D.games.length;j++){if(D.games[j].tid===t.id)gc++;}
      h+='<div class="cd" style="border-left:4px solid '+t.c+';padding:14px 16px;margin-bottom:8px;opacity:.85">';
      h+='<div style="display:flex;align-items:center;gap:12px">'+tLs(t)+'<div style="flex:1"><b style="font-size:15px">'+esc(t.n)+'</b><div style="margin-top:3px"><span class="badge" style="background:'+t.c+'15;color:'+t.c+'">'+pc+' atletas</span> <span class="badge" style="background:var(--card2);color:var(--gray)">'+gc+' jogos</span></div></div>';
      h+='<div style="display:flex;flex-direction:column;gap:4px"><button class="bt bg bsm" onclick="unarchiveTeam(\''+t.id+'\')">\u21A9 Restaurar</button></div>';
      h+='</div>';
      // Lista atletas (apenas leitura)
      if(t.roster&&t.roster.length){
        // Ordenar pelo último número usado (se houver) ou por nome
        var rosterEntries=t.roster.slice();
        var enrichedArc=[];
        for(var k=0;k<rosterEntries.length;k++){
          var entry=rosterEntries[k];
          var ath=aFind(entry.aid);
          if(!ath)continue;
          var lastNu=ath.last_nu_by_team&&ath.last_nu_by_team[t.id]!==undefined?ath.last_nu_by_team[t.id]:null;
          enrichedArc.push({entry:entry,ath:ath,lastNu:lastNu});
        }
        enrichedArc.sort(function(a,b){
          if(a.lastNu!==null&&b.lastNu!==null)return a.lastNu-b.lastNu;
          if(a.lastNu!==null)return -1;
          if(b.lastNu!==null)return 1;
          return (a.ath.nm||"").localeCompare(b.ath.nm||"");
        });
        h+='<div style="margin-top:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px">';
        for(var k=0;k<enrichedArc.length;k++){
          var item=enrichedArc[k];
          var lbl=item.lastNu!==null?String(item.lastNu):"\u2014";
          h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card2);border-radius:8px;font-size:12px"><span style="background:'+t.c+'30;color:'+t.c+';width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px">'+lbl+'</span><span style="font-weight:600">'+esc(item.ath.nm)+'</span></div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
  }
  return h;
}

function mkBar(data,ht){var mx=0;for(var i=0;i<data.length;i++)if(data[i].v>mx)mx=data[i].v;if(!mx)mx=1;var s='<div class="chart-bar" style="height:'+ht+'px">';for(var i=0;i<data.length;i++){var d=data[i];var bh=Math.max(4,d.v/mx*(ht-35));s+='<div class="bar" style="height:'+bh+'px;background:'+d.c+'"><div class="bar-val" style="color:'+d.c+'">'+d.v+'</div><div class="bar-label">'+d.l+'</div></div>';}return s+'</div>';}
function mkPie(data){var total=0;for(var i=0;i<data.length;i++)total+=data[i].v;if(!total)return'';var cum=0;var grad="";for(var i=0;i<data.length;i++){var pct=data[i].v/total*100;grad+=data[i].c+" "+cum+"% "+(cum+pct)+"%";cum+=pct;if(i<data.length-1)grad+=",";}var s='<div class="chart-pie" style="background:conic-gradient('+grad+')"></div><div class="pie-legend">';for(var i=0;i<data.length;i++){s+='<span><span class="dot" style="background:'+data[i].c+'"></span>'+data[i].l+' ('+data[i].v+')</span>';}return s+'</div>';}

function rDest(fcol){
// Filtros próprios encadeados
var dGames=getFinGames(gDstTeam);
var h=rFilters(gDstTeam,gDstGame,"setDstTeam(this.value)","setDstGame(this.value)");
// Destaques só aparecem com jogo específico selecionado
if(gDstGame==="all"){
  return h+'<div style="text-align:center;padding:50px 20px;color:var(--gray)"><div style="font-size:42px;margin-bottom:10px">\u{1F3C6}</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Selecione um jogo</div><div style="font-size:12px">Os destaques s\u00e3o calculados por partida.<br>Escolha um jogo no filtro acima.</div></div>';
}
var acts=collectActs(dGames,gDstGame);
if(!acts.length)return h+'<div style="text-align:center;padding:30px;color:var(--gray)">Sem a\u00e7\u00f5es registradas neste jogo.</div>';
// Agregação por atleta
var agg={};
for(var i=0;i<acts.length;i++){
  var a=acts[i];
  if(!agg[a.pid])agg[a.pid]={total:0,pts:0,offTotal:0,byF:{}};
  agg[a.pid].total++;
  // Ponto = Ace (saque), Ataque com "Ponto", Bloqueio com "Ponto"
  if(a.oc==="Ace"||(a.ak==="ataque"&&a.oc==="Ponto")||(a.ak==="bloqueio"&&a.oc==="Ponto"))agg[a.pid].pts++;
  // Ações ofensivas (saque/ataque/bloqueio) — denominador do % do pontuador
  if(a.ak==="saque"||a.ak==="ataque"||a.ak==="bloqueio")agg[a.pid].offTotal++;
  // Por fundamento
  if(!agg[a.pid].byF[a.ak])agg[a.pid].byF[a.ak]={n:0,good:0};
  agg[a.pid].byF[a.ak].n++;
  // O que conta como "good" por fundamento
  var good=false;
  if(a.ak==="saque"&&a.oc==="Ace")good=true;
  else if(a.ak==="recepcao"&&a.oc==="A")good=true;
  else if(a.ak==="levantamento"&&a.oc==="A")good=true;
  else if(a.ak==="ataque"&&a.oc==="Ponto")good=true;
  else if(a.ak==="bloqueio"&&a.oc==="Ponto")good=true;
  else if(a.ak==="defesa"&&a.oc==="A")good=true;
  if(good)agg[a.pid].byF[a.ak].good++;
}
// MVP — maior pontuador
var pids=Object.keys(agg);
var mvpId=null,mvpPts=0;
for(var i=0;i<pids.length;i++){if(agg[pids[i]].pts>mvpPts){mvpPts=agg[pids[i]].pts;mvpId=pids[i];}}
if(mvpId){
  var mvp=pFind(mvpId,gDstGame);var mvpAgg=agg[mvpId];
  var mvpPct=mvpAgg.offTotal>0?Math.round(mvpAgg.pts/mvpAgg.offTotal*100):0;
  if(mvp){
    h+='<div style="background:linear-gradient(135deg,'+mvp.tc+'ee,'+mvp.tc+'aa);border-radius:18px;padding:20px;color:white;margin-bottom:18px;box-shadow:0 8px 24px '+mvp.tc+'40;position:relative;overflow:hidden">';
    h+='<div style="position:absolute;top:8px;right:14px;font-size:11px;font-weight:800;letter-spacing:2px;opacity:.85">\u{1F3C6} MAIOR PONTUADOR</div>';
    h+='<div style="display:flex;align-items:center;gap:18px;margin-top:18px">';
    h+='<div style="width:82px;height:82px;border-radius:18px;background:rgba(255,255,255,.95);color:'+mvp.tc+';display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:46px;font-weight:900;flex-shrink:0">'+mvp.nu+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:4px">'+esc(mvp.nm)+'</div>';
    h+='<div style="font-size:12px;opacity:.9;margin-bottom:10px">'+esc(mvp.po)+' \u00b7 '+esc(mvp.tn)+'</div>';
    h+='<div style="display:flex;gap:14px"><div><div style="font-family:Bebas Neue,sans-serif;font-size:32px;line-height:1">'+mvpPts+'</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">PONTOS</div></div><div><div style="font-family:Bebas Neue,sans-serif;font-size:32px;line-height:1">'+mvpPct+'%</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">APROVEIT.</div></div></div>';
    h+='</div></div></div>';
  }
}
// Melhor por fundamento
var fundOrder=["saque","recepcao","levantamento","ataque","bloqueio","defesa"];
h+='<div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:var(--navy);margin:18px 0 10px">\u2B50 MELHOR POR FUNDAMENTO</div>';
h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px">';
for(var fi=0;fi<fundOrder.length;fi++){
  var fk=fundOrder[fi];
  var fc2=fcol[fk];
  var bestId=null,bestGood=0,bestN=0;
  for(var i=0;i<pids.length;i++){
    var pa=agg[pids[i]].byF[fk];
    if(!pa||pa.n<3)continue; // mínimo 3 ações
    if(pa.good>bestGood){bestGood=pa.good;bestN=pa.n;bestId=pids[i];}
  }
  h+='<div class="cd" style="padding:14px;border-left:5px solid '+fc2+';position:relative">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:20px">'+(ACT[fk]?ACT[fk].i:"")+'</span><span style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;color:'+fc2+'">'+(ACT[fk]?ACT[fk].l.toUpperCase():fk)+'</span></div>';
  if(bestId){
    var bp=pFind(bestId,gDstGame);
    if(bp){
      var pct=bestN>0?Math.round(bestGood/bestN*100):0;
      h+='<div style="display:flex;align-items:center;gap:10px"><div style="width:42px;height:42px;border-radius:10px;background:'+bp.tc+'18;color:'+bp.tc+';display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:22px;font-weight:900;flex-shrink:0">'+bp.nu+'</div><div style="flex:1;min-width:0;overflow:hidden"><div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(bp.nm)+'</div><div style="font-size:10px;color:var(--gray)">'+esc(bp.tn)+'</div></div></div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)"><div style="flex:1"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+fc2+';line-height:1">'+bestGood+'</div><div style="font-size:9px;color:var(--gray);letter-spacing:1px">QTD</div></div><div style="flex:1"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+fc2+';line-height:1">'+pct+'%</div><div style="font-size:9px;color:var(--gray);letter-spacing:1px">APROV.</div></div></div>';
    }
  }else{
    h+='<div style="font-size:12px;color:var(--gray);padding:14px 0;text-align:center;font-style:italic">Sem dados<br><span style="font-size:10px">(m\u00edn. 3 a\u00e7\u00f5es)</span></div>';
  }
  h+='</div>';
}
h+='</div>';
return h;
}

    // de "nenhum torneio" (evita o flash que parece perda de dados).

      h+='<div class="rs-tor-empty"><div class="rs-tor-empty-icon">\u23F3</div><div class="rs-tor-empty-title">Carregando torneios\u2026</div></div></div>';

    return h;
  }
  // Separar por status. Fase C: encerrados (archived) viram grupo proprio,
  // independente de st \u2014 torneio so-leitura/historico.
  // Fase PG isolamento: torneios standalone (PG) so via deep-link \u2014 nao aparecem aqui.
  var live=[],done=[],pending=[],archived=[];
  for(var i=0;i<tournaments.length;i++){
    var t=tournaments[i];
    if(isArchivedTor(t)) archived.push(t);
    else if(t.st==="done") done.push(t);
    else if(t.st==="live") live.push(t);
    else pending.push(t);
  }
  function renderGroup(title,arr){
    if(!arr.length)return '';
    var hh='<div class="rs-tor-group"><div class="rs-tor-group-title">'+title+'</div>';
    hh+='<div class="rs-tor-grid">';
    for(var k=0;k<arr.length;k++){
      var t=arr[k];
      var nGames=0,nDone=0;
      if(D.games)for(var j=0;j<D.games.length;j++){
        if(D.games[j].torId===t.id){nGames++;if(D.games[j].st==="done")nDone++;}
      }
      var color=t.color||"#2563eb";
      var pct=t.tot?Math.min(100,Math.round(nDone/t.tot*100)):0;
      // Fase C: cards arquivados ganham classe is-archived (cinza) + selo.
      var archCls = isArchivedTor(t) ? ' is-archived' : '';

      hh+='<div class="rs-tor-card'+archCls+'" onclick="selectTor(\''+t.id+'\')">';
      if(isArchivedTor(t)) hh+='<div class="rs-tor-archived-badge">\uD83D\uDCE6 ENCERRADO</div>';
      hh+='<div class="rs-tor-card-top" style="background:linear-gradient(135deg,'+color+','+color+'cc)">';
      if(t.brandLogoData) hh+='<img class="rs-tor-card-logo" src="'+t.brandLogoData+'">';
      if(flag2) hh+='<div class="rs-tor-card-flag">'+flag2+'</div>';
      hh+='<div class="rs-tor-card-title" style="color:#fff;font-size:18px;font-weight:800">'+esc(t.n)+'</div>';
      if(t.cat) hh+='<div class="rs-tor-card-cat2">'+esc((t.cat||"").replace(/<br>/g," "))+'</div>';
      hh+='</div>';
      hh+='<div class="rs-tor-card-body">';
      hh+='<div class="rs-tor-progress-row"><span>'+esc(t.season||"")+'</span><span><b>'+nDone+'</b> de '+(t.tot||nGames)+' jogos</span></div>';
      hh+='<div class="rs-tor-progress-track"><div class="rs-tor-progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
      hh+='</div></div>';
    }
    hh+='</div></div>';
    return hh;
  }
  h+=renderGroup("\u25CF Em andamento",live);
  h+=renderGroup("\u23F3 Programados",pending);
  h+=renderGroup("\u2713 Conclu\u00eddos",done);
  h+=renderGroup("\uD83D\uDCE6 Encerrados / Hist\u00F3rico",archived);
  h+='</div>';
  return h;
}

// Retorna um label curto e descritivo da equipe (pra chips em cards)
function teamShortLabel(tid){
  var t=tF(tid);if(!t)return "";
  // Prefere abreviar nomes longos. Se o nome tem "MASCULINO", "FEMININO", abreviar.
  var n=t.n||"";
  // Padrões comuns no projeto
  if(/MASCULINO/i.test(n))return "RS Masc";
  if(/FEMININO/i.test(n)){
    // Tentar pegar a categoria depois de FEMININO (ex: "RS FEMININO E1" -> "RS Fem E1")
    var m=n.match(/FEMININO\s+(\S+)/i);
    if(m)return "RS Fem "+m[1];
    return "RS Fem";
  }
  // Fallback: primeiras 14 chars
  return n.length>16?n.substring(0,14)+"\u2026":n;
}

// === HUB POR EQUIPE: agrupa lista de jogos em cards de equipe ===
// Usado em Scout (visitante), Agenda e Torneios para uma visualização mais bonita
// e organizada (cards por equipe contendo jogos como sub-cards)
// opts: { showHistory:true, emptyMessage:"...", torColor:"..." (override) }
function renderTeamHub(games, opts){
  opts = opts || {};
  if(!games || !games.length){
    return '<div class="cd" style="padding:40px 24px;text-align:center;color:var(--gray)">'+
      '<div style="font-size:42px;margin-bottom:10px">\u{1F3D0}</div>'+
      '<div style="font-size:14px;font-weight:600">'+(opts.emptyMessage||"Nenhum jogo dispon\u00edvel")+'</div>'+
      '</div>';
  }
  // Agrupar por team id
  var byTeam = {};
  var teamOrder = [];
  for(var i=0;i<games.length;i++){
    var g = games[i];
    var tid = g.tid || "_sem_equipe_";
    if(!byTeam[tid]){
      byTeam[tid] = {team: tF(tid), games: [], upcoming: [], past: [], live: []};
      teamOrder.push(tid);
    }
    byTeam[tid].games.push(g);
  }
  // Classificar dentro de cada equipe
  var hoje = new Date();hoje.setHours(0,0,0,0);
  for(var t=0;t<teamOrder.length;t++){
    var grp = byTeam[teamOrder[t]];
    for(var k=0;k<grp.games.length;k++){
      var gg = grp.games[k];
      if(gg.st==="live"){grp.live.push(gg);continue;}
      var jaJogou = false;
      if(gg.st==="done") jaJogou = true;
      else if(gg.dt){
        var d = new Date(gg.dt+"T12:00:00");
        if(d < hoje) jaJogou = true;
      }
      if(jaJogou) grp.past.push(gg);
      else grp.upcoming.push(gg);
    }
    // Ordenar
    grp.upcoming.sort(function(a,b){
      if(!a.dt&&!b.dt)return 0;if(!a.dt)return 1;if(!b.dt)return -1;
      var da=new Date(a.dt+"T"+(a.tm||"23:59")),db=new Date(b.dt+"T"+(b.tm||"23:59"));
      return da-db;
    });
    grp.past.sort(function(a,b){
      if(!a.dt&&!b.dt)return 0;if(!a.dt)return 1;if(!b.dt)return -1;
      var da=new Date(a.dt+"T"+(a.tm||"23:59")),db=new Date(b.dt+"T"+(b.tm||"23:59"));
      return db-da; // mais recente primeiro
    });
  }
  
  // Ordenar equipes: primeiro com jogo ao vivo, depois por próximo jogo mais cedo
  teamOrder.sort(function(a,b){
    var ga=byTeam[a],gb=byTeam[b];
    if(ga.live.length&&!gb.live.length)return -1;
    if(!ga.live.length&&gb.live.length)return 1;
    var nextA=ga.upcoming[0],nextB=gb.upcoming[0];
    if(nextA&&!nextB)return -1;
    if(!nextA&&nextB)return 1;
    if(nextA&&nextB){
      var da=new Date((nextA.dt||"9999-12-31")+"T"+(nextA.tm||"23:59"));
      var db=new Date((nextB.dt||"9999-12-31")+"T"+(nextB.tm||"23:59"));
      return da-db;
    }
    return 0;
  });
  
  var h = '';
  for(var t=0;t<teamOrder.length;t++){
    var grp = byTeam[teamOrder[t]];
    var team = grp.team;
    if(!team) continue;
    var tc = team.c || "#64748b";
    var hasLive = grp.live.length > 0;
    
    // Card da equipe
    h+='<div class="th-card" style="border-color:'+tc+'30">';
    
    // Header da equipe
    h+='<div class="th-header" style="background:linear-gradient(135deg,'+tc+'14,'+tc+'05)" onclick="toggleTeamHub(\''+team.id+'\')">';
    h+='<div class="th-logo-wrap" style="background:'+tc+'20;border-color:'+tc+'40">';
    h+=tLs(team);
    h+='</div>';
    h+='<div class="th-info">';
    h+='<div class="th-name" style="color:'+tc+'">'+esc(team.n)+'</div>';
    h+='<div class="th-meta">';
    if(hasLive)h+='<span class="th-chip th-chip-live">\u25CF AO VIVO</span>';
    if(grp.upcoming.length)h+='<span class="th-chip th-chip-up" style="background:'+tc+'15;color:'+tc+'">'+grp.upcoming.length+' pr\u00f3ximo'+(grp.upcoming.length===1?"":"s")+'</span>';
    if(grp.past.length)h+='<span class="th-chip th-chip-past">'+grp.past.length+' jogado'+(grp.past.length===1?"":"s")+'</span>';
    h+='</div>';
    h+='</div>';
    h+='<div class="th-toggle">\u25BC</div>';
    h+='</div>';
    
    // Body (jogos)
    h+='<div class="th-body" id="th-body-'+team.id+'">';
    
    // AO VIVO (se tiver)
    if(grp.live.length){
      h+='<div class="th-section">';
      h+='<div class="th-section-title" style="color:#d97706"><span style="animation:livePulse 1.5s infinite">\u25CF</span> AO VIVO</div>';
      for(var i=0;i<grp.live.length;i++){
        h+=renderTeamHubGameCard(grp.live[i],tc,"live");
      }
      h+='</div>';
    }
    
    // PRÓXIMOS (em destaque)
    if(grp.upcoming.length){
      h+='<div class="th-section">';
      h+='<div class="th-section-title" style="color:'+tc+'">\uD83D\uDCC5 PR\u00d3XIMOS JOGOS</div>';
      for(var i=0;i<grp.upcoming.length;i++){
        h+=renderTeamHubGameCard(grp.upcoming[i],tc,"upcoming");
      }
      h+='</div>';
    }
    
    // HISTÓRICO (separado, mais discreto)
    if(grp.past.length && opts.showHistory !== false){
      h+='<div class="th-section th-section-past">';
      h+='<div class="th-section-title th-section-title-past">\uD83D\uDCDC HIST\u00d3RICO</div>';
      for(var i=0;i<grp.past.length;i++){
        h+=renderTeamHubGameCard(grp.past[i],tc,"past");
      }
      h+='</div>';
    }
    
    // Estado vazio dentro do card
    if(!grp.live.length && !grp.upcoming.length && (!grp.past.length || opts.showHistory===false)){
      h+='<div style="padding:20px;text-align:center;color:var(--gray);font-size:13px">Sem jogos para mostrar</div>';
    }
    
    h+='</div>';
    h+='</div>';
  }
  return h;
}

// Card compacto de jogo dentro do TeamHub (visual diferente do renderGameCard padrão)
function renderTeamHubGameCard(g, tc, kind){
  var dt = g.dt ? fD(g.dt) : "A definir";
  var tm = g.tm ? g.tm.substring(0,5) : "";
  var clickable = isCoord ? 'cursor:pointer' : '';
  var clickHandler = isCoord ? ' onclick="openGameEditor(\''+g.id+'\')"' : '';
  
  // Detectar passado sem dados (tarja)
  var isPastWithoutData=false;
  if(kind==="past"){
    var nActions=(g.act&&g.act.length)||0;
    var r=g.result||{};
    if(nActions===0 && !r.type) isPastWithoutData=true;
  }
  
  var r = g.result || {};
  var resultBadge = "";
  if(kind==="past"){
    if(r.type==="win"){resultBadge='<span class="thg-result" style="background:#05966915;color:#059669">V '+(r.sets||"")+'</span>';}
    else if(r.type==="loss"){resultBadge='<span class="thg-result" style="background:#dc262615;color:#dc2626">D '+(r.sets||"")+'</span>';}
    else if(r.type==="wo_win"){resultBadge='<span class="thg-result" style="background:#10b98115;color:#10b981">WO V</span>';}
    else if(r.type==="wo_loss"){resultBadge='<span class="thg-result" style="background:#f59e0b15;color:#f59e0b">WO D</span>';}
    else if(g.ss && g.ss.length){
      var sc=[];for(var si=0;si<g.ss.length;si++)sc.push(g.ss[si].u+"-"+g.ss[si].t);
      resultBadge='<span class="thg-result" style="background:var(--card2);color:var(--gray)">'+sc.join(" ")+'</span>';
    }
  }
  
  var h='<div class="thg '+(isPastWithoutData?'thg-no-data':'')+'" style="'+clickable+'"'+clickHandler+'>';
  h+='<div class="thg-date" style="border-color:'+tc+'40;color:'+tc+'">';
  if(g.dt){
    var parts=g.dt.split("-");
    h+='<div class="thg-day">'+parts[2]+'</div>';
    h+='<div class="thg-month">'+["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"][parseInt(parts[1])-1]+'</div>';
  }else{
    h+='<div class="thg-day" style="font-size:11px">A def.</div>';
  }
  h+='</div>';
  h+='<div class="thg-info">';
  h+='<div class="thg-opp">vs <b>'+esc(g.opp||"-")+'</b></div>';
  var meta=[];
  if(tm)meta.push("\uD83D\uDD52 "+tm);
  if(g.loc)meta.push("\uD83D\uDCCD "+esc(g.loc));
  if(g.phase)meta.push(esc(g.phase));
  if(meta.length)h+='<div class="thg-meta">'+meta.join(" \u00b7 ")+'</div>';
  h+='</div>';
  if(resultBadge)h+=resultBadge;
  // Tarja sem dados
  if(isPastWithoutData){
    h+='<div class="game-tarja"><span class="game-tarja-text">SEM DADOS</span></div>';
  }
  h+='</div>';
  return h;
}

function renderGameCard(g,torColor){

  else if(r.type==="loss"){borderColor="#dc2626";resultLabel='<span style="background:#dc2626;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:13px">'+(r.sets||"D")+'</span>';}
  else if(r.type==="wo_win"){borderColor="#10b981";resultLabel='<span style="background:#10b981;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:11px">WO V</span>';}
  else if(r.type==="wo_loss"){borderColor="#f59e0b";resultLabel='<span style="background:#f59e0b;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:11px">WO D</span>';}
  else{resultLabel='<span style="background:var(--card2);color:var(--gray);padding:3px 10px;border-radius:6px;font-weight:700;font-size:11px">A jogar</span>';}
  var dt=g.dt?fD(g.dt):"S/data";
  var tm=g.tm?g.tm.substring(0,5):"";
  var phase=g.phase||"";
  var team=tF(g.tid);
  var teamColor=team?team.c:"#64748b";
  var teamLabel=teamShortLabel(g.tid);

// AGENDA — calendário cronológico

function rAge(){
  var allGames=getPublicGames();
  if(gAgTor!=="all")allGames=allGames.filter(function(g){return g.torId===gAgTor;});
  if(gAgCat!=="all")allGames=allGames.filter(function(g){return g.cat===gAgCat;});
  var todayStr=new Date().toISOString().slice(0,10);
  if(gAgPeriod==="upcoming")allGames=allGames.filter(function(g){return (g.dt||"")>=todayStr&&g.st!=="done";});
  else if(gAgPeriod==="past")allGames=allGames.filter(function(g){return (g.dt||"")<todayStr||g.st==="done";});
  allGames.sort(function(a,b){var da=(a.dt||"")+(a.tm||""),db=(b.dt||"")+(b.tm||"");return da<db?-1:da>db?1:0;});
  var h='<div class="cd" style="padding:12px;margin-bottom:14px"><div class="rw">';
  h+='<div style="flex:1"><span class="lb">Per\u00edodo</span><select onchange="gAgPeriod=this.value;render()">';
  h+='<option value="upcoming"'+(gAgPeriod==="upcoming"?" selected":"")+'>Pr\u00f3ximos</option>';
  h+='<option value="past"'+(gAgPeriod==="past"?" selected":"")+'>Passados</option>';
  h+='<option value="all"'+(gAgPeriod==="all"?" selected":"")+'>Todos</option>';
  h+='</select></div>';
  h+='<div style="flex:1"><span class="lb">Torneio</span><select onchange="gAgTor=this.value;render()">';
  h+='<option value="all"'+(gAgTor==="all"?" selected":"")+'>Todos</option>';
  var _pubT=getPublicTournaments();for(var i=0;i<_pubT.length;i++){var t=_pubT[i];h+='<option value="'+t.id+'"'+(gAgTor===t.id?" selected":"")+'>'+esc(t.n)+'</option>';}
  h+='</select></div>';
  var cats={};var _pgC=getPublicGames();for(var i=0;i<_pgC.length;i++){if(_pgC[i].cat)cats[_pgC[i].cat]=true;}
  var catKeys=Object.keys(cats).sort();
  h+='<div style="flex:1"><span class="lb">Categoria</span><select onchange="gAgCat=this.value;render()">';
  h+='<option value="all"'+(gAgCat==="all"?" selected":"")+'>Todas</option>';
  for(var i=0;i<catKeys.length;i++)h+='<option value="'+esc(catKeys[i])+'"'+(gAgCat===catKeys[i]?" selected":"")+'>'+esc(catKeys[i])+'</option>';
  h+='</select></div>';
  h+='</div></div>';
  if(isCoord){h+='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bp" onclick="openGameEditor(null)">\u2795 Novo Jogo</button></div>';}
  // Toggle de visualização
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;background:var(--card2);padding:4px;border-radius:10px">';
  h+='<button class="bt '+(gAgView==="team"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gAgView=\'team\';render()">\uD83C\uDFC6 Por Equipe</button>';
  h+='<button class="bt '+(gAgView==="month"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gAgView=\'month\';render()">\uD83D\uDCC5 Por M\u00eas</button>';
  h+='</div>';
  if(!allGames.length){h+='<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Nenhum jogo encontrado para esses filtros.</div>';return h;}
  
  // Visualização agrupada por equipe (default)
  if(gAgView==="team"){
    h+=renderTeamHub(allGames,{showHistory:true});
    return h;
  }
  
  // Visualização legacy: por mês
  var byMonth={},months=[];
  for(var i=0;i<allGames.length;i++){
    var g=allGames[i];
    var key=g.dt?g.dt.substring(0,7):"sem-data";
    if(!byMonth[key]){byMonth[key]=[];months.push(key);}
    byMonth[key].push(g);
  }
  var MES_NM=["Janeiro","Fevereiro","Mar\u00e7o","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  for(var i=0;i<months.length;i++){
    var key=months[i];
    var label;
    if(key==="sem-data")label="Sem data";
    else{var parts=key.split("-");label=MES_NM[parseInt(parts[1])-1]+" "+parts[0];}
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:2px;color:var(--navy);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--brd)">'+label.toUpperCase()+'</div>';
    for(var j=0;j<byMonth[key].length;j++){
      var g=byMonth[key][j];
      var tor=tFnd(g.torId);
      h+=renderGameCard(g,tor?tor.color:null);
    }
  }
  return h;
}

// Presença
function setPresence(gameId,status){
  if(!userProfile||!userProfile.athleteId)return;
  var aid=userProfile.athleteId;
  var ath=aFind(aid);
  if(!ath)return;
  if(!ath.presence)ath.presence={};
  ath.presence[gameId]=status;
  // Toast contextual
  var msg=status==="yes"?"Presen\u00e7a confirmada!":status==="no"?"Aus\u00eancia registrada":"Marcado como talvez";
  toast(msg,"ok");
  save();
}

// PDF próprio do atleta
function exMyAthPDF(){
  if(!userProfile||!userProfile.athleteId){toast("Voc\u00ea n\u00e3o est\u00e1 vinculada","error");return;}
  exAthPDF(userProfile.athleteId);
}
// PDF próprio em um JOGO específico
function exMyAthPDFForGame(gid){
  if(!userProfile||!userProfile.athleteId){toast("Voc\u00ea precisa estar logada como atleta","error");return;}
  // Verificar se atleta está no lineup do jogo
  var g=gF(gid);
  if(!g){toast("Jogo n\u00e3o encontrado","error");return;}
  var aid=userProfile.athleteId;
  var inLineup=false;
  if(g.lineup)for(var i=0;i<g.lineup.length;i++){if(g.lineup[i].aid===aid){inLineup=true;break;}}
  if(!inLineup){
    // Atleta não estava escalada — mostra mensagem amigável
    toast("Voc\u00ea n\u00e3o estava escalada nesse jogo","error");
    return;
  }
  exAthPDF(aid,gid,"all");
}

      ?"Travar este jogo deixa ele em <b>somente leitura</b>. Ningu\u00e9m poder\u00e1 fazer scout, escalar, ou alterar o placar.<br><br><span style=\"font-size:12px;color:var(--gray)\">Atletas escaladas conseguem exportar seu PDF normalmente. Voc\u00ea pode destravar a qualquer momento.</span>"

function delP(tid,aid){
  var t=tF(tid);if(!t||!t.roster)return;
  var rosterEntry=null;for(var i=0;i<t.roster.length;i++){if(t.roster[i].aid===aid){rosterEntry=t.roster[i];break;}}
  if(!rosterEntry)return;
  var ath=aFind(aid);if(!ath)return;
  // Verificar se está em outras equipes
  var otherTeams=[];
  for(var ti=0;ti<D.teams.length;ti++){
    var ot=D.teams[ti];
    if(ot.id===tid)continue;
    if(ot.roster)for(var j=0;j<ot.roster.length;j++){
      if(ot.roster[j].aid===aid){otherTeams.push(ot.n);break;}
    }
  }
  var bodyMsg;
  if(otherTeams.length){
    bodyMsg="Remover <b>"+esc(ath.nm)+"</b> apenas desta equipe?<br><span style=\"color:var(--gray);font-size:12px\">O(a) atleta continua no banco e em: <b>"+esc(otherTeams.join(", "))+"</b></span>";
  }else{
    bodyMsg="Remover <b>"+esc(ath.nm)+"</b> da equipe?<br><span style=\"color:var(--gray);font-size:12px\">O(a) atleta continua no banco geral. As a\u00e7\u00f5es j\u00e1 registradas em jogos n\u00e3o ser\u00e3o apagadas.</span>";
  }
  confirmModal({
    title:"REMOVER DA EQUIPE",
    body:bodyMsg,
    confirmLabel:"\u{1F5D1} Remover",
    confirmStyle:"bd",
    onConfirm:function(){
      t.roster=t.roster.filter(function(x){return x.aid!==aid;});
      toast(ath.nm+" removido(a) desta equipe","ok");
      save();
    }
  });
}

function saveGameEditor(gameId){

  var phase=document.getElementById("g-phase").value.trim();

    result={type:rtype,sets:rsets||null,title:rtitle||null};
  }

    g.maxSets=maxSets; g.format=fmtVal;

    toast("Jogo atualizado","ok");

// Modal de escalação do jogo
function openLineup(gameId){
  var g=gF(gameId);if(!g){toast("Jogo n\u00e3o encontrado","error");return;}
  var t=tF(g.tid);
  var roster=(t&&t.roster)||[];
  // Estado atual da lineup (mantem ordem dos entries existentes)
  var lineupNow={}, lineupOrder=[];
  if(g.lineup){
    for(var i=0;i<g.lineup.length;i++){
      var le=g.lineup[i]; lineupNow[le.aid]=le; lineupOrder.push(le.aid);
    }
  }
  // Lista: 1) atletas ja na lineup (mantem ordem), 2) atletas do roster
  // que ainda nao foram escalados. Ad-hoc = nao esta em D.athletes.
  // Default: jogo SEM lineup ainda -> marca todos. Com lineup -> so quem ja esta.
  var hadLineup = lineupOrder.length>0;
  var seen={}, list=[];
  for(var i=0;i<lineupOrder.length;i++){
    var aid=lineupOrder[i]; if(seen[aid])continue; seen[aid]=true;
    var entry=lineupNow[aid]; var ath=aFind(aid);
    var nm=(entry&&entry.nm)||(ath&&ath.nm)||"";
    var po=(entry&&entry.po)||(ath&&ath.po)||"";
    var adhoc=!ath;
    list.push({aid:aid,nm:nm,po:po,nu:entry.nu,checked:true,adhoc:adhoc});
  }
  for(var i=0;i<roster.length;i++){
    var aid=roster[i].aid; if(seen[aid])continue; seen[aid]=true;
    var ath=aFind(aid); if(!ath)continue;
    var nu="";
    if(ath.last_nu_by_team&&t&&ath.last_nu_by_team[t.id]!==undefined) nu=ath.last_nu_by_team[t.id];
    list.push({aid:aid,nm:ath.nm,po:ath.po||"",nu:nu,checked:!hadLineup,adhoc:false});
  }
  
  var m='<div class="admin-modal" onclick="closeLineup()"><div class="admin-box" onclick="event.stopPropagation()" style="text-align:left;max-width:480px;max-height:90vh;display:flex;flex-direction:column">';
  m+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:var(--navy);margin-bottom:6px;text-align:center">ESCALA\u00c7\u00c3O</div>';
  m+='<div style="font-size:13px;color:var(--gray);margin-bottom:14px;text-align:center">vs <b>'+esc(g.opp||"")+'</b>'+(t?' \u00b7 '+esc(t.n):'')+'</div>';
  m+='<div style="background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:8px 12px;border-radius:8px;font-size:11px;margin-bottom:12px">\u{1F4A1} Desmarque quem n\u00e3o veio. Ajuste os n\u00fameros conforme as camisas de hoje.</div>';
  m+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px"><span>Atleta</span><span>N\u00ba</span></div>';
  m+='<div id="lu-list" style="overflow-y:auto;flex:1;border:1px solid var(--brd);border-radius:10px;background:var(--card2);max-height:50vh">';
  for(var i=0;i<list.length;i++){
    var it=list[i];
    var rowExtra = it.adhoc?'<button class="lu-remove" data-aid="'+it.aid+'" title="Remover" onclick="event.preventDefault();event.stopPropagation();removeLineupRow(\''+it.aid+'\')">\u2715</button>':'';
    // Row com toggle visual proprio (sem checkbox nativo) \u2014 toque robusto no iOS.
    // Clicar na row inteira alterna marcado/nao. data-on guarda o estado.
    m+='<div class="lu-row'+(it.adhoc?' lu-adhoc':'')+(it.checked?' on':'')+'" data-aid="'+it.aid+'" data-on="'+(it.checked?1:0)+'" onclick="toggleLuRow(this,event)">';
    m+='<div class="lu-toggle"><span class="lu-toggle-check">\u2713</span></div>';
    m+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(it.nm)+(it.adhoc?' <span style="font-size:9px;color:#fbbf24;font-weight:800;letter-spacing:.5px;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px;margin-left:4px">NOVO</span>':'')+'</div>';
    if(it.po)m+='<div style="font-size:10px;color:var(--gray)">'+esc(it.po)+'</div>';
    m+='</div>';
    m+='<input type="number" class="lu-nu" data-aid="'+it.aid+'" value="'+(it.nu===""||it.nu==null?"":it.nu)+'" min="0" max="99" placeholder="\u2014" onclick="event.stopPropagation()" style="width:58px;text-align:center;font-weight:800;font-size:16px;padding:8px 4px">';

  m+='<div style="background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:10px;margin-top:12px">';

  m+='</div></div>';
  m+='<div style="display:flex;gap:8px;margin-top:12px"><button class="bt bg" style="flex:1" onclick="closeLineup()">Cancelar</button><button class="bt bs" style="flex:2" onclick="saveLineup(\''+gameId+'\')">\u2713 Salvar Escala\u00e7\u00e3o</button></div>';
  m+='</div></div>';
  var d=document.createElement("div");d.id="lineupModal";d.innerHTML=m;document.body.appendChild(d);
}
// Alterna o estado marcado/nao de uma row (toggle visual). Ignora cliques que
// vieram do input de numero ou do botao remover (esses tem stopPropagation).
function toggleLuRow(el,ev){
  if(!el)return;
  var on = el.getAttribute("data-on")==="1";
  on = !on;
  el.setAttribute("data-on", on?"1":"0");
  if(on) el.classList.add("on"); else el.classList.remove("on");
}
function lineupAll(checked){
  var rows=document.querySelectorAll(".lu-row");
  for(var i=0;i<rows.length;i++){
    rows[i].setAttribute("data-on", checked?"1":"0");
    if(checked) rows[i].classList.add("on"); else rows[i].classList.remove("on");
  }
}
function saveLineup(gameId){
  var g=gF(gameId);if(!g)return;
  var t=tF(g.tid); // pode ser null em fluxo ad-hoc puro
  var rows=document.querySelectorAll(".lu-row");
  var newLineup=[];
  var seen={};
  for(var i=0;i<rows.length;i++){
    var row=rows[i];
    var aid=row.getAttribute("data-aid");
    if(row.getAttribute("data-on")!=="1")continue;
    var nuInp=row.querySelector(".lu-nu");
    var nuStr=(nuInp?nuInp.value:"").trim();
    var labelNm=(function(){var el=row.querySelector('div[style*="font-weight:700"]');return el?(el.textContent||"").replace(/NOVO\s*$/,"").trim():"";})();
    // Numero OPCIONAL: pode salvar a escalacao so com os nomes e ajustar os
    // numeros depois (vira null ate ser preenchido). Conflito so entre os preenchidos.
    var nuV=null;
    if(nuStr!==""){
      nuV=parseInt(nuStr,10);
      if(isNaN(nuV)||nuV<0||nuV>99){toast("N\u00famero inv\u00e1lido para "+labelNm+" (0-99)","error");return;}
      if(seen[nuV]){toast("N\u00famero "+nuV+" repetido na escala\u00e7\u00e3o","error");return;}
      seen[nuV]=true;
    }
    var isAdhoc = row.classList && row.classList.contains("lu-adhoc");
    var entry={aid:aid,nu:nuV};
    if(isAdhoc){
      // Preserva nm/po dentro do proprio entry — atleta vive so na lineup
      entry.nm=labelNm;
      var poEl=row.querySelector('div[style*="color:var(--gray)"]');
      if(poEl)entry.po=(poEl.textContent||"").trim();
    }
    newLineup.push(entry);
  }
  if(!newLineup.length){toast("Selecione pelo menos uma atleta","error");return;}
  g.lineup=newLineup;
  // Atualizar last_nu_by_team so dos atletas que existem em D.athletes
  if(t){
    for(var i=0;i<newLineup.length;i++){
      var ath=aFind(newLineup[i].aid);
      if(ath && newLineup[i].nu!=null){
        if(!ath.last_nu_by_team)ath.last_nu_by_team={};
        ath.last_nu_by_team[t.id]=newLineup[i].nu;
      }
    }
  }
  closeLineup();
  toast("Escala\u00e7\u00e3o salva ("+newLineup.length+" atletas)","ok");
  save();
}

// addAdhocAthlete: pega inputs do "+ Adicionar atleta" e cria uma row ad-hoc
// visivel imediatamente. So entra na lineup ao clicar "Salvar Escalacao".
function addAdhocAthlete(gameId){
  var nuEl=document.getElementById("lu-new-nu");
  var nmEl=document.getElementById("lu-new-nm");
  var poEl=document.getElementById("lu-new-po");
  if(!nuEl||!nmEl)return;
  var nuRaw=(nuEl.value||"").trim();
  var nu=nuRaw===""?"":parseInt(nuRaw,10);
  var nm=(nmEl.value||"").trim();
  var po=(poEl?poEl.value:"").trim();
  if(!nm){toast("Informe o nome da atleta","error");return;}
  // Numero e OPCIONAL (pode entrar so o nome agora e ajustar o numero depois).
  if(nuRaw!==""&&(isNaN(nu)||nu<0||nu>99)){toast("N\u00famero inv\u00e1lido (0-99)","error");return;}
  // Conflito de numero so quando um numero foi informado
  if(nuRaw!==""){
    var allRows=document.querySelectorAll(".lu-row");
    for(var i=0;i<allRows.length;i++){
      if(allRows[i].getAttribute("data-on")!=="1")continue;
      var rNu=allRows[i].querySelector(".lu-nu");
      if(rNu&&rNu.value!==""&&parseInt(rNu.value,10)===nu){
        toast("N\u00famero "+nu+" ja em uso. Escolha outro.","error");return;
      }
    }
  }
  var aid="adhoc_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  var listEl=document.getElementById("lu-list");
  if(!listEl)return;
  var rowHtml='<div class="lu-row lu-adhoc on" data-aid="'+aid+'" data-on="1" onclick="toggleLuRow(this,event)">';
  rowHtml+='<div class="lu-toggle"><span class="lu-toggle-check">\u2713</span></div>';
  rowHtml+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(nm)+' <span style="font-size:9px;color:#fbbf24;font-weight:800;letter-spacing:.5px;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px;margin-left:4px">NOVO</span></div>';
  if(po)rowHtml+='<div style="font-size:10px;color:var(--gray)">'+esc(po)+'</div>';
  rowHtml+='</div>';
  rowHtml+='<input type="number" class="lu-nu" data-aid="'+aid+'" value="'+nu+'" min="0" max="99" placeholder="\u2014" onclick="event.stopPropagation()" style="width:58px;text-align:center;font-weight:800;font-size:16px;padding:8px 4px">';
  rowHtml+='<button class="lu-remove" data-aid="'+aid+'" title="Remover" onclick="event.preventDefault();event.stopPropagation();removeLineupRow(\''+aid+'\')">\u2715</button>';
  rowHtml+='</div>';
  var temp=document.createElement("div");temp.innerHTML=rowHtml;
  listEl.appendChild(temp.firstChild);
  nuEl.value="";nmEl.value="";if(poEl)poEl.value="";
  nmEl.focus();
}

// ===== CORRIGIR: reatribuir TODAS as acoes de um atleta pra outro neste jogo =====
// (marcaram o jogo todo na pessoa errada). Placar NAO muda (e por equipe); so a
// estatistica/premiacao por atleta acerta. O site/telao recalculam sozinhos.
function reassignActions(gid, fromAid, toAid, setNum){
  var g=gF(gid); if(!g||!g.act||!fromAid||!toAid||fromAid===toAid) return 0;
  var n=0;
  // setNum (opcional): so reatribui as acoes daquele set. Sem set = todos.
  // Mantem a.side: a equipe/lado estava certo, so a PESSOA. Reatribui so o pid.
  for(var i=0;i<g.act.length;i++){ var a=g.act[i]; if(a.pid===fromAid && (!setNum || a.set===setNum)){ a.pid=toAid; n++; } }
  if(n){ if(typeof saveGame==="function") saveGame(g).catch(function(){}); else save(); }
  return n;
}
// Cria um atleta novo numa equipe minis (pro caso do emprestado / atleta faltante).
function createMinisAthlete(teamId, nome){

  if(!t.roster) t.roster=[];
  if(!D.athletes) D.athletes=[];
  var aid=teamId+"_x"+Date.now().toString(36);
  D.athletes.push({aid:aid, nm:nome, po:""});
  t.roster.push({aid:aid});
  if(typeof saveTeam==="function") saveTeam(t).catch(function(){});
  if(typeof saveAthlete==="function") saveAthlete(aFind(aid)).catch(function(){});
  return aid;
}
function _reTeamNm(aid){ var mm=/^(t_minis_[a-z]+)/.exec(aid||""); var t=mm?tF(mm[1]):null; return t?(t.n||"").replace(/^RS\s+/i,""):""; }
function openReassignModal(gid){
  var g=gF(gid); if(!g){ if(typeof toast==="function")toast("Jogo nao encontrado","error"); return; }
  var acts=g.act||[]; var counts={};
  for(var i=0;i<acts.length;i++){ counts[acts[i].pid]=(counts[acts[i].pid]||0)+1; }
  var lus=[].concat(g.lineup||[], g.lineupB||[]);
  function nm(aid){ var le=null; for(var k=0;k<lus.length;k++)if(lus[k].aid===aid){le=lus[k];break;} var ath=(typeof aFind==="function")?aFind(aid):null; return (le&&le.nm)||(ath&&ath.nm)||aid; }
  function nuOf(aid){ var le=null; for(var k=0;k<lus.length;k++)if(lus[k].aid===aid){le=lus[k];break;} return (le&&le.nu!=null&&le.nu!=="")?le.nu:null; }
  function lbl(aid){ var u=nuOf(aid); return (u!=null?"#"+u+" ":"")+nm(aid); }
  // Sets presentes nas acoes (pra reatribuir so de um set)
  var setsH={}; for(var i=0;i<acts.length;i++){ if(acts[i].set) setsH[acts[i].set]=1; }
  var setNums=Object.keys(setsH).map(Number).sort(function(a,b){return a-b;});
  var setOpts='<option value="">Todos os sets</option>';
  for(var i=0;i<setNums.length;i++) setOpts+='<option value="'+setNums[i]+'">Set '+setNums[i]+'</option>';
  // De: so quem tem acoes
  var deOpts=""; var wa=Object.keys(counts);
  for(var i=0;i<wa.length;i++) deOpts+='<option value="'+wa[i]+'">'+esc(lbl(wa[i]))+' ('+counts[wa[i]]+' ações)</option>';
  if(!wa.length) deOpts='<option value="">— sem ações —</option>';
  // Para: TODOS os atletas das equipes minis (pra reatribuir a um emprestado de outra
  // equipe) + os da escalacao deste jogo. Dedup por aid.
  var pool=[]; var seen={};
  function add(aid){ if(!aid||seen[aid])return; seen[aid]=true; pool.push(aid); }
  for(var i=0;i<lus.length;i++) add(lus[i].aid);
  var allAth=(D&&D.athletes)?D.athletes:[];
  for(var i=0;i<allAth.length;i++){ if(allAth[i].aid && allAth[i].aid.indexOf("t_minis_")===0) add(allAth[i].aid); }
  pool.sort(function(a,b){ return (_reTeamNm(a)+nm(a)).localeCompare(_reTeamNm(b)+nm(b)); });
  var paraOpts="";
  for(var i=0;i<pool.length;i++){ var tn=_reTeamNm(pool[i]); paraOpts+='<option value="'+pool[i]+'">'+esc(lbl(pool[i]))+(tn?' · '+esc(tn):'')+'</option>'; }
  // equipes pra criar atleta novo (as do jogo primeiro, depois as outras minis)
  var teamOpts=""; var ts={};
  function addT(id){ if(!id||ts[id])return; var t=tF(id); if(!t)return; ts[id]=1; teamOpts+='<option value="'+id+'">'+esc(t.n||id)+'</option>'; }
  addT(g.tid); addT(g.tidB);
  if(D&&D.teams)for(var i=0;i<D.teams.length;i++){ if(D.teams[i].id.indexOf("t_minis_")===0) addT(D.teams[i].id); }

// Ponto automatico parcial: Ace/Ataque-Ponto/Bloqueio-Ponto => RS marca ponto;
// Saque/Ataque/Bloqueio com Erro => adversario marca ponto. Outros => nada.
function autoScoreSide(ak,oc){
  if(oc==="Ace")return"u";
  if((ak==="ataque"||ak==="bloqueio")&&oc==="Ponto")return"u";
  if((ak==="saque"||ak==="ataque"||ak==="bloqueio")&&oc==="Erro")return"t";
  if((ak==="recepcao"||ak==="defesa")&&oc==="Erro")return"t"; // erro nosso na recepcao/defesa = ponto do adversario
  if(ak==="ataque"&&oc==="Bloq")return"t"; // nosso ataque bloqueado (bola morta) = ponto do adversario
  return null;
}
// ==========================================================
// SCOUT COM QUADRA — posicionamento 1-6 + rotacao automatica (Q0: logica pura)
// Tudo aqui e NO-OP se o jogo nao tem g.courtMode. Nao afeta o scout classico.
// Modelo: g.court[setNumero] = { pos:[aidP1,aidP2,aidP3,aidP4,aidP5,aidP6], serving:"us"|"them" }
//   pos[0]=Posicao 1 (sacador) ... pos[5]=Posicao 6.
// ==========================================================
// Rotacao horaria do volei: quem estava na P2 vai sacar (P1); P1 -> P6; P6 -> P5; etc.
function rotateCourt(pos){
  if(!pos||pos.length!==6)return pos?pos.slice():pos;
  return [pos[1],pos[2],pos[3],pos[4],pos[5],pos[0]];
}
// Inverso (botao "voltar rotacao" / corrigir engano)
function rotateCourtBack(pos){
  if(!pos||pos.length!==6)return pos?pos.slice():pos;
  return [pos[5],pos[0],pos[1],pos[2],pos[3],pos[4]];
}
// Regra side-out. cs={pos,serving}. scoredSide="us"|"them". Retorna NOVO estado (imutavel).
// So rotacionamos quando GANHAMOS o ponto E nao estavamos sacando (recuperamos o saque).
function courtApplyPoint(cs,scoredSide){
  if(!cs||!cs.pos)return cs;
  var next={pos:cs.pos.slice(),serving:cs.serving};
  if(cs.libPair)next.libPair={lib:cs.libPair.lib,out:cs.libPair.out}; // preserva par do libero
  if(scoredSide==="us"){
    if(cs.serving!=="us"){ next.pos=rotateCourt(cs.pos); next.serving="us"; next=courtLiberoExit(next); }
  }else if(scoredSide==="them"){
    if(cs.serving!=="them"){ next.serving="them"; }
  }
  return next;
}
// Libero auto-saida: se o libero (de uma entrada amarrada via libPair) caiu numa
// posicao de FRENTE (P2/P3/P4 = idx 1,2,3), ele sai e o par (quem ele substituiu)
// volta naquela posicao. Par e dinamico — limpo apos a saida. Funcao pura.
function courtLiberoExit(cs){
  if(!cs||!cs.libPair||!cs.pos)return cs;
  var li=cs.pos.indexOf(cs.libPair.lib);
  if(li===1||li===2||li===3){ // frente
    var pos=cs.pos.slice(); pos[li]=cs.libPair.out;
    return {pos:pos,serving:cs.serving,libPair:null};
  }
  return cs;
}
// Estado da quadra do set atual (ou null se nao for modo quadra)
function courtCur(gm){ if(!gm||!gm.courtMode||!gm.court)return null; return gm.court[String(S.cs)]||null; }
// Hook chamado APOS um ponto. side="u"(nosso)|"t"(deles). No-op fora do modo quadra.
// Retorna o snapshot ANTERIOR (pra o undo restaurar) ou null.
var _courtPreServe=null; // sacador a pre-selecionar apos uma rotacao (Frente C)
function courtRegisterPoint(side){
  var gm=gF(S.aid);
  if(!gm||!gm.courtMode||!gm.court)return null;
  var k=String(S.cs); var cs=gm.court[k];
  if(!cs||!cs.pos)return null;
  // snapshot completo (inclui libPair) pra o undo restaurar tudo
  var snap={pos:cs.pos.slice(),serving:cs.serving,libPair:cs.libPair?{lib:cs.libPair.lib,out:cs.libPair.out}:null};
  var next=courtApplyPoint(cs, side==="u"?"us":"them");
  gm.court[k]=next;
  // Frente C: se rotacionamos (recuperamos o saque), a proxima jogada e nosso saque do P1.
  _courtPreServe=(next.serving==="us" && next.pos.join(",")!==snap.pos.join(",")) ? next.pos[0] : null;
  return snap;
}
// Pre-seleciona o sacador (P1) + fundamento "saque". So sugestao: NAO bloqueia trocar
// de atleta nem fazer substituicao. Chamado no fim de rcO/scUp.
function courtApplyPreserve(){
  if(_courtPreServe){ S.sp=_courtPreServe; S.sa="saque"; _courtPreServe=null; }
}

var _courtDraft=null; // rascunho do posicionamento inicial {gid,set,pos:[6],serving}
function _gpFind(gp,aid){for(var i=0;i<gp.length;i++){if(gp[i].id===aid)return gp[i];}return null;}
// Detecta libero pela posicao da atleta (ex: "Libero", "Líbero 1", "Lib")
function _isLibero(p){ return !!(p&&p.po&&/l[ií]bero|^lib/i.test(p.po)); }

// iniciais (toca atleta no banco -> toca a posicao). Sem auto-escala — decisao do Rodrigo:
// controle total, nada de atleta/libero entrando por engano. A trava de libero-na-frente
// e a exigencia de saque ficam no courtConfirmSetup.
function courtDraftEnsure(gm,gp){
  var k=String(S.cs);
  if(_courtDraft&&_courtDraft.gid===gm.id&&_courtDraft.set===k)return _courtDraft;
  _courtDraft={gid:gm.id,set:k,pos:[null,null,null,null,null,null],serving:null,pick:null};

function courtDraftPlace(aid){ if(!_courtDraft)return; _courtDraft.pick=(_courtDraft.pick===aid?null:aid); render(); }
// Toque numa celula da quadra: com pick armado, coloca ali (troca com o ocupante);
// sem pick, toca celula cheia = tira do time (volta pro banco).
function courtDraftCell(idx){
  if(!_courtDraft)return;
  if(_courtDraft.pick){
    var prev=_courtDraft.pos[idx];
    var at=_courtDraft.pos.indexOf(_courtDraft.pick); if(at>=0)_courtDraft.pos[at]=prev||null; // swap
    _courtDraft.pos[idx]=_courtDraft.pick; _courtDraft.pick=null;
  }else if(_courtDraft.pos[idx]){ _courtDraft.pos[idx]=null; }
  render();
}
function courtDraftRemove(idx){ if(_courtDraft){_courtDraft.pos[idx]=null;render();} }
function courtDraftServer(side){ if(_courtDraft){_courtDraft.serving=side;render();} }

  if(_courtDraft.serving!=="us"&&_courtDraft.serving!=="them"){if(typeof toast==='function')toast("Escolha quem saca primeiro","error");return;}
  // Trava de regra: libero nao pode iniciar na frente (P2/P3/P4)

// Rotacao manual (rede de seguranca). dir>0 horario, dir<0 anti-horario.
function courtManualRotate(dir){
  var gm=gF(S.aid); if(!gm||!gm.court)return;
  var k=String(S.cs); var cs=gm.court[k]; if(!cs||!cs.pos)return;
  cs.pos = dir>0 ? rotateCourt(cs.pos) : rotateCourtBack(cs.pos);
  var fixed=courtLiberoExit(cs); cs.pos=fixed.pos; cs.libPair=fixed.libPair; // libero sai se foi pra frente
  if(typeof save==='function')save();
  render();

// Trocar atleta (em quadra) pelo libero do banco, em 1 toque. Amarra o par desta entrada.
function courtLiberoSwap(aid){
  var gm=gF(S.aid); if(!gm||!gm.court)return;
  var cs=gm.court[String(S.cs)]; if(!cs||!cs.pos)return;
  var gp=_courtGp(gm);
  var inCourt={}; cs.pos.forEach(function(a){if(a)inCourt[a]=1;});
  var libero=gp.filter(function(p){return !inCourt[p.id]&&_isLibero(p);})[0];
  if(!libero){ if(typeof toast==='function')toast("Nenhum líbero no banco","error"); return; }
  var idx=cs.pos.indexOf(aid);
  if(idx<0){ if(typeof toast==='function')toast("Atleta não está em quadra","error"); return; }
  cs.pos[idx]=libero.id;
  cs.libPair={lib:libero.id,out:aid}; // par desta entrada (dinamico)
  S.sp=null;
  if(typeof save==='function')save();
  render();

var _courtSubOut=null; // aid selecionado pra sair
// Reconstroi a lista de jogadores escalados (do lineup) — mesma logica do rSct
function _courtGp(gm){

function courtSub(){

function _renderCourtSubModal(){

  var inCourt={}; cs.pos.forEach(function(a){if(a)inCourt[a]=1;});
  var bench=gp.filter(function(p){return !inCourt[p.id];});
  var m='<div class="tnj-modal" onclick="closeCourtSub()"><div class="tnj-box" onclick="event.stopPropagation()">';
  m+='<div class="tnj-title">🔄 SUBSTITUIÇÃO</div>';

// Reconstroi as colunas da ladder do set. Usa sq; completa p/ bater com o placar

function _buildLadder(gm,setIdx){
  var s=(gm&&gm.ss&&gm.ss[setIdx])||{u:0,t:0};
  var q=(s.sq&&s.sq.slice())||[];var cu=0,ct=0,i;
  for(i=0;i<q.length;i++){if(q[i]==="u")cu++;else ct++;}

  for(i=0;i<q.length;i++){if(q[i]==="u"){u++;cols.push({s:"u",n:u});}else{t++;cols.push({s:"t",n:t});}}

// === PDF: graficos de pizza (SVG, imprime sempre) + eficiencia ===
function svgPie(data,size){
  var total=0,i;for(i=0;i<data.length;i++)total+=data[i].v;if(!total)return"";
  var r=size/2,cx=r,cy=r,ang=-Math.PI/2,sv="";
  for(i=0;i<data.length;i++){
    var frac=data[i].v/total;if(frac<=0)continue;
    if(frac>=0.999){sv+="<circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='"+data[i].c+"'/>";continue;}
    var a2=ang+frac*2*Math.PI;
    var x1=(cx+r*Math.cos(ang)).toFixed(1),y1=(cy+r*Math.sin(ang)).toFixed(1);
    var x2=(cx+r*Math.cos(a2)).toFixed(1),y2=(cy+r*Math.sin(a2)).toFixed(1);
    var large=frac>0.5?1:0;
    sv+="<path d='M"+cx+" "+cy+" L"+x1+" "+y1+" A"+r+" "+r+" 0 "+large+" 1 "+x2+" "+y2+" Z' fill='"+data[i].c+"'/>";
    ang=a2;
  }
  return "<svg width='"+size+"' height='"+size+"' viewBox='0 0 "+size+" "+size+"'>"+sv+"</svg>";
}

// ===== FORMATO DA PARTIDA + FIM DE SET (regras do volei) =====
// g.format: "bo3" (melhor de 3, set 3 = tie 15) | "bo5" (melhor de 5, set 5 = tie 15)
//         | "fixed3" (3 sets obrigatorios, todos a 25, sem tie).
// Compat: jogos antigos sem format -> derivam de maxSets (5 => bo5, senao bo3).
function gameFmt(g){
  if(g&&g.format)return g.format;
  return (g&&g.maxSets===5)?"bo5":"bo3";
}
function gameMaxSets(g){ var f=gameFmt(g); return f==="single"?1:(f==="bo5"?5:3); }
// Set decisivo (tie)? bo3=set3, bo5=set5. single/fixed3 nunca tem decisivo separado.
function _isTieSet(g,setNum){ var f=gameFmt(g); return (f==="bo3"&&setNum===3)||(f==="bo5"&&setNum===5); }
// Pontos-alvo do set: g.setPoints (default 25) normal; g.tiePoints (default 15) no decisivo.
function setTarget(g,setNum){
  if(_isTieSet(g,setNum)) return (g&&g.tiePoints)||15;
  return (g&&g.setPoints)||25;
}
// O set (1-based) ja terminou? alvo atingido com 2+ de vantagem.
function setIsOver(g,setNum){
  if(!g||!g.ss||!g.ss[setNum-1])return false;
  var s=g.ss[setNum-1]; var tg=setTarget(g,setNum);
  var hi=Math.max(s.u,s.t);
  return hi>=tg && Math.abs(s.u-s.t)>=2;
}
function setsWon(g){
  var w={u:0,t:0};
  if(g&&g.ss)for(var i=0;i<g.ss.length;i++){ if(setIsOver(g,i+1)){ if(g.ss[i].u>g.ss[i].t)w.u++; else w.t++; } }
  return w;
}
// Jogo decidido? bo3=2 sets, bo5=3 sets. fixed3 nunca decide cedo (joga os 3).
function gameIsDecided(g){
  var f=gameFmt(g);
  if(f==="single") return setIsOver(g,1);
  if(f==="fixed3") return setIsOver(g,1)&&setIsOver(g,2)&&setIsOver(g,3);
  var w=setsWon(g); var need=(f==="bo5")?3:2;
  return w.u>=need || w.t>=need;
}

// === Overlay de PDF (inline, sem iframe \u2014 evita problemas de print no iOS) ===
// O HTML completo do PDF entra direto no DOM. CSS do PDF e escopado em
// #pdfOverlay via prefixo automatico. @media print esconde o resto do app.
// window.print() entao imprime so o conteudo do PDF, consistente em todas as
// plataformas (desktop, Android, iOS Safari, iOS PWA standalone).
// Logo do nosso time pra cabecalho de PDF: upload do time > brand do torneio
// (USA/PG via getBrand) > LR (fallback RS). Usado pelos 3 PDFs.
function pdfTeamLogo(g){
  var te = (g && g.tid && typeof tF==='function') ? tF(g.tid) : null;
  if(te && (te.brandLogoData||te.logoData)) return te.brandLogoData||te.logoData;
  if(g && g.torId && typeof TOURNEY_ACCESS!=='undefined'){
    var tok=null;
    for(var k in TOURNEY_ACCESS){ if(TOURNEY_ACCESS[k] && TOURNEY_ACCESS[k].torId===g.torId){ tok=k; break; } }
    if(tok){ var b=getBrand(tok); if(b && b.logo) return b.logo; }
  }
  return LR;
}
function openPdfOverlay(fullHtml, title){
  closePdfOverlay();
  var styleBlocks = "";
  var bodyContent = fullHtml || "";
  // Extrai <style>...</style> e prefixa cada regra com #pdfOverlay-doc pra evitar leak.
  bodyContent = bodyContent.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, function(_,css){
    var scoped = css.replace(/(^|\})\s*([^{}]+)\{/g, function(_m,brk,sel){
      var prefixed = sel.split(',').map(function(s){
        s = s.trim();
        if(!s || /^@/.test(s) || /^from$|^to$|^\d+%$/i.test(s)) return s;
        if(/^body\b/i.test(s)) return '#pdfOverlay-doc'+s.replace(/^body/i,'');
        if(/^html\b/i.test(s)) return '#pdfOverlay-doc'+s.replace(/^html/i,'');
        return '#pdfOverlay-doc '+s;
      }).join(',');
      return brk+' '+prefixed+'{';
    });
    styleBlocks += '<style>'+scoped+'</style>';
    return '';
  });
  // Remove tags <!DOCTYPE>, <html>, <head>, <body> wrappers
  bodyContent = bodyContent
    .replace(/<!DOCTYPE[^>]*>/gi,'')
    .replace(/<\/?html[^>]*>/gi,'')
    .replace(/<head[\s\S]*?<\/head>/gi,'')
    .replace(/<\/?body[^>]*>/gi,'')
    .replace(/<meta[^>]*>/gi,'')
    .replace(/<title[\s\S]*?<\/title>/gi,'');

  var overlay=document.createElement("div");
  overlay.id="pdfOverlay";
  overlay.className="pdf-overlay";
  var bar='<div class="pdf-overlay-bar no-print">';
  bar+='<button class="pdf-overlay-back" onclick="closePdfOverlay()">\u2190 Voltar</button>';
  bar+='<div class="pdf-overlay-title">'+esc(title||"PDF")+'</div>';
  bar+='<button class="pdf-overlay-print" onclick="printPdfOverlay()">\ud83d\udda8\ufe0f Salvar PDF</button>';
  bar+='</div>';
  var doc='<div id="pdfOverlay-doc" class="pdf-overlay-doc">'+bodyContent+'</div>';
  overlay.innerHTML=bar+styleBlocks+doc;
  document.body.appendChild(overlay);
  document.body.classList.add("pdf-overlay-open");
}
function printPdfOverlay(){
  // window.print() imprime a pagina inteira, mas @media print esconde tudo
  // exceto #pdfOverlay \u2014 resultado: PDF tem so o conteudo do relatorio.
  try{ window.print(); }catch(e){ alert("Nao foi possivel abrir o dialogo de impressao."); }
}
function closePdfOverlay(){
  var el=document.getElementById("pdfOverlay");
  if(el) el.parentNode.removeChild(el);
  document.body.classList.remove("pdf-overlay-open");
}

  function calc(list){
    var atk={pt:0,err:0,n:0}, rec={good:0,n:0}, errAll=0, byP={};
    for(var i=0;i<list.length;i++){
      var a=list[i];
      if(a.ak==="ataque"){atk.n++;if(a.oc==="Ponto")atk.pt++;else if(a.oc==="Erro")atk.err++;}
      if(a.ak==="recepcao"){rec.n++;if(a.oc==="A"||a.oc==="B")rec.good++;}
      if(a.oc==="Erro")errAll++;
      if(!byP[a.pid])byP[a.pid]={pid:a.pid,n:0,f:{}};
      byP[a.pid].n++;
      if(!byP[a.pid].f[a.ak])byP[a.pid].f[a.ak]={n:0,o:{}};
      byP[a.pid].f[a.ak].n++;
      byP[a.pid].f[a.ak].o[a.oc]=(byP[a.pid].f[a.ak].o[a.oc]||0)+1;
    }
    return {
      atkEff: atk.n? Math.round((atk.pt-atk.err)/atk.n*100):null,
      recApr: rec.n? Math.round(rec.good/rec.n*100):null,
      errAll: errAll,
      byP: byP
    };
  }
  var inScope, prevList=null;
  if(scope==="set"){
    inScope=acts.filter(function(a){return (a.set||1)===curSet;});
    if(curSet>1)prevList=acts.filter(function(a){return (a.set||1)===(curSet-1);});
  }else{
    inScope=acts.slice();
  }
  var cur=calc(inScope);
  var prev=prevList?calc(prevList):null;
  // monta lista de atletas (ordenada por volume de acoes, desc)
  var players=[];
  var pids=Object.keys(cur.byP);
  for(var i=0;i<pids.length;i++){
    var p=cur.byP[pids[i]];
    var atk=p.f["ataque"], rec=p.f["recepcao"];
    var atkPt=atk?(atk.o["Ponto"]||0):0, atkErr=atk?(atk.o["Erro"]||0):0;
    var atkEff=(atk&&atk.n)?Math.round((atkPt-atkErr)/atk.n*100):null;
    var recGood=rec?((rec.o["A"]||0)+(rec.o["B"]||0)):0;
    var recApr=(rec&&rec.n)?Math.round(recGood/rec.n*100):null;
    // veredito: bad se ataque eficiencia negativa OU passe abaixo de 50%
    var verdict="neutral";
    if((atkEff!==null&&atkEff<0)||(recApr!==null&&recApr<50))verdict="bad";
    else if((atkEff!==null&&atkEff>=50)||(recApr!==null&&recApr>=70))verdict="good";
    players.push({pid:p.pid,n:p.n,f:p.f,atkPt:atkPt,atkErr:atkErr,atkEff:atkEff,
                  recGood:recGood,recApr:recApr,verdict:verdict});
  }
  players.sort(function(a,b){return b.n-a.n;});
  return {team:cur,prev:prev,players:players};
}

var _livePanelGid=null, _livePanelScope="set";
function openLivePanel(gid){ _livePanelGid=gid; _livePanelScope="set"; renderLivePanel(); }
function closeLivePanel(){ var o=document.getElementById("_livePanel"); if(o)o.parentNode.removeChild(o); _livePanelGid=null; }
function setLivePanelScope(sc){ _livePanelScope=sc; renderLivePanel(); }

function renderLivePanel(){
  var gm=gF(_livePanelGid); if(!gm)return;
  var old=document.getElementById("_livePanel"); if(old)old.parentNode.removeChild(old);
  var curSet=(gm.ss&&gm.ss.length)?gm.ss.length:1;
  var st=livePanelStats(gm,_livePanelScope,curSet);
  var setLbl=(gm.ss&&gm.ss.length)?("SET "+curSet+" \u00b7 "+gm.ss[curSet-1].u+"-"+gm.ss[curSet-1].t):"";
  function trend(cur,prev,invert){
    if(cur===null||prev===null)return "";
    var d=cur-prev; if(d===0)return "<span style=\"color:#64748b\">\u2014 0</span>";
    var up=d>0, goodDir=invert?!up:up;
    var col=goodDir?"#22c55e":"#dc2626";
    var ic=up?"\u2197":"\u2198";
    return "<span style=\"color:"+col+"\">"+ic+" "+(d>0?"+":"")+d+"</span>";
  }
  function cls(v,lo,hi,invert){
    if(v===null)return "";
    if(invert){ if(v<=lo)return "ok"; if(v<=hi)return "warn"; return "bad"; }
    if(v>=hi)return "ok"; if(v>=lo)return "warn"; return "bad";
  }
  function col(c){ return c==="ok"?"#22c55e":c==="warn"?"#fbbf24":c==="bad"?"#f87171":"#cbd5e1"; }
  var t=st.team, p=st.prev;
  var h='<div class="lv-ov" id="_livePanel" onclick="if(event.target===this)closeLivePanel()">';
  h+='<div class="lv-panel" style="--rs-watermark:url(\''+LR+'\')">';
  h+='<div class="lv-hd"><div class="lv-ttl"><span class="lv-dot"></span>PAINEL AO VIVO</div>';
  h+='<button class="lv-x" onclick="closeLivePanel()">\u2715</button></div>';
  h+='<div class="lv-sub">RS vs '+esc(gm.opp||"")+(setLbl?" \u00b7 "+setLbl:"")+'</div>';
  h+='<div class="lv-tgl">';
  h+='<div class="lv-tbtn'+(_livePanelScope==="set"?" on":"")+'" onclick="setLivePanelScope(\'set\')">SET ATUAL</div>';
  h+='<div class="lv-tbtn'+(_livePanelScope==="game"?" on":"")+'" onclick="setLivePanelScope(\'game\')">JOGO TODO</div>';
  h+='</div>';
  // Bloco 1 - Termometro
  h+='<div class="lv-sec"><div class="lv-seclbl">TERM\u00d4METRO DO TIME<span></span></div>';
  var c1=cls(t.atkEff,0,50,false), c2=cls(t.recApr,50,70,false), c3=cls(t.errAll,4,8,true);
  h+='<div class="lv-kpis">';
  h+='<div class="lv-kpi '+c1+'"><div class="lv-kval" style="color:'+col(c1)+'">'+(t.atkEff===null?"\u2013":t.atkEff+"%")+'</div><div class="lv-klbl">EFIC.<br>ATAQUE</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.atkEff,p?p.atkEff:null,false):"")+'</div></div>';
  h+='<div class="lv-kpi '+c2+'"><div class="lv-kval" style="color:'+col(c2)+'">'+(t.recApr===null?"\u2013":t.recApr+"%")+'</div><div class="lv-klbl">APROV.<br>PASSE</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.recApr,p?p.recApr:null,false):"")+'</div></div>';
  h+='<div class="lv-kpi '+c3+'"><div class="lv-kval" style="color:'+col(c3)+'">'+t.errAll+'</div><div class="lv-klbl">ERROS<br>N/ FOR\u00c7.</div><div class="lv-ktr">'+(_livePanelScope==="set"?trend(t.errAll,p?p.errAll:null,true):"")+'</div></div>';
  h+='</div></div>';
  // Bloco 2 - Por atleta
  h+='<div class="lv-sec"><div class="lv-seclbl">POR ATLETA<span></span><small>ORDEM: VOLUME</small></div>';
  if(!st.players.length){
    h+='<div class="lv-empty">Nenhuma a\u00e7\u00e3o registrada neste recorte.</div>';
  }else{
    var fLbl={saque:"Saque",recepcao:"Passe",levantamento:"Levant.",ataque:"Ataque",bloqueio:"Bloqueio",defesa:"Defesa"};
    for(var i=0;i<st.players.length;i++){
      var pl=st.players[i];
      var pf=pFind(pl.pid,_livePanelGid);
      var nm=pf?pf.nm.split(" ")[0]:"?";
      var nu=pf?pf.nu:"-";
      var stripCol=pl.verdict==="bad"?"#dc2626":pl.verdict==="good"?"#16a34a":"#475569";
      h+='<div class="lv-card '+(pl.verdict==="bad"?"bad":pl.verdict==="good"?"good":"")+'">';
      h+='<div class="lv-strip" style="background:'+stripCol+'"></div>';
      h+='<div class="lv-cbody"><div class="lv-chd">';
      h+='<span class="lv-num">'+nu+'</span><span class="lv-nm">'+esc(nm)+'</span>';
      if(pl.verdict==="bad")h+='<span class="lv-tag bad">ATEN\u00c7\u00c3O</span>';
      else if(pl.verdict==="good")h+='<span class="lv-tag good">EM ALTA</span>';
      h+='</div>';
      // ataque com barra
      if(pl.f["ataque"]){
        var an=pl.f["ataque"].n, gp=an?Math.round(pl.atkPt/an*100):0, ge=an?Math.round(pl.atkErr/an*100):0;
        h+='<div class="lv-frow"><span class="lv-flbl">Ataque</span>';
        h+='<span class="lv-bar"><i style="width:'+gp+'%;background:#16a34a"></i><i style="width:'+ge+'%;background:#dc2626"></i></span>';
        h+='<span class="lv-fval">'+pl.atkPt+'p \u00b7 '+pl.atkErr+'e \u00b7 <b style="color:'+(pl.atkEff>=50?"#22c55e":pl.atkEff>=0?"#fbbf24":"#f87171")+'">'+(pl.atkEff===null?"\u2013":pl.atkEff+"%")+'</b></span></div>';
      }
      // passe com barra
      if(pl.f["recepcao"]){
        var ro=pl.f["recepcao"].o, rn=pl.f["recepcao"].n;
        var pA=Math.round((ro["A"]||0)/rn*100),pB=Math.round((ro["B"]||0)/rn*100),pC=Math.round((ro["C"]||0)/rn*100),pE=Math.round((ro["Erro"]||0)/rn*100);
        h+='<div class="lv-frow"><span class="lv-flbl">Passe</span>';
        h+='<span class="lv-bar"><i style="width:'+pA+'%;background:#16a34a"></i><i style="width:'+pB+'%;background:#d97706"></i><i style="width:'+pC+'%;background:#ea580c"></i><i style="width:'+pE+'%;background:#dc2626"></i></span>';
        h+='<span class="lv-fval">A'+(ro["A"]||0)+' B'+(ro["B"]||0)+' C'+(ro["C"]||0)+' <b style="color:'+(pl.recApr>=70?"#22c55e":pl.recApr>=50?"#fbbf24":"#f87171")+'">'+(pl.recApr===null?"\u2013":pl.recApr+"%")+'</b></span></div>';
      }
      // demais fundamentos em texto enxuto
      var others=["saque","levantamento","bloqueio","defesa"];
      for(var j=0;j<others.length;j++){
        var ak=others[j];
        if(pl.f[ak]){
          var o=pl.f[ak].o, parts=[];
          for(var k in o)parts.push(o[k]+" "+k.toLowerCase());
          h+='<div class="lv-frow"><span class="lv-flbl">'+fLbl[ak]+'</span><span class="lv-ftxt">'+parts.join(" \u00b7 ")+'</span></div>';
        }
      }
      h+='</div></div>';
    }
  }
  h+='</div></div></div>';
  var wrap=document.createElement("div");
  wrap.innerHTML=h;
  document.body.appendChild(wrap.firstChild);
}
