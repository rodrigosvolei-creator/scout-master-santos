// === ESCRITA: granular por filho COM PROTEÇÃO contra estado parcial ===
// CRÍTICO: save() só escreve se TODOS os filhos foram carregados.
// Caso contrário, podemos sobrescrever o banco com versão incompleta.
function save(){
  if(!D) return;
  // GUARD: não escrever se algum dos filhos ainda não foi carregado
  if(!_dataLoaded.teams || !_dataLoaded.games || !_dataLoaded.tournaments || !_dataLoaded.athletes){
    console.error("[save] BLOQUEADO: dados ainda nao terminaram de carregar. teams="+_dataLoaded.teams+" games="+_dataLoaded.games+" tournaments="+_dataLoaded.tournaments+" athletes="+_dataLoaded.athletes);
    if(typeof toast==="function")toast("Aguarde os dados terminarem de carregar antes de salvar","error");
    return false;
  }
  // GUARD: não escrever arrays vazios sem motivo
  if(D.games && !Array.isArray(D.games)){console.error("[save] D.games nao e array");return false;}
  if(D.teams && !Array.isArray(D.teams)){console.error("[save] D.teams nao e array");return false;}
  if(D.athletes && !Array.isArray(D.athletes)){console.error("[save] D.athletes nao e array");return false;}
  // Escrever cada filho. .catch silencia (permissão negada por rule é OK pra papéis sem acesso).
  if(D.teams) db.ref("torneio-master-santos/teams").set(D.teams).catch(function(e){console.warn("save teams:",e.code||e.message);});
  if(D.games) db.ref("torneio-master-santos/games").set(D.games).catch(function(e){console.warn("save games:",e.code||e.message);});
  if(D.tournaments) db.ref("torneio-master-santos/tournaments").set(D.tournaments).catch(function(e){console.warn("save tournaments:",e.code||e.message);});
  if(D.athletes) db.ref("torneio-master-santos/athletes").set(D.athletes).catch(function(e){console.warn("save athletes:",e.code||e.message);});
  return true;
}

auth.onAuthStateChanged(function(user){
  currentUser=user;

    userProfile=null;

  }
  // Usuário logado — buscar/criar profile no banco
  var uid=user.uid;

    var prof=snap.val();
    if(!prof){
      // Primeira vez — criar profile básico
      // Regra: se email == ADMIN_EMAIL, vira admin. Senão, visitor (até completar cadastro).
      var emailLc=(user.email||"").toLowerCase();
      var preset=PRESET_ROLES[emailLc];
      var roles;
      if(emailLc===ADMIN_EMAIL.toLowerCase()) roles=["admin"];
      else if(preset&&preset.roles&&preset.roles.length) roles=preset.roles.slice();
      else roles=["visitor"];
      prof={
        uid:uid,
        email:user.email||"",
        displayName:(preset&&preset.displayName)||user.displayName||(user.email?user.email.split("@")[0]:"Usu\u00e1rio"),
        photoURL:user.photoURL||"",
        roles:roles,
        athleteId:null,
        apelido:"",

      };

      // Migrar formato antigo (role string) para novo (roles array)
      if(prof.role&&!prof.roles){
        prof.roles=[prof.role];
        db.ref("torneio-master-santos/users/"+uid+"/roles").set(prof.roles);
      }
    }
    // Pre-autorizacao por email: garante o papel mesmo se o profile ja existia
    // (so ADICIONA, nunca rebaixa; remove visitor ao ganhar papel real). Idempotente.
    try{
      var _emailLc2=(user.email||"").toLowerCase();
      var _preset2=PRESET_ROLES[_emailLc2];
      if(_preset2&&_preset2.roles&&_preset2.roles.length){
        if(!prof.roles)prof.roles=[];
        var _changed=false;
        for(var _pr=0;_pr<_preset2.roles.length;_pr++){
          if(prof.roles.indexOf(_preset2.roles[_pr])<0){prof.roles.push(_preset2.roles[_pr]);_changed=true;}
        }
        if(_changed){
          prof.roles=prof.roles.filter(function(r){return r!=="visitor";});
          db.ref("torneio-master-santos/users/"+uid+"/roles").set(prof.roles);
        }
      }
    }catch(e){}
    userProfile=prof;
    updateRoleFlags();
    // Admin: carregar lista global de usuários para sub-aba Usuários
    if(isAdmin){
      db.ref("torneio-master-santos/users").on("value",function(s){
        var v=s.val();
        D.users=v||{};
        render();
      });
    }
    // Se está em modo cadastro e usuário ainda não tem athleteId/atleta, ir para form
    if(signupMode&&!prof.athleteId&&!userHasRole("atleta")){
      signupStep="form";
      // Pré-preencher apelido com primeiro nome
      if(!signupApelido&&prof.displayName){
        signupApelido=prof.displayName.split(" ")[0];
      }
    }
    render();
  }).catch(function(e){
    console.error("Erro ao buscar profile:",e);
    userProfile={roles:["visitor"],displayName:user.email||"Usu\u00e1rio"};
    updateRoleFlags();
    render();
  });
});

function translateAuthError(err){
  var code=err.code||"";
  if(code==="auth/user-not-found"||code==="auth/wrong-password"||code==="auth/invalid-credential"||code==="auth/invalid-login-credentials")return "Email ou senha incorretos";
  if(code==="auth/invalid-email")return "Email inv\u00e1lido";
  if(code==="auth/email-already-in-use")return "Este email j\u00e1 est\u00e1 cadastrado. Use o bot\u00e3o Entrar";
  if(code==="auth/weak-password")return "Senha muito fraca (m\u00ednimo 6 caracteres)";
  if(code==="auth/popup-closed-by-user")return "Login cancelado";
  if(code==="auth/popup-blocked")return "Popup bloqueado pelo navegador. Permita popups e tente novamente";
  if(code==="auth/network-request-failed")return "Sem conex\u00e3o com a internet";
  if(code==="auth/too-many-requests")return "Muitas tentativas. Tente novamente em alguns minutos";
  return "Erro: "+(err.message||code||"desconhecido");
}

function submitSignup(){
  if(signupLoading)return;
  if(!currentUser){signupError="Voc\u00ea precisa estar logado(a)";render();return;}
  var apelidoEl=document.getElementById("su-apelido");
  if(apelidoEl)signupApelido=apelidoEl.value.trim();
  if(!signupApelido){signupError="Digite um apelido (como quer ser chamado(a) no app)";render();return;}
  if(!signupTeams.length){signupError="Selecione pelo menos uma equipe";render();return;}
  signupLoading=true;signupError="";render();
  
  // Validar token de invite
  var inv=(D.invites||{})[signupToken];
  if(!inv||!inv.active){
    signupLoading=false;
    signupError="Link de cadastro inv\u00e1lido ou desativado. Procure o administrador.";
    render();return;
  }
  
  // Inferir gênero pela primeira equipe selecionada
  var firstTeam=tF(signupTeams[0]);
  var gender="";
  if(firstTeam){
    if(/FEMININO|FEM/i.test(firstTeam.n))gender="F";
    else if(/MASCULINO|MASC/i.test(firstTeam.n))gender="M";
  }
  
  // Criar atleta no banco
  var newAid=uid("a_");
  var newAth={
    aid:newAid,
    nm:userProfile.displayName||signupApelido,
    apelido:signupApelido,
    po:signupPos,
    gender:gender,
    legacy_ids:[],
    tags:[],
    selfReported:true,
    linkedUid:currentUser.uid,
    photoURL:userProfile.photoURL||"",
    createdAt:Date.now()
  };
  if(!D.athletes)D.athletes=[];
  D.athletes.push(newAth);
  
  // Adicionar nos rosters das equipes selecionadas
  for(var i=0;i<signupTeams.length;i++){
    var t=tF(signupTeams[i]);
    if(t){
      if(!t.roster)t.roster=[];
      t.roster.push({aid:newAid});
    }
  }
  
  // Atualizar profile do user
  var newRoles=(userProfile.roles||[]).slice();
  if(newRoles.indexOf("atleta")<0)newRoles.push("atleta");
  // Remove "visitor" se existir
  newRoles=newRoles.filter(function(r){return r!=="visitor";});
  
  var profUpdate={
    roles:newRoles,
    athleteId:newAid,
    apelido:signupApelido,
    selectedTeams:signupTeams.slice()
  };
  
  // Salvar tudo (em paralelo, granular):
  // 1) profile do usuário
  // 2) athletes (escreve banco inteiro pra incluir o novo)
  // 3) teams afetadas (cada uma)
  Promise.all([
    db.ref("torneio-master-santos/users/"+currentUser.uid).update(profUpdate),
    db.ref("torneio-master-santos/athletes").set(D.athletes),
    db.ref("torneio-master-santos/teams").set(D.teams)
  ]).then(function(){
    userProfile.roles=newRoles;
    userProfile.athleteId=newAid;
    userProfile.apelido=signupApelido;
    updateRoleFlags();
    signupLoading=false;
    signupStep="done";
    render();
  }).catch(function(e){
    signupLoading=false;
    signupError="Erro ao salvar: "+(e.message||e);
    render();
  });
}

// Ranking dentro da equipe (extra)
function ranking(){
  if(!pf.tid)return"";
  // Comparar com outros atletas da equipe pf.tid
  var teamAids={};
  if(gid&&gid!=="all"){
    var sg=gF(gid);if(sg&&sg.lineup)for(var i=0;i<sg.lineup.length;i++)teamAids[sg.lineup[i].aid]=true;
  }else{
    if(D.games)for(var gj=0;gj<D.games.length;gj++){var sgg=D.games[gj];if(sgg.tid===pf.tid&&sgg.lineup)for(var li=0;li<sgg.lineup.length;li++)teamAids[sgg.lineup[li].aid]=true;}
  }
  var stats={};
  if(D.games)for(var gj=0;gj<D.games.length;gj++){
    var sg2=D.games[gj];if(!sg2.act||sg2.tid!==pf.tid)continue;
    if(gid&&gid!=="all"&&sg2.id!==gid)continue;
    for(var ai2=0;ai2<sg2.act.length;ai2++){
      var ax=sg2.act[ai2];
      if(!teamAids[ax.pid])continue;
      if(sid&&sid!=="all"&&String(ax.set)!==sid)continue;
      if(!stats[ax.pid])stats[ax.pid]={n:0,pts:0};
      stats[ax.pid].n++;
      if(ax.oc==="Ace"||ax.oc==="Ponto")stats[ax.pid].pts++;
    }
  }
  var rank=Object.keys(stats).map(function(p){return {p:p,n:stats[p].n,pts:stats[p].pts};});
  if(rank.length<2)return"";
  rank.sort(function(a,b){return b.pts-a.pts;});
  var minhaPos=0;for(var i=0;i<rank.length;i++)if(rank[i].p===pid){minhaPos=i+1;break;}
  var rankByActs=rank.slice().sort(function(a,b){return b.n-a.n;});
  var posByActs=0;for(var i=0;i<rankByActs.length;i++)if(rankByActs[i].p===pid){posByActs=i+1;break;}
  var s='<div style="margin-top:18px;padding:14px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0"><h3 style="color:#1e3a8a;font-size:13px;margin-bottom:8px">\uD83C\uDFC6 Compara\u00e7\u00e3o com a equipe</h3>';
  s+='<div style="display:flex;gap:14px;font-size:12px"><div><b style="font-size:18px;color:#059669">'+minhaPos+"\u00ba</b> em pontua\u00e7\u00e3o</div><div><b style=\"font-size:18px;color:#2563eb\">"+posByActs+"\u00ba</b> em participa\u00e7\u00e3o</div><div style=\"color:#64748b\">de "+rank.length+' atletas</div></div></div>';
  return s;
}

function renderTorneioIsolado(){
  var tor=tFnd(torneioId);
  // Fase PG: torneios standalone (PG) voltam a ter o gate de senha de acesso.
  // USA (sem standalone) ja foi redirecionado pra aba unificada no URL parser,
  // entao nao chega aqui no fluxo normal — mas se chegar, entra direto.
  var __access = torneioToken ? TOURNEY_ACCESS[torneioToken] : null;
  if(__access && __access.standalone && !torneioUnlocked){
    return renderTorneioSenha(tor);
  }
  if(torneioGameOpen){
    return renderTorneioScout(torneioGameOpen);
  }
  return renderTorneioCards(tor);
}

function renderTorneioSenha(tor){
  // Fase PG: brand parametrizado (logo + nome) \u2014 USA usa LR, PG usa PG_LOGO.
  var brand=getBrand(torneioToken);
  var nome=tor?tor.n:(brand.title||"Torneio");
  var h='<div class="usa-wrap" style="--rs-watermark:url(\''+brand.logo+'\')"><div class="usa-lock-screen">';
  h+='<div class="usa-lock-card">';
  h+='<div class="usa-lock-crest"><img src="'+brand.logo+'" alt="logo"></div>';
  h+='<div class="usa-lock-title">'+esc(nome)+'</div>';
  h+='<div class="usa-lock-sub">Acesso restrito \u00b7 Scout do torneio</div>';
  h+='<div class="usa-lock-field"><input type="password" id="usa-pwd" placeholder="Senha de acesso" autocomplete="off" onkeydown="if(event.key===\'Enter\')checkTorneioPwd()"></div>';
  if(torneioPwdError)h+='<div class="usa-lock-err">'+esc(torneioPwdError)+'</div>';
  h+='<button class="usa-lock-btn" onclick="checkTorneioPwd()">Entrar</button>';
  h+='<div class="usa-lock-foot">RS-Voleibol \u00b7 2026</div>';
  h+='</div></div></div>';
  return h;
}

function checkTorneioPwd(){
  var inp=document.getElementById("usa-pwd");
  if(!inp)return;
  var val=inp.value.trim();
  var access=TOURNEY_ACCESS[torneioToken];
  if(!access){torneioPwdError="Torneio inv\u00e1lido";render();return;}
  if(val===access.pwd){
    torneioUnlocked=true;
    // PG e outros standalone: senha de acesso ja libera TUDO (sem 2a senha).
    // Mantemos compat com o fluxo legado caso algum dia exista pwd != adminPwd.
    if(access.standalone) torneioAdminUnlocked=true;
    torneioPwdError="";
    try{if(window.sessionStorage)window.sessionStorage.setItem("tourney_"+torneioToken,"1");}catch(e){}
    render();
  }else{
    torneioPwdError="Senha incorreta. Tente novamente.";
    inp.value="";
    render();
  }
}

// Resolve a chave do logo do adversario — usa oppLogo explicito OU detecta pelo nome
function resolveOppLogo(oppLogo,opp){
  if(oppLogo&&OPP_LOGOS[oppLogo])return oppLogo;
  var n=(opp||"").toLowerCase();
  if(n.indexOf("arlington")>=0||n.indexOf("empire")>=0)return "ae";
  if(n.indexOf("tall")>=0)return "tallones";
  if(n.indexOf("highline")>=0||n.indexOf("vba")>=0||n.indexOf("vla")>=0)return "vla";
  return null;
}
function oppLogoSvg(oppLogo,opp,oppLogoData){
  // 1) Logo enviado por upload (base64 no proprio jogo)
  if(oppLogoData){
    return '<div class="usa-opp-logo usa-opp-logo-img"><img src="'+oppLogoData+'" alt="'+esc(opp||"")+'"></div>';
  }
  // 2) Logo real (explicito ou detectado pelo nome)
  var key=resolveOppLogo(oppLogo,opp);
  if(key&&OPP_LOGOS[key]){
    return '<div class="usa-opp-logo usa-opp-logo-img"><img src="'+OPP_LOGOS[key]+'" alt="'+esc(opp||"")+'"></div>';
  }
  // 3) Fallback: escudo por iniciais
  var initials="";
  if(opp){
    var words=opp.split(" ").filter(function(w){return w.length;});
    if(words.length>=2)initials=words[0][0]+words[1][0];
    else if(words.length===1)initials=words[0].substring(0,2);
    initials=initials.toUpperCase();
  }
  return '<div class="usa-opp-logo" style="background:#1e293b">'+initials+'</div>';
}

function renderTorneioCards(tor){
  var nome=tor?tor.n:"Torneio";
  // Buscar jogos do torneio
  var games=[];
  if(D.games)for(var i=0;i<D.games.length;i++){
    if(D.games[i].torId===torneioId)games.push(D.games[i]);
  }
  games.sort(function(a,b){
    var da=(a.dt||"")+(a.tm||"");var db=(b.dt||"")+(b.tm||"");
    return db.localeCompare(da);
  });
  // "Proximo jogo": entre os pendentes (nao live, nao done), o de data/hora
  // mais cedo a partir de agora. Se nenhum for futuro, pega o pendente mais cedo.
  var nextGameId=null;
  (function(){
    var nowKey=(function(){
      var d=new Date(),z=function(n){return(n<10?"0":"")+n;};
      return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())+z(d.getHours())+":"+z(d.getMinutes());
    })();
    var pend=[];
    for(var i=0;i<games.length;i++){
      var g=games[i];
      if(g.st==="live"||g.st==="done")continue;
      pend.push({id:g.id,key:(g.dt||"")+(g.tm||"")});
    }
    pend.sort(function(a,b){return a.key.localeCompare(b.key);});
    for(var j=0;j<pend.length;j++){ if(pend[j].key>=nowKey){nextGameId=pend[j].id;break;} }
    if(!nextGameId&&pend.length)nextGameId=pend[pend.length-1].id;
  })();
  
  // Fase PG: brand parametrizado pelo torneioToken (USA=RS, PG=Praia Grande etc).
  var brand=getBrand(torneioToken);
  var h='<div class="usa-wrap" style="--rs-watermark:url(\''+brand.logo+'\')">';
  // Header
  h+='<div class="usa-header">';
  h+='<div class="usa-header-flag">'+brand.flag+'</div>';
  h+='<div class="usa-header-title">'+esc(nome)+'</div>';
  h+='<div class="usa-header-sub">'+brand.sub+'</div>';
  // Fase PG: admin pode editar logo + nome + subtitulo do celular sem deploy.
  if(canManageTorneio()){
    h+='<button class="usa-brand-edit" onclick="openBrandEditor()" title="Editar logo, nome e subtítulo">🖼 Editar brand</button>';
  }
  h+='<button class="usa-logout" onclick="exitTorneio()">Sair</button>';
  h+='</div>';

  // Botao de criar jogo
  h+='<div style="position:relative;z-index:1;text-align:center;margin:6px 0 4px"><button class="tnj-btn" onclick="openTorneioNovoJogo()">\u2795 Novo Jogo</button></div>';

  if(!games.length){
    h+='<div style="padding:40px 20px;text-align:center;color:rgba(255,255,255,.55);position:relative;z-index:1"><div style="font-size:38px;margin-bottom:10px">\uD83C\uDFD0</div>Nenhum jogo cadastrado ainda.<br>Use <b style="color:#60a5fa">\u2795 Novo Jogo</b> para criar o primeiro.</div>';
  }else{
    h+='<div class="usa-cards">';
    for(var i=0;i<games.length;i++){
      h+=renderGameDayCard(games[i],games[i].id===nextGameId);
    }
    h+='</div>';
  }
  h+='<div class="usa-foot">RS-Voleibol 2026 \u00b7 Associa\u00e7\u00e3o Scola de Voleibol</div>';
  h+='</div>';
  return h;
}

// CARD ESTILO "GAME DAY"
function renderGameDayCard(g,isNext){
  var done=g.st==="done";
  var live=g.st==="live";
  var hasData=g.act&&g.act.length>0;
  // Placar (se houver)
  var scoreLabel="";
  if(g.ss&&g.ss.length){
    var us=0,them=0;
    for(var s=0;s<g.ss.length;s++){
      if(g.ss[s].u>g.ss[s].t)us++;else if(g.ss[s].t>g.ss[s].u)them++;
    }
    scoreLabel=us+" \u00d7 "+them;
  }
  var dtLabel="";
  if(g.dt){
    var p=g.dt.split("-");
    var meses=["JANEIRO","FEVEREIRO","MAR\u00c7O","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    dtLabel=parseInt(p[2])+" DE "+meses[parseInt(p[1])-1]+" DE "+p[0];
  }
  var tmLabel=g.tm?g.tm.substring(0,5):"";
  
  var statusBadge="";
  if(live)statusBadge='<div class="gd-status gd-status-live">\u25CF AO VIVO</div>';
  else if(done)statusBadge='<div class="gd-status gd-status-done">FINALIZADO</div>';
  else statusBadge='<div class="gd-status gd-status-pending">A JOGAR</div>';
  
  // Fase B2.1: tarja unificada (CANCELADO / SEM DADOS) via gameAutoTarja.
  // data-tarja no card escurece/dessatura o conteudo (CSS .gd-card[data-tarja]).
  var gdTarja = (typeof gameAutoTarja==='function') ? gameAutoTarja(g) : null;
  // Fase PG: brand parametrizado por torneioToken \u2014 quando o card eh renderizado
  // FORA do modo isolado (aba unificada), usa o brand do proprio torneio do jogo.
  var cardBrandToken = torneioMode ? torneioToken : null;
  if(!cardBrandToken){
    // No fluxo unificado, descobre o token via torId \u2014 varre TOURNEY_ACCESS.
    for(var __tk in TOURNEY_ACCESS){
      if(TOURNEY_ACCESS[__tk].torId===g.torId){cardBrandToken=__tk;break;}
    }
  }
  var brand=getBrand(cardBrandToken);
  var h='<div class="gd-card'+(isNext?" gd-next":"")+'"'+(gdTarja?' data-tarja="'+gdTarja+'"':'')+' onclick="openGameDayCard(\''+g.id+'\')">';
  if(isNext)h+='<div class="gd-next-tag">\u25B6 PR\u00d3XIMO JOGO</div>';
  // Faixa lateral
  h+='<div class="gd-side">'+brand.title+'</div>';
  h+='<div class="gd-body">';
  // Header GAME DAY
  h+='<div class="gd-head"><span class="gd-game">GAME</span><span class="gd-day">DAY</span><span class="gd-cat">'+brand.cat+'</span></div>';

}

function openTorneioGame(gid){
  torneioGameOpen=gid;
  // Setar S pra apontar pro jogo (motor de scout)
  var g=gF(gid);
  if(g){
    // Garantir estruturas do scout (igual openG faz) — jogos importados podem nao ter ss/act
    if(!g.ss||!g.ss.length)g.ss=[{u:0,t:0}];
    if(!g.act)g.act=[];
    // Jogo do torneio sem escalacao — Fase PG: pega o roster certo via TOURNEY_ACCESS.
    if((!g.lineup||!g.lineup.length)&&g.torId===torneioId){
      var __acc=TOURNEY_ACCESS[torneioToken];
      var __roster=null;
      if(__acc && __acc.rosterVar && typeof window!=='undefined' && window[__acc.rosterVar] && window[__acc.rosterVar].length){
        __roster=window[__acc.rosterVar];
      }
      var built=buildUsaLineup(__roster);
      if(built && built.length){
        g.lineup=built;
        save();
      }
    }
    S={aid:gid,sp:null,sa:null,cs:g.ss.length,us:[],tm:0,rn:false,ti:null};
  }
  render();
}

// === Fase B1.1: helpers do fluxo unificado de torneios ===
// tnyLayout(tor): qual layout o detalhe do torneio usa ('gameday' = cards
// GAME DAY estilo USA; 'default' = listagem de jogos padrao via team-hub).
// Fallback hardcoded p/ o torneio USA legado (id 't_usa_open') ate que o
// campo tor.layout seja preenchido no banco.
function tnyLayout(tor){
  if(!tor) return 'default';
  if(tor.layout==='gameday') return 'gameday';
  if(tor.id==='t_usa_open') return 'gameday';
  return 'default';
}

// openGameDayCard(gid): dispatcher unificado do click no GAME DAY card.
// Em modo isolado (torneioMode) delega pro fluxo legado openTorneioGame.
// Em modo aba prepara o jogo (ss/act/lineup) e navega pra tab=scout.
function openGameDayCard(gid){
  if(torneioMode){ openTorneioGame(gid); return; }
  var g=gF(gid);
  if(!g) return;
  if(!g.ss||!g.ss.length) g.ss=[{u:0,t:0}];
  if(!g.act) g.act=[];
  var tor = (typeof tFnd==='function') ? tFnd(g.torId) : null;
  if((!g.lineup||!g.lineup.length) && tor && tnyLayout(tor)==='gameday' && typeof buildUsaLineup==='function'){
    g.lineup=buildUsaLineup();
    if(typeof save==='function') save();
  }
  S={aid:gid,sp:null,sa:null,cs:g.ss.length,us:[],tm:0,rn:false,ti:null};
  tab='scout';
  render();
}

// === Fase B2.2: gate unificado pra gestao do torneio ===
// Antes era apenas torneioAdminUnlocked (senha de admin no modo isolado).
// Agora quem tem papel admin/coord no login geral destrava direto na aba.
function canManageTorneio(){
  if(torneioMode && torneioAdminUnlocked) return true;
  if(!torneioMode && (isAdmin || isCoord)) return true;
  return false;
}

// === Fase B2.1: helper unico de tarja do card de jogo ===
// gameAutoTarja(g): retorna 'cancelled', 'no_data' ou null.
// Prioridade: tarja manual setada por admin (g.status_tag) prevalece sobre auto.
// Auto: jogo passado (g.dt anterior a hoje) + sem acoes registradas
// + sem resultado declarado (g.result.type) => 'no_data'.
function gameAutoTarja(g){
  if(!g) return null;
  if(g.status_tag==='cancelled') return 'cancelled';
  if(g.status_tag==='no_data') return 'no_data';
  if(!g.dt) return null;
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dt=new Date(g.dt+"T12:00:00");
  if(dt>=hoje) return null;
  var nActions=(g.act&&g.act.length)||0;
  if(nActions>0) return null;
  if(g.result && g.result.type) return null;
  return 'no_data';
}

// === Fase C: torneio encerrado / historico ===
// Torneio com tor.archived=true vira so-leitura (sem criar/editar/excluir jogo).
// Visualmente: card cinza no rTor + selo ENCERRADO, rTorDetail tambem.
// O bloqueio das ACOES de scout fica como follow-up — por ora a UI admin some.
function isArchivedTor(t){ return !!(t && t.archived); }

// canEditTorneioGames(tor): admin pode gerenciar jogos do torneio NAO encerrado.
function canEditTorneioGames(tor){
  return canManageTorneio() && !isArchivedTor(tor);
}

// Toggle do status arquivado (admin/coord) — confirma antes de re-ativar.
function toggleTorneioArchived(torId){
  if(!canManageTorneio()){
    if(typeof toast==='function') toast('So admin pode mudar o status do torneio.','bad');
    return;
  }
  var t = tFnd(torId); if(!t) return;
  t.archived = !t.archived;
  if(typeof save==='function') save();
  if(typeof toast==='function') toast(t.archived?'Torneio marcado como encerrado.':'Torneio reativado.','ok');
  render();
}

function checkTorneioAdminPwd(){
  var inp=document.getElementById("tnj-admin-pwd");if(!inp)return;
  var access=TOURNEY_ACCESS[torneioToken];
  var errEl=document.getElementById("tnj-admin-err");
  if(access&&inp.value.trim()===access.adminPwd){
    torneioAdminUnlocked=true;
    closeTorneioModal();

    if(_tnjPendingAction){
      var ac=_tnjPendingAction;_tnjPendingAction=null;

    if(errEl)errEl.textContent="Senha incorreta.";
    inp.value="";
  }
}

  reader.onload=function(ev){
    _tnjLogoData=ev.target.result;

      txt.innerHTML='<div class="tnj-logo-preview"><img src="'+_tnjLogoData+'"></div>Logo carregado \u2014 toque para trocar';

function saveBrandEditor(){
  var torId=torneioMode ? torneioId : selTor;

function excluirTorneioJogo(gid){
  // Gate de admin: senha no modo isolado, papel (admin/coord) no fluxo unificado.
  if(!canManageTorneio()){
    openTorneioAdminGateFor("excluir",gid);
    return;
  }
  // Fase C: torneio do jogo arquivado bloqueia exclusao (defense-in-depth).
  var dgg = gF(gid);
  if(dgg && isArchivedTor(tFnd(dgg.torId))){
    if(typeof toast==="function") toast("Torneio encerrado — não aceita exclusão.","bad");
    return;
  }
  var g=gF(gid);if(!g)return;
  var nome="RS vs "+(g.opp||"advers\u00e1rio");
  var temDados=g.act&&g.act.length;
  var m='<div class="tnj-modal" onclick="cancelTorneioModal()"><div class="tnj-box" onclick="event.stopPropagation()" style="max-width:340px">';

}

function salvarTorneioJogo(){
  var opp=(document.getElementById("tnj-opp")||{}).value;
  var dt=(document.getElementById("tnj-dt")||{}).value;
  var tm=(document.getElementById("tnj-tm")||{}).value;
  var phase=(document.getElementById("tnj-phase")||{}).value;
  var fmt=parseInt((document.getElementById("tnj-fmt")||{}).value,10);
  if(fmt!==5)fmt=3; // melhor de 3 por padrao
  var errEl=document.getElementById("tnj-err");
  opp=(opp||"").trim();
  if(!opp){if(errEl)errEl.textContent="Informe o nome do advers\u00e1rio.";return;}
  if(!dt){if(errEl)errEl.textContent="Informe a data do jogo.";return;}
  // Fase B2.2: torneio ativo. No modo isolado, vem do global torneioId.
  // No fluxo unificado (aba) vem do selTor (torneio selecionado em rTorDetail).
  var activeTorId = torneioMode ? torneioId : selTor;
  // Fase PG: bootstrap standalone \u2014 se o torneio configurado nao existe ainda,
  // cria o torneio + a equipe (Praia Grande etc) no primeiro jogo. Garante que
  // o time NAO eh herdado do RS (que seria o D.teams[0] fallback).
  var __access = torneioMode && TOURNEY_ACCESS[torneioToken];
  if(__access && __access.standalone){
    // 1. Garante torneio
    if(!tFnd(__access.torId)){
      if(!D.tournaments) D.tournaments=[];
      D.tournaments.push({
        id:__access.torId, n:__access.brandTitle||"Torneio",
        c:__access.brandColor||"#06b6d4", color:__access.brandColor||"#06b6d4",
        cat:__access.brandSub||"", season:(new Date()).getFullYear()+"",
        layout:"gameday", st:"live"
      });
    }
    // 2. Garante equipe
    if(__access.teamId && !tF(__access.teamId)){
      if(!D.teams) D.teams=[];
      D.teams.push({
        id:__access.teamId, n:__access.brandTeam||"Time",
        c:__access.brandColor||"#06b6d4",
        roster:[]
      });
    }
  }
  // Herdar a equipe: prioridade pra teamId standalone, depois 1o jogo do torneio, depois fallback
  var tid="";
  if(__access && __access.standalone && __access.teamId) tid=__access.teamId;
  if(!tid && D.games)for(var i=0;i<D.games.length;i++){if(D.games[i].torId===activeTorId){tid=D.games[i].tid;break;}}
  if(!tid&&D.teams&&D.teams.length)tid=D.teams[0].id;
  if(!tid){if(errEl)errEl.textContent="Nenhuma equipe encontrada para o torneio.";return;}
  var t=tF(tid);
  // Fase B2.2: ler radio da tarja admin (vazio = sem tarja).
  var newStatusTag="";
  var tarjaRadios=document.getElementsByName("tnj-tarja");
  for(var tri=0;tri<tarjaRadios.length;tri++){ if(tarjaRadios[tri].checked){ newStatusTag=tarjaRadios[tri].value||""; break; } }
  // ---- MODO EDICAO: atualiza um jogo pendente existente ----
  if(_tnjEditId){
    var eg=gF(_tnjEditId);
    if(!eg){if(errEl)errEl.textContent="Jogo nao encontrado.";return;}
    if(eg.st==="live"||eg.st==="done"){
      if(errEl)errEl.textContent="Este jogo nao esta mais pendente e nao pode ser editado.";
      return;
    }
    eg.opp=opp;eg.dt=dt;eg.tm=tm||"";
    eg.phase=phase||"Fase de Classifica\u00e7\u00e3o";
    eg.maxSets=fmt;
    if(_tnjLogoData)eg.oppLogoData=_tnjLogoData;
    // Fase B2.2: persiste tarja admin (vazio remove a tarja manual; auto continua valendo)
    if(newStatusTag) eg.status_tag=newStatusTag; else delete eg.status_tag;
    save();
    _tnjLogoData=null;_tnjEditId=null;
    closeTorneioModal();
    if(typeof toast==="function")toast("Jogo atualizado!","ok");
    render();
    return;
  }
  // ---- MODO CRIAR ----
  var novoJogo={
    id:uid("g_"),tid:tid,torId:activeTorId,tor:(t?t.n:""),
    cat:"Adulto",phase:phase||"Fase de Classifica\u00e7\u00e3o",
    maxSets:fmt,
    opp:opp,dt:dt,tm:tm||"",loc:"",
    pl:[],act:[],ss:[],st:"pending",result:null,
    // Fase PG: standalone usa o roster proprio (PG_ROSTER, etc). Default = USA.
    lineup:(function(){
      if(typeof buildUsaLineup!=='function') return [];
      if(__access && __access.standalone && __access.rosterVar){
        var customRoster=(typeof window!=='undefined' && window[__access.rosterVar]) ? window[__access.rosterVar] : null;
        if(customRoster && customRoster.length) return buildUsaLineup(customRoster);
        return []; // roster ainda vazio (cliente vai enviar)
      }
      return buildUsaLineup();
    })()
  };
  // Logo: se enviou imagem, guarda no proprio jogo (base64)
  if(_tnjLogoData)novoJogo.oppLogoData=_tnjLogoData;
  // Fase B2.2: persiste tarja admin (se selecionada)
  if(newStatusTag) novoJogo.status_tag=newStatusTag;
  if(!D.games)D.games=[];
  D.games.push(novoJogo);
  save();
  _tnjLogoData=null;
  closeTorneioModal();
  if(typeof toast==="function")toast("Jogo criado!","ok");
  render();
}

        var aa=atletasDisp[i];
        m+='<option value="'+aa.aid+'">'+esc(aa.nm)+(aa.apelido?' ("'+esc(aa.apelido)+'")':"")+'</option>';

      m+='</select>';

function closeUserEditor(){var m=document.getElementById("userEditorModal");if(m)m.remove();}

function saveUserRoles(uid){
  var u=(D.users||{})[uid];if(!u)return;
  var chks=document.querySelectorAll(".ue-role");
  var newRoles=[];
  for(var i=0;i<chks.length;i++){
    if(chks[i].checked)newRoles.push(chks[i].getAttribute("data-role"));
  }
  if(!newRoles.length){toast("Selecione pelo menos um papel ou exclua o usu\u00e1rio","error");return;}
  // Não pode remover admin do próprio
  if(currentUser&&currentUser.uid===uid&&newRoles.indexOf("admin")<0){
    toast("Voc\u00ea n\u00e3o pode remover seu pr\u00f3prio acesso de admin","error");return;
  }
  db.ref("torneio-master-santos/users/"+uid+"/roles").set(newRoles).then(function(){
    if(D.users&&D.users[uid])D.users[uid].roles=newRoles;
    closeUserEditor();
    toast("Pap\u00e9is atualizados","ok");
    render();
  }).catch(function(e){toast("Erro: "+e.message,"error");});
}

function linkUserToAthlete(uid){
  var sel=document.getElementById("ue-link-aid");
  if(!sel||!sel.value){toast("Selecione uma atleta","error");return;}
  var aid=sel.value;
  db.ref("torneio-master-santos/users/"+uid+"/athleteId").set(aid).then(function(){
    if(D.users&&D.users[uid])D.users[uid].athleteId=aid;
    // Atualizar linkedUid no atleta
    var ath=aFind(aid);
    if(ath){
      ath.linkedUid=uid;
      save();
    }
    closeUserEditor();
    toast("Vinculado(a)!","ok");
    render();
  });
}

function unlinkUserAthlete(uid){
  var u=(D.users||{})[uid];if(!u)return;
  confirmModal({
    title:"DESVINCULAR ATLETA",
    body:"Remover o v\u00ednculo entre "+(u.displayName||"este usu\u00e1rio")+" e a atleta no banco? O usu\u00e1rio continua existindo, mas perde a refer\u00eancia.",
    confirmLabel:"Desvincular",
    confirmStyle:"bd",
    onConfirm:function(){
      var oldAid=u.athleteId;
      db.ref("torneio-master-santos/users/"+uid+"/athleteId").remove().then(function(){
        if(D.users&&D.users[uid])delete D.users[uid].athleteId;
        if(oldAid){
          var ath=aFind(oldAid);
          if(ath&&ath.linkedUid===uid){delete ath.linkedUid;save();}
        }
        closeUserEditor();
        toast("V\u00ednculo removido","ok");
        render();
      });
    }
  });
}

function deleteUser(uid){
  var u=(D.users||{})[uid];if(!u)return;
  if(currentUser&&currentUser.uid===uid){toast("Voc\u00ea n\u00e3o pode excluir a si mesmo(a)","error");return;}
  confirmModal({
    title:"EXCLUIR USU\u00c1RIO",
    body:"Excluir <b>"+esc(u.displayName||"")+"</b> do sistema? A pessoa perde acesso, mas a atleta no banco (se houver) permanece com o hist\u00f3rico.<br><br><span style=\"font-size:11px;color:var(--gray)\">A pessoa pode se cadastrar novamente pelo link.</span>",
    confirmLabel:"Excluir",
    confirmStyle:"bd",
    onConfirm:function(){
      db.ref("torneio-master-santos/users/"+uid).remove().then(function(){
        if(D.users)delete D.users[uid];
        // Limpa linkedUid no atleta correspondente
        if(u.athleteId){
          var ath=aFind(u.athleteId);
          if(ath&&ath.linkedUid===uid){delete ath.linkedUid;save();}
        }
        closeUserEditor();
        toast("Usu\u00e1rio exclu\u00eddo","ok");
        render();
      });
    }
  });
}

// Aba Atletas — banco unificado
function rAthletesBank(){
  if(!D.athletes||!D.athletes.length){
    return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)"><div style="font-size:42px;margin-bottom:10px">\u{1F46B}</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Nenhum atleta no banco</div><div style="font-size:12px">Cadastre atletas via "Configura\u00e7\u00f5es \u2192 Equipes \u2192 + Novo Atleta" — eles aparecer\u00e3o aqui automaticamente.</div></div>';
  }
  // Filtros
  var h='<div class="cd" style="padding:12px;margin-bottom:14px"><div class="rw">';
  h+='<div style="flex:2"><span class="lb">Buscar</span><input id="ab-search" placeholder="Nome do(a) atleta..." oninput="renderAthletesList()"></div>';
  h+='<div style="flex:1"><span class="lb">G\u00eanero</span><select id="ab-gen" onchange="renderAthletesList()"><option value="all">Todos</option><option value="F">Feminino</option><option value="M">Masculino</option></select></div>';
  h+='<div style="flex:1"><span class="lb">Status</span><select id="ab-st" onchange="renderAthletesList()"><option value="all">Todos</option><option value="active">Em equipes ativas</option><option value="orphan">Sem equipe</option><option value="santos">Hist\u00f3rico Santos</option></select></div>';
  h+='</div></div>';
  h+='<div id="ab-list">'+renderAthletesListInner()+'</div>';
  return h;
}
function renderAthletesListInner(){
  var q=(document.getElementById("ab-search")?document.getElementById("ab-search").value:"").toLowerCase().trim();
  var gen=document.getElementById("ab-gen")?document.getElementById("ab-gen").value:"all";
  var st=document.getElementById("ab-st")?document.getElementById("ab-st").value:"all";
  // Coletar atletas com info de equipes
  var rows=[];
  for(var i=0;i<D.athletes.length;i++){
    var a=D.athletes[i];
    if(q&&(a.nm||"").toLowerCase().indexOf(q)<0)continue;
    if(gen!=="all"&&a.gender!==gen)continue;
    // Encontrar equipes (ativas)
    var teamsActive=[],teamsArchived=[];
    for(var ti=0;ti<D.teams.length;ti++){
      var t=D.teams[ti];
      if(!t.roster)continue;
      for(var j=0;j<t.roster.length;j++){
        if(t.roster[j].aid===a.aid){
          (t.archived?teamsArchived:teamsActive).push({n:t.n,c:t.c});
          break;
        }
      }
    }
    if(st==="active"&&!teamsActive.length)continue;
    if(st==="orphan"&&(teamsActive.length||teamsArchived.length))continue;
    if(st==="santos"&&(a.tags||[]).indexOf("santos2026")<0)continue;
    rows.push({a:a,active:teamsActive,archived:teamsArchived});
  }
  // Ordenar por nome
  rows.sort(function(x,y){return (x.a.nm||"").localeCompare(y.a.nm||"");});
  if(!rows.length)return '<div class="cd" style="padding:24px;text-align:center;color:var(--gray)">Nenhum atleta encontrado.</div>';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:var(--gray);font-weight:600">'+rows.length+' atleta'+(rows.length===1?"":"s")+'</span></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';
  for(var k=0;k<rows.length;k++){
    var r=rows[k],a=r.a;
    var genIcon=a.gender==="F"?"\u2640":a.gender==="M"?"\u2642":"";
    var santosTag=(a.tags||[]).indexOf("santos2026")>=0;
    h+='<div class="cd" style="padding:12px 14px;cursor:pointer;margin-bottom:0" onclick="editAthleteFromBank(\''+a.aid+'\')">';
    h+='<div style="display:flex;align-items:flex-start;gap:10px">';
    h+='<div style="width:36px;height:36px;border-radius:8px;background:var(--card2);color:var(--gray);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">'+(a.nm?a.nm[0].toUpperCase():"?")+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:14px;font-weight:700;line-height:1.2">'+esc(a.nm)+(genIcon?' <span style="color:var(--gray);font-weight:400">'+genIcon+'</span>':'')+'</div>';
    if(a.po)h+='<div style="font-size:11px;color:var(--gray);margin-top:2px">'+esc(a.po)+'</div>';
    var chips=[];
    for(var ti2=0;ti2<r.active.length;ti2++){var ta=r.active[ti2];chips.push('<span style="background:'+ta.c+'15;color:'+ta.c+';padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">'+esc(ta.n.replace(/^RS\s*/,""))+'</span>');}
    if(santosTag)chips.push('<span style="background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">\u{1F4E6} Santos</span>');
    if(chips.length)h+='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">'+chips.join("")+'</div>';
    h+='</div></div></div>';
  }
  h+='</div>';
  return h;
}
function renderAthletesList(){var c=document.getElementById("ab-list");if(c)c.innerHTML=renderAthletesListInner();}

function editAthleteFromBank(aid){
  var ath=aFind(aid);if(!ath)return;
  var m='<div class="admin-modal" onclick="closeAthBank()"><div class="admin-box" onclick="event.stopPropagation()" style="text-align:left;max-width:420px;max-height:90vh;overflow-y:auto"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px;color:var(--navy);margin-bottom:14px;text-align:center">EDITAR NO BANCO</div>';
  m+='<div style="margin-bottom:10px"><span class="lb">Nome</span><input id="ab-nm" value="'+esc(ath.nm||"")+'"></div>';
  m+='<div class="rw" style="margin-bottom:10px"><div style="flex:1"><span class="lb">Posi\u00e7\u00e3o</span><select id="ab-po">';
  for(var k=0;k<POS.length;k++)m+='<option'+(POS[k]===ath.po?' selected':'')+'>'+POS[k]+'</option>';
  m+='</select></div>';
  m+='<div style="flex:1"><span class="lb">G\u00eanero</span><select id="ab-genE"><option value="">\u2014</option><option value="F"'+(ath.gender==="F"?" selected":"")+'>Feminino</option><option value="M"'+(ath.gender==="M"?" selected":"")+'>Masculino</option></select></div></div>';
  // Equipes em que joga
  var teamsList=[];
  for(var ti=0;ti<D.teams.length;ti++){
    var t=D.teams[ti];
    if(!t.roster)continue;
    for(var j=0;j<t.roster.length;j++){
      if(t.roster[j].aid===aid){
        teamsList.push({tid:t.id,tn:t.n,c:t.c,arch:t.archived,lastNu:(ath.last_nu_by_team&&ath.last_nu_by_team[t.id]!==undefined)?ath.last_nu_by_team[t.id]:null});
        break;
      }
    }
  }
  m+='<div style="margin-bottom:14px"><span class="lb">Em equipes</span>';
  if(teamsList.length){
    m+='<div style="display:flex;flex-direction:column;gap:6px">';
    for(var i=0;i<teamsList.length;i++){
      var tl=teamsList[i];
      m+='<div style="background:var(--card2);padding:8px 10px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:13px"><span style="background:'+tl.c+'30;color:'+tl.c+';padding:2px 8px;border-radius:5px;font-weight:800" title="\u00daltimo n\u00famero usado">'+(tl.lastNu!==null?"#"+tl.lastNu:"\u2014")+'</span><span style="flex:1">'+esc(tl.tn)+(tl.arch?' <span style="font-size:10px;color:var(--gray)">[arquivada]</span>':'')+'</span></div>';
    }
    m+='</div>';
  }else{
    m+='<div style="color:var(--gray);font-size:12px;font-style:italic">Atleta n\u00e3o vinculado(a) a nenhuma equipe</div>';
  }
  m+='</div>';
  // Tags
  var tags=ath.tags||[];
  if(tags.length){
    m+='<div style="margin-bottom:14px"><span class="lb">Tags</span><div style="display:flex;flex-wrap:wrap;gap:4px">';
    for(var i=0;i<tags.length;i++)m+='<span style="background:#fef3c7;color:#92400e;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600">'+esc(tags[i])+'</span>';
    m+='</div></div>';
  }
  m+='<div style="display:flex;gap:8px">';
  if(!teamsList.length)m+='<button class="bt bd bsm" onclick="delAthleteFromBank(\''+aid+'\')">\u{1F5D1}</button>';
  m+='<button class="bt bg" style="flex:1" onclick="closeAthBank()">Cancelar</button>';
  m+='<button class="bt bs" style="flex:1" onclick="saveAthBank(\''+aid+'\')">\u2713 Salvar</button></div>';
  m+='</div></div>';
  var d=document.createElement("div");d.id="abModal";d.innerHTML=m;document.body.appendChild(d);
}
function saveAthBank(aid){
  var ath=aFind(aid);if(!ath)return;
  var nm=document.getElementById("ab-nm").value.trim();
  var po=document.getElementById("ab-po").value;
  var gen=document.getElementById("ab-genE").value;
  if(!nm){toast("Nome n\u00e3o pode ficar vazio","error");return;}
  ath.nm=nm;
  ath.po=po;
  if(gen)ath.gender=gen;
  closeAthBank();
  toast("Atleta atualizado(a) no banco","ok");
  save();
}
function delAthleteFromBank(aid){
  var ath=aFind(aid);if(!ath)return;
  // Já validamos antes que não está em nenhuma equipe
  closeAthBank();
  confirmModal({
    title:"REMOVER DO BANCO",
    body:"Remover <b>"+esc(ath.nm)+"</b> do banco de atletas?<br><span style=\"color:var(--gray);font-size:12px\">Essa a\u00e7\u00e3o n\u00e3o pode ser desfeita. As estat\u00edsticas hist\u00f3ricas que referenciam esse atleta ficar\u00e3o sem nome.</span>",
    confirmLabel:"\u{1F5D1} Remover",
    confirmStyle:"bd",
    onConfirm:function(){
      D.athletes=D.athletes.filter(function(a){return a.aid!==aid;});
      toast(ath.nm+" removido(a) do banco","ok");
      save();
    }
  });
}
function closeAthBank(){var m=document.getElementById("abModal");if(m)m.remove();}

function rArchive(){
  var arc=getArchivedTeams();
  if(!arc.length)return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Nenhuma equipe arquivada.</div>';
  // Agrupar por archive_label
  var byLabel={};
  for(var i=0;i<arc.length;i++){
    var lbl=arc[i].archive_label||"Arquivo";
    if(!byLabel[lbl])byLabel[lbl]=[];
    byLabel[lbl].push(arc[i]);
  }
  var h='<div style="background:#fef3c7;border:1px solid #fde68a;color:#92400e;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:14px">\u{1F4E6} As equipes arquivadas guardam o hist\u00f3rico de torneios passados. Atletas e dados s\u00e3o preservados como refer\u00eancia, mas n\u00e3o aparecem na opera\u00e7\u00e3o ativa do app. Para reativar uma equipe, use o bot\u00e3o <b>Restaurar</b> ao lado dela.</div>';
  var labels=Object.keys(byLabel);
  for(var li=0;li<labels.length;li++){
    var lbl=labels[li];
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:var(--navy);margin:18px 0 10px">\u{1F4E6} '+esc(lbl).toUpperCase()+'</div>';
    var grp=byLabel[lbl];
    for(var i=0;i<grp.length;i++){
      var t=grp[i];
      var pc=t.roster?t.roster.length:0;
      var gc=0;if(D.games)for(var j=0;j<D.games.length;j++){if(D.games[j].tid===t.id)gc++;}
      h+='<div class="cd" style="border-left:4px solid '+t.c+';padding:14px 16px;margin-bottom:8px;opacity:.85">';
      h+='<div style="display:flex;align-items:center;gap:12px">'+tLs(t)+'<div style="flex:1"><b style="font-size:15px">'+esc(t.n)+'</b><div style="margin-top:3px"><span class="badge" style="background:'+t.c+'15;color:'+t.c+'">'+pc+' atletas</span> <span class="badge" style="background:var(--card2);color:var(--gray)">'+gc+' jogos</span></div></div>';
      h+='<div style="display:flex;flex-direction:column;gap:4px"><button class="bt bg bsm" onclick="unarchiveTeam(\''+t.id+'\')">\u21A9 Restaurar</button></div>';
      h+='</div>';
      // Lista atletas (apenas leitura)
      if(t.roster&&t.roster.length){
        // Ordenar pelo último número usado (se houver) ou por nome
        var rosterEntries=t.roster.slice();
        var enrichedArc=[];
        for(var k=0;k<rosterEntries.length;k++){
          var entry=rosterEntries[k];
          var ath=aFind(entry.aid);
          if(!ath)continue;
          var lastNu=ath.last_nu_by_team&&ath.last_nu_by_team[t.id]!==undefined?ath.last_nu_by_team[t.id]:null;
          enrichedArc.push({entry:entry,ath:ath,lastNu:lastNu});
        }
        enrichedArc.sort(function(a,b){
          if(a.lastNu!==null&&b.lastNu!==null)return a.lastNu-b.lastNu;
          if(a.lastNu!==null)return -1;
          if(b.lastNu!==null)return 1;
          return (a.ath.nm||"").localeCompare(b.ath.nm||"");
        });
        h+='<div style="margin-top:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px">';
        for(var k=0;k<enrichedArc.length;k++){
          var item=enrichedArc[k];
          var lbl=item.lastNu!==null?String(item.lastNu):"\u2014";
          h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card2);border-radius:8px;font-size:12px"><span style="background:'+t.c+'30;color:'+t.c+';width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px">'+lbl+'</span><span style="font-weight:600">'+esc(item.ath.nm)+'</span></div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
  }
  return h;
}

function unarchiveTeam(tid){
  var t=tF(tid);if(!t||!t.archived)return;
  confirmModal({
    title:"RESTAURAR EQUIPE",
    body:"Restaurar a equipe <b>"+esc(t.n)+"</b> para a UI ativa?<br><span style=\"color:var(--gray);font-size:12px\">Ela voltar\u00e1 a aparecer nos selects de jogos e nos filtros principais.</span>",
    confirmLabel:"\u21A9 Restaurar",
    confirmStyle:"bp",
    onConfirm:function(){
      delete t.archived;
      delete t.archive_label;
      toast("Equipe restaurada","ok");
      save();
    }
  });
}

function confirmArchive(tid){

  var lbl=document.getElementById("arch-lbl").value.trim()||"Arquivo";
  t.archived=true;
  t.archive_label=lbl;
  closeArchModal();
  toast(t.n+" arquivada","ok");
  save();
}
function closeArchModal(){var m=document.getElementById("archModal");if(m)m.remove();}

function saveRenameTeam(tid){

  toast("Equipe \""+nm+"\" criada","ok");
  save();
}

      h+='</div>';

    h+='</div>';

  h+='</div>'; // fecha .sc-panel
}
return h;}

function mkBar(data,ht){var mx=0;for(var i=0;i<data.length;i++)if(data[i].v>mx)mx=data[i].v;if(!mx)mx=1;var s='<div class="chart-bar" style="height:'+ht+'px">';for(var i=0;i<data.length;i++){var d=data[i];var bh=Math.max(4,d.v/mx*(ht-35));s+='<div class="bar" style="height:'+bh+'px;background:'+d.c+'"><div class="bar-val" style="color:'+d.c+'">'+d.v+'</div><div class="bar-label">'+d.l+'</div></div>';}return s+'</div>';}
function mkPie(data){var total=0;for(var i=0;i<data.length;i++)total+=data[i].v;if(!total)return'';var cum=0;var grad="";for(var i=0;i<data.length;i++){var pct=data[i].v/total*100;grad+=data[i].c+" "+cum+"% "+(cum+pct)+"%";cum+=pct;if(i<data.length-1)grad+=",";}var s='<div class="chart-pie" style="background:conic-gradient('+grad+')"></div><div class="pie-legend">';for(var i=0;i<data.length;i++){s+='<span><span class="dot" style="background:'+data[i].c+'"></span>'+data[i].l+' ('+data[i].v+')</span>';}return s+'</div>';}

function rDest(fcol){
// Filtros próprios encadeados
var dGames=getFinGames(gDstTeam);
var h=rFilters(gDstTeam,gDstGame,"setDstTeam(this.value)","setDstGame(this.value)");
// Destaques só aparecem com jogo específico selecionado
if(gDstGame==="all"){
  return h+'<div style="text-align:center;padding:50px 20px;color:var(--gray)"><div style="font-size:42px;margin-bottom:10px">\u{1F3C6}</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Selecione um jogo</div><div style="font-size:12px">Os destaques s\u00e3o calculados por partida.<br>Escolha um jogo no filtro acima.</div></div>';
}
var acts=collectActs(dGames,gDstGame);
if(!acts.length)return h+'<div style="text-align:center;padding:30px;color:var(--gray)">Sem a\u00e7\u00f5es registradas neste jogo.</div>';
// Agregação por atleta
var agg={};
for(var i=0;i<acts.length;i++){
  var a=acts[i];
  if(!agg[a.pid])agg[a.pid]={total:0,pts:0,offTotal:0,byF:{}};
  agg[a.pid].total++;
  // Ponto = Ace (saque), Ataque com "Ponto", Bloqueio com "Ponto"
  if(a.oc==="Ace"||(a.ak==="ataque"&&a.oc==="Ponto")||(a.ak==="bloqueio"&&a.oc==="Ponto"))agg[a.pid].pts++;
  // Ações ofensivas (saque/ataque/bloqueio) — denominador do % do pontuador
  if(a.ak==="saque"||a.ak==="ataque"||a.ak==="bloqueio")agg[a.pid].offTotal++;
  // Por fundamento
  if(!agg[a.pid].byF[a.ak])agg[a.pid].byF[a.ak]={n:0,good:0};
  agg[a.pid].byF[a.ak].n++;
  // O que conta como "good" por fundamento
  var good=false;
  if(a.ak==="saque"&&a.oc==="Ace")good=true;
  else if(a.ak==="recepcao"&&a.oc==="A")good=true;
  else if(a.ak==="levantamento"&&a.oc==="A")good=true;
  else if(a.ak==="ataque"&&a.oc==="Ponto")good=true;
  else if(a.ak==="bloqueio"&&a.oc==="Ponto")good=true;
  else if(a.ak==="defesa"&&a.oc==="A")good=true;
  if(good)agg[a.pid].byF[a.ak].good++;
}
// MVP — maior pontuador
var pids=Object.keys(agg);
var mvpId=null,mvpPts=0;
for(var i=0;i<pids.length;i++){if(agg[pids[i]].pts>mvpPts){mvpPts=agg[pids[i]].pts;mvpId=pids[i];}}
if(mvpId){
  var mvp=pFind(mvpId,gDstGame);var mvpAgg=agg[mvpId];
  var mvpPct=mvpAgg.offTotal>0?Math.round(mvpAgg.pts/mvpAgg.offTotal*100):0;
  if(mvp){
    h+='<div style="background:linear-gradient(135deg,'+mvp.tc+'ee,'+mvp.tc+'aa);border-radius:18px;padding:20px;color:white;margin-bottom:18px;box-shadow:0 8px 24px '+mvp.tc+'40;position:relative;overflow:hidden">';
    h+='<div style="position:absolute;top:8px;right:14px;font-size:11px;font-weight:800;letter-spacing:2px;opacity:.85">\u{1F3C6} MAIOR PONTUADOR</div>';
    h+='<div style="display:flex;align-items:center;gap:18px;margin-top:18px">';
    h+='<div style="width:82px;height:82px;border-radius:18px;background:rgba(255,255,255,.95);color:'+mvp.tc+';display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:46px;font-weight:900;flex-shrink:0">'+mvp.nu+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-family:Bebas Neue,sans-serif;font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:4px">'+esc(mvp.nm)+'</div>';
    h+='<div style="font-size:12px;opacity:.9;margin-bottom:10px">'+esc(mvp.po)+' \u00b7 '+esc(mvp.tn)+'</div>';
    h+='<div style="display:flex;gap:14px"><div><div style="font-family:Bebas Neue,sans-serif;font-size:32px;line-height:1">'+mvpPts+'</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">PONTOS</div></div><div><div style="font-family:Bebas Neue,sans-serif;font-size:32px;line-height:1">'+mvpPct+'%</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">APROVEIT.</div></div></div>';
    h+='</div></div></div>';
  }
}
// Melhor por fundamento
var fundOrder=["saque","recepcao","levantamento","ataque","bloqueio","defesa"];
h+='<div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:var(--navy);margin:18px 0 10px">\u2B50 MELHOR POR FUNDAMENTO</div>';
h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px">';
for(var fi=0;fi<fundOrder.length;fi++){
  var fk=fundOrder[fi];
  var fc2=fcol[fk];
  var bestId=null,bestGood=0,bestN=0;
  for(var i=0;i<pids.length;i++){
    var pa=agg[pids[i]].byF[fk];
    if(!pa||pa.n<3)continue; // mínimo 3 ações
    if(pa.good>bestGood){bestGood=pa.good;bestN=pa.n;bestId=pids[i];}
  }
  h+='<div class="cd" style="padding:14px;border-left:5px solid '+fc2+';position:relative">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:20px">'+(ACT[fk]?ACT[fk].i:"")+'</span><span style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;color:'+fc2+'">'+(ACT[fk]?ACT[fk].l.toUpperCase():fk)+'</span></div>';
  if(bestId){
    var bp=pFind(bestId,gDstGame);
    if(bp){
      var pct=bestN>0?Math.round(bestGood/bestN*100):0;
      h+='<div style="display:flex;align-items:center;gap:10px"><div style="width:42px;height:42px;border-radius:10px;background:'+bp.tc+'18;color:'+bp.tc+';display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:22px;font-weight:900;flex-shrink:0">'+bp.nu+'</div><div style="flex:1;min-width:0;overflow:hidden"><div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(bp.nm)+'</div><div style="font-size:10px;color:var(--gray)">'+esc(bp.tn)+'</div></div></div>';
      h+='<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)"><div style="flex:1"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+fc2+';line-height:1">'+bestGood+'</div><div style="font-size:9px;color:var(--gray);letter-spacing:1px">QTD</div></div><div style="flex:1"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+fc2+';line-height:1">'+pct+'%</div><div style="font-size:9px;color:var(--gray);letter-spacing:1px">APROV.</div></div></div>';
    }
  }else{
    h+='<div style="font-size:12px;color:var(--gray);padding:14px 0;text-align:center;font-style:italic">Sem dados<br><span style="font-size:10px">(m\u00edn. 3 a\u00e7\u00f5es)</span></div>';
  }
  h+='</div>';
}
h+='</div>';
return h;
}

function rTor(){
  if(selTor){return rTorDetail(selTor);}
  // Fase A2: aba Torneios reformulada no tema escuro de transmissao. Cards
  // sao a porta de entrada do app pos-login. CSS namespaced em .rs-tor-*.
  var tournaments=getPublicTournaments();
  var h='<div class="rs-tor-page">';
  if(isCoord){
    h+='<div class="rs-tor-actions"><button class="rs-tor-newbtn" onclick="openTorEditor(null)">\u2795 Novo Torneio</button></div>';
  }
  if(!tournaments.length){
    h+='<div class="rs-tor-empty"><div class="rs-tor-empty-icon">\uD83C\uDFC6</div><div class="rs-tor-empty-title">Nenhum torneio cadastrado</div>'+(isCoord?'<div class="rs-tor-empty-sub">Clique em "Novo Torneio" para come\u00e7ar.</div>':'')+'</div></div>';
    return h;
  }
  // Separar por status. Fase C: encerrados (archived) viram grupo proprio,
  // independente de st \u2014 torneio so-leitura/historico.
  // Fase PG isolamento: torneios standalone (PG) so via deep-link \u2014 nao aparecem aqui.
  var live=[],done=[],pending=[],archived=[];
  for(var i=0;i<tournaments.length;i++){
    var t=tournaments[i];
    if(isArchivedTor(t)) archived.push(t);
    else if(t.st==="done") done.push(t);
    else if(t.st==="live") live.push(t);
    else pending.push(t);
  }
  function renderGroup(title,arr){
    if(!arr.length)return '';
    var hh='<div class="rs-tor-group"><div class="rs-tor-group-title">'+title+'</div>';
    hh+='<div class="rs-tor-grid">';
    for(var k=0;k<arr.length;k++){
      var t=arr[k];
      var nGames=0,nDone=0;
      if(D.games)for(var j=0;j<D.games.length;j++){
        if(D.games[j].torId===t.id){nGames++;if(D.games[j].st==="done")nDone++;}
      }
      var color=t.color||"#2563eb";
      var pct=t.tot?Math.min(100,Math.round(nDone/t.tot*100)):0;
      // Fase C: cards arquivados ganham classe is-archived (cinza) + selo.
      var archCls = isArchivedTor(t) ? ' is-archived' : '';
      hh+='<div class="rs-tor-card'+archCls+'" style="--tcol:'+color+'" onclick="selectTor(\''+t.id+'\')">';
      if(isArchivedTor(t)) hh+='<div class="rs-tor-archived-badge">\uD83D\uDCE6 ENCERRADO</div>';
      hh+='<div class="rs-tor-card-body">';
      hh+='<div class="rs-tor-card-head">';
      hh+='<div class="rs-tor-card-title">'+esc(t.n)+'</div>';
      if(t.title)hh+='<div class="rs-tor-card-trophy" title="'+esc(t.title)+'">\uD83C\uDFC6</div>';
      hh+='</div>';
      hh+='<div class="rs-tor-card-chips">';
      if(t.cat)hh+='<span class="rs-tor-card-chip rs-tor-card-chip--cat">'+esc(t.cat)+'</span>';
      if(t.season)hh+='<span class="rs-tor-card-chip rs-tor-card-chip--season">'+esc(t.season)+'</span>';
      hh+='</div>';
      if(t.title){hh+='<div class="rs-tor-card-medal" style="color:'+color+'">\uD83E\uDD47 '+esc(t.title)+'</div>';}
      hh+='<div class="rs-tor-progress-row"><span>Progresso</span><span><b>'+nDone+'</b> de '+(t.tot||nGames)+' jogos</span></div>';
      hh+='<div class="rs-tor-progress-track"><div class="rs-tor-progress-fill" style="width:'+pct+'%"></div></div>';
      hh+='</div></div>';
    }
    hh+='</div></div>';
    return hh;
  }
  h+=renderGroup("\u25CF Em andamento",live);
  h+=renderGroup("\u23F3 Programados",pending);
  h+=renderGroup("\u2713 Conclu\u00eddos",done);
  h+=renderGroup("\uD83D\uDCE6 Encerrados / Hist\u00F3rico",archived);
  h+='</div>';
  return h;
}

function rTorDetail(torId){
  var t=tFnd(torId);
  if(!t)return '<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Torneio n\u00e3o encontrado<br><button class="bt bg" style="margin-top:14px" onclick="selectTor(null)">\u2190 Voltar</button></div>';
  var color=t.color||"#2563eb";
  var games=[];
  if(D.games)for(var i=0;i<D.games.length;i++){if(D.games[i].torId===torId)games.push(D.games[i]);}
  games.sort(function(a,b){var da=(a.dt||"")+(a.tm||""),db=(b.dt||"")+(b.tm||"");return da<db?-1:da>db?1:0;});
  var nW=0,nL=0;
  for(var i=0;i<games.length;i++){
    var r=games[i].result;if(!r)continue;
    if(r.type==="win"||r.type==="wo_win")nW++;
    else if(r.type==="loss"||r.type==="wo_loss")nL++;
  }
  // Fase A2: detalhe escopado em .rs-tor-detail pra receber overrides de tema.
  // Fase C: classe is-archived aplica visual de historico no detalhe.
  var torArchived = isArchivedTor(t);
  h='<div class="rs-tor-detail'+(torArchived?' is-archived':'')+'">';
  h+='<div style="margin-bottom:14px"><button class="bt bg" onclick="selectTor(null)">\u2190 Torneios</button></div>';
  h+='<div style="background:linear-gradient(135deg,'+color+'ee,'+color+'aa);border-radius:18px;padding:22px;color:white;margin-bottom:16px;box-shadow:0 8px 24px '+color+'40;position:relative">';
  // Fase C: selo ENCERRADO no canto sup. direito do banner quando torneio arquivado
  if(torArchived) h+='<div class="rs-tor-detail-archived-badge">\uD83D\uDCE6 ENCERRADO \u00b7 S\u00D3 LEITURA</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">';
  h+='<div style="flex:1"><div style="font-size:11px;letter-spacing:2px;font-weight:800;opacity:.85;margin-bottom:4px">TORNEIO</div>';
  h+='<div style="font-family:Bebas Neue,sans-serif;font-size:30px;letter-spacing:1px;line-height:1">'+esc(t.n)+'</div>';
  h+='<div style="font-size:13px;opacity:.9;margin-top:4px">'+esc(t.cat||"")+(t.season?" \u00b7 "+esc(t.season):"")+'</div></div>';
  // Fase C: botoes admin no banner \u2014 Editar torneio + toggle Encerrar/Reativar
  if(isCoord||isAdmin){
    h+='<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">';
    h+='<button class="bt bsm" style="background:rgba(255,255,255,.18);border:none;color:#fff" onclick="openTorEditor(\''+t.id+'\')">\u270F\uFE0F Editar</button>';
    if(torArchived){
      h+='<button class="bt bsm" style="background:rgba(22,163,74,.35);border:none;color:#fff" onclick="toggleTorneioArchived(\''+t.id+'\')">\u21BA Reativar</button>';
    }else{
      h+='<button class="bt bsm" style="background:rgba(100,116,139,.45);border:none;color:#fff" onclick="toggleTorneioArchived(\''+t.id+'\')">\uD83D\uDCE6 Encerrar</button>';
    }
    h+='</div>';
  }
  h+='</div>';
  if(t.title)h+='<div style="background:rgba(255,255,255,.2);padding:10px 14px;border-radius:10px;margin-top:14px;display:flex;align-items:center;gap:10px"><span style="font-size:24px">\uD83C\uDFC6</span><span style="font-weight:700;letter-spacing:1px">'+esc(t.title)+'</span></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px">';
  h+='<div style="background:rgba(255,255,255,.18);padding:10px;border-radius:10px;text-align:center"><div style="font-family:Bebas Neue,sans-serif;font-size:26px;line-height:1">'+nW+'</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">VIT\u00d3RIAS</div></div>';
  h+='<div style="background:rgba(255,255,255,.18);padding:10px;border-radius:10px;text-align:center"><div style="font-family:Bebas Neue,sans-serif;font-size:26px;line-height:1">'+nL+'</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">DERROTAS</div></div>';
  h+='<div style="background:rgba(255,255,255,.18);padding:10px;border-radius:10px;text-align:center"><div style="font-family:Bebas Neue,sans-serif;font-size:26px;line-height:1">'+games.length+'</div><div style="font-size:10px;letter-spacing:1px;opacity:.85">JOGOS</div></div>';
  h+='</div></div>';

  // Fase B1.1: torneios com layout 'gameday' (USA + futuros) ja abrem em
  // estilo GAME DAY direto na aba \u2014 reusa renderGameDayCard. Botoes de admin
  // (criar/editar/excluir) voltam em Fase B2 ligados ao login geral.
  if(tnyLayout(t)==='gameday'){
    var gdGames=games.slice().sort(function(a,b){
      var da=(a.dt||"")+(a.tm||"");var db=(b.dt||"")+(b.tm||"");
      return db.localeCompare(da);
    });
    var gdNextId=null;
    (function(){
      var nowKey=(function(){var d=new Date(),z=function(n){return(n<10?"0":"")+n;};return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())+z(d.getHours())+":"+z(d.getMinutes());})();
      var pend=[];
      for(var i=0;i<gdGames.length;i++){var g=gdGames[i];if(g.st==="live"||g.st==="done")continue;pend.push({id:g.id,key:(g.dt||"")+(g.tm||"")});}
      pend.sort(function(a,b){return a.key.localeCompare(b.key);});
      for(var j=0;j<pend.length;j++){if(pend[j].key>=nowKey){gdNextId=pend[j].id;break;}}
      if(!gdNextId&&pend.length)gdNextId=pend[pend.length-1].id;
    })();
    // Fase B2.2: botao Novo Jogo no topo do gameday \u2014 visivel pra admin/coord.
    // Fase C: oculto quando torneio arquivado (so-leitura).
    if((isCoord||isAdmin) && !torArchived){
      h+='<div style="display:flex;justify-content:flex-end;margin-bottom:14px;position:relative;z-index:1"><button class="tnj-btn" onclick="openTorneioNovoJogo()">\u2795 Novo Jogo</button></div>';
    }
    if(!gdGames.length){
      h+='<div style="padding:40px 20px;text-align:center;color:var(--rs-fg-mute);position:relative;z-index:1"><div style="font-size:38px;margin-bottom:10px">\ud83c\udfd0</div>Nenhum jogo cadastrado neste torneio.</div>';
    }else{
      h+='<div class="usa-cards" style="padding:0;max-width:none">';
      for(var gi=0;gi<gdGames.length;gi++){h+=renderGameDayCard(gdGames[gi],gdGames[gi].id===gdNextId);}
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

  // Fase C: tambem oculta o botao "Novo Jogo neste Torneio" no fluxo default quando arquivado.
  if((isCoord||isAdmin) && !torArchived){h+='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="bt bp bsm" onclick="openGameEditor(null,\''+t.id+'\')">\u2795 Novo Jogo neste Torneio</button></div>';}
  if(!games.length){
    h+='<div class="cd" style="padding:30px;text-align:center;color:var(--gray)">Nenhum jogo cadastrado neste torneio.</div>';
    h+='</div>';
    return h;
  }
  // Toggle de visualização (default: por equipe)
  if(typeof gTorView==="undefined")gTorView="team";
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;background:var(--card2);padding:4px;border-radius:10px">';
  h+='<button class="bt '+(gTorView==="team"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gTorView=\'team\';render()">\uD83C\uDFC6 Por Equipe</button>';
  h+='<button class="bt '+(gTorView==="chrono"?"bp":"bg")+' bsm" style="flex:1;justify-content:center" onclick="gTorView=\'chrono\';render()">\uD83D\uDDD3\uFE0F Cronol\u00f3gico</button>';
  h+='</div>';
  if(gTorView==="team"){
    h+=renderTeamHub(games,{showHistory:true});
  }else{
    h+='<div class="rs-tor-detail-title">JOGOS</div>';
    for(var i=0;i<games.length;i++){h+=renderGameCard(games[i],color);}
  }
  h+='</div>';
  return h;
}

// Retorna um label curto e descritivo da equipe (pra chips em cards)
function teamShortLabel(tid){
  var t=tF(tid);if(!t)return "";
  // Prefere abreviar nomes longos. Se o nome tem "MASCULINO", "FEMININO", abreviar.
  var n=t.n||"";
  // Padrões comuns no projeto
  if(/MASCULINO/i.test(n))return "RS Masc";
  if(/FEMININO/i.test(n)){
    // Tentar pegar a categoria depois de FEMININO (ex: "RS FEMININO E1" -> "RS Fem E1")
    var m=n.match(/FEMININO\s+(\S+)/i);
    if(m)return "RS Fem "+m[1];
    return "RS Fem";
  }
  // Fallback: primeiras 14 chars
  return n.length>16?n.substring(0,14)+"\u2026":n;
}

// === HUB POR EQUIPE: agrupa lista de jogos em cards de equipe ===
// Usado em Scout (visitante), Agenda e Torneios para uma visualização mais bonita
// e organizada (cards por equipe contendo jogos como sub-cards)
// opts: { showHistory:true, emptyMessage:"...", torColor:"..." (override) }
function renderTeamHub(games, opts){
  opts = opts || {};
  if(!games || !games.length){
    return '<div class="cd" style="padding:40px 24px;text-align:center;color:var(--gray)">'+
      '<div style="font-size:42px;margin-bottom:10px">\u{1F3D0}</div>'+
      '<div style="font-size:14px;font-weight:600">'+(opts.emptyMessage||"Nenhum jogo dispon\u00edvel")+'</div>'+
      '</div>';
  }
  // Agrupar por team id
  var byTeam = {};
  var teamOrder = [];
  for(var i=0;i<games.length;i++){
    var g = games[i];
    var tid = g.tid || "_sem_equipe_";
    if(!byTeam[tid]){
      byTeam[tid] = {team: tF(tid), games: [], upcoming: [], past: [], live: []};
      teamOrder.push(tid);
    }
    byTeam[tid].games.push(g);
  }
  // Classificar dentro de cada equipe
  var hoje = new Date();hoje.setHours(0,0,0,0);
  for(var t=0;t<teamOrder.length;t++){
    var grp = byTeam[teamOrder[t]];
    for(var k=0;k<grp.games.length;k++){
      var gg = grp.games[k];
      if(gg.st==="live"){grp.live.push(gg);continue;}
      var jaJogou = false;
      if(gg.st==="done") jaJogou = true;
      else if(gg.dt){
        var d = new Date(gg.dt+"T12:00:00");
        if(d < hoje) jaJogou = true;
      }
      if(jaJogou) grp.past.push(gg);
      else grp.upcoming.push(gg);
    }
    // Ordenar
    grp.upcoming.sort(function(a,b){
      if(!a.dt&&!b.dt)return 0;if(!a.dt)return 1;if(!b.dt)return -1;
      var da=new Date(a.dt+"T"+(a.tm||"23:59")),db=new Date(b.dt+"T"+(b.tm||"23:59"));
      return da-db;
    });
    grp.past.sort(function(a,b){
      if(!a.dt&&!b.dt)return 0;if(!a.dt)return 1;if(!b.dt)return -1;
      var da=new Date(a.dt+"T"+(a.tm||"23:59")),db=new Date(b.dt+"T"+(b.tm||"23:59"));
      return db-da; // mais recente primeiro
    });
  }
  
  // Ordenar equipes: primeiro com jogo ao vivo, depois por próximo jogo mais cedo
  teamOrder.sort(function(a,b){
    var ga=byTeam[a],gb=byTeam[b];
    if(ga.live.length&&!gb.live.length)return -1;
    if(!ga.live.length&&gb.live.length)return 1;
    var nextA=ga.upcoming[0],nextB=gb.upcoming[0];
    if(nextA&&!nextB)return -1;
    if(!nextA&&nextB)return 1;
    if(nextA&&nextB){
      var da=new Date((nextA.dt||"9999-12-31")+"T"+(nextA.tm||"23:59"));
      var db=new Date((nextB.dt||"9999-12-31")+"T"+(nextB.tm||"23:59"));
      return da-db;
    }
    return 0;
  });
  
  var h = '';
  for(var t=0;t<teamOrder.length;t++){
    var grp = byTeam[teamOrder[t]];
    var team = grp.team;
    if(!team) continue;
    var tc = team.c || "#64748b";
    var hasLive = grp.live.length > 0;
    
    // Card da equipe
    h+='<div class="th-card" style="border-color:'+tc+'30">';
    
    // Header da equipe
    h+='<div class="th-header" style="background:linear-gradient(135deg,'+tc+'14,'+tc+'05)" onclick="toggleTeamHub(\''+team.id+'\')">';
    h+='<div class="th-logo-wrap" style="background:'+tc+'20;border-color:'+tc+'40">';
    h+=tLs(team);
    h+='</div>';
    h+='<div class="th-info">';
    h+='<div class="th-name" style="color:'+tc+'">'+esc(team.n)+'</div>';
    h+='<div class="th-meta">';
    if(hasLive)h+='<span class="th-chip th-chip-live">\u25CF AO VIVO</span>';
    if(grp.upcoming.length)h+='<span class="th-chip th-chip-up" style="background:'+tc+'15;color:'+tc+'">'+grp.upcoming.length+' pr\u00f3ximo'+(grp.upcoming.length===1?"":"s")+'</span>';
    if(grp.past.length)h+='<span class="th-chip th-chip-past">'+grp.past.length+' jogado'+(grp.past.length===1?"":"s")+'</span>';
    h+='</div>';
    h+='</div>';
    h+='<div class="th-toggle">\u25BC</div>';
    h+='</div>';
    
    // Body (jogos)
    h+='<div class="th-body" id="th-body-'+team.id+'">';
    
    // AO VIVO (se tiver)
    if(grp.live.length){
      h+='<div class="th-section">';
      h+='<div class="th-section-title" style="color:#d97706"><span style="animation:livePulse 1.5s infinite">\u25CF</span> AO VIVO</div>';
      for(var i=0;i<grp.live.length;i++){
        h+=renderTeamHubGameCard(grp.live[i],tc,"live");
      }
      h+='</div>';
    }
    
    // PRÓXIMOS (em destaque)
    if(grp.upcoming.length){
      h+='<div class="th-section">';
      h+='<div class="th-section-title" style="color:'+tc+'">\uD83D\uDCC5 PR\u00d3XIMOS JOGOS</div>';
      for(var i=0;i<grp.upcoming.length;i++){
        h+=renderTeamHubGameCard(grp.upcoming[i],tc,"upcoming");
      }
      h+='</div>';
    }
    
    // HISTÓRICO (separado, mais discreto)
    if(grp.past.length && opts.showHistory !== false){
      h+='<div class="th-section th-section-past">';
      h+='<div class="th-section-title th-section-title-past">\uD83D\uDCDC HIST\u00d3RICO</div>';
      for(var i=0;i<grp.past.length;i++){
        h+=renderTeamHubGameCard(grp.past[i],tc,"past");
      }
      h+='</div>';
    }
    
    // Estado vazio dentro do card
    if(!grp.live.length && !grp.upcoming.length && (!grp.past.length || opts.showHistory===false)){
      h+='<div style="padding:20px;text-align:center;color:var(--gray);font-size:13px">Sem jogos para mostrar</div>';
    }
    
    h+='</div>';
    h+='</div>';
  }
  return h;
}

// Card compacto de jogo dentro do TeamHub (visual diferente do renderGameCard padrão)
function renderTeamHubGameCard(g, tc, kind){
  var dt = g.dt ? fD(g.dt) : "A definir";
  var tm = g.tm ? g.tm.substring(0,5) : "";
  var clickable = isCoord ? 'cursor:pointer' : '';
  var clickHandler = isCoord ? ' onclick="openGameEditor(\''+g.id+'\')"' : '';
  
  // Detectar passado sem dados (tarja)
  var isPastWithoutData=false;
  if(kind==="past"){
    var nActions=(g.act&&g.act.length)||0;
    var r=g.result||{};
    if(nActions===0 && !r.type) isPastWithoutData=true;
  }
  
  var r = g.result || {};
  var resultBadge = "";
  if(kind==="past"){
    if(r.type==="win"){resultBadge='<span class="thg-result" style="background:#05966915;color:#059669">V '+(r.sets||"")+'</span>';}
    else if(r.type==="loss"){resultBadge='<span class="thg-result" style="background:#dc262615;color:#dc2626">D '+(r.sets||"")+'</span>';}
    else if(r.type==="wo_win"){resultBadge='<span class="thg-result" style="background:#10b98115;color:#10b981">WO V</span>';}
    else if(r.type==="wo_loss"){resultBadge='<span class="thg-result" style="background:#f59e0b15;color:#f59e0b">WO D</span>';}
    else if(g.ss && g.ss.length){
      var sc=[];for(var si=0;si<g.ss.length;si++)sc.push(g.ss[si].u+"-"+g.ss[si].t);
      resultBadge='<span class="thg-result" style="background:var(--card2);color:var(--gray)">'+sc.join(" ")+'</span>';
    }
  }
  
  var h='<div class="thg '+(isPastWithoutData?'thg-no-data':'')+'" style="'+clickable+'"'+clickHandler+'>';
  h+='<div class="thg-date" style="border-color:'+tc+'40;color:'+tc+'">';
  if(g.dt){
    var parts=g.dt.split("-");
    h+='<div class="thg-day">'+parts[2]+'</div>';
    h+='<div class="thg-month">'+["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"][parseInt(parts[1])-1]+'</div>';
  }else{
    h+='<div class="thg-day" style="font-size:11px">A def.</div>';
  }
  h+='</div>';
  h+='<div class="thg-info">';
  h+='<div class="thg-opp">vs <b>'+esc(g.opp||"-")+'</b></div>';
  var meta=[];
  if(tm)meta.push("\uD83D\uDD52 "+tm);
  if(g.loc)meta.push("\uD83D\uDCCD "+esc(g.loc));
  if(g.phase)meta.push(esc(g.phase));
  if(meta.length)h+='<div class="thg-meta">'+meta.join(" \u00b7 ")+'</div>';
  h+='</div>';
  if(resultBadge)h+=resultBadge;
  // Tarja sem dados
  if(isPastWithoutData){
    h+='<div class="game-tarja"><span class="game-tarja-text">SEM DADOS</span></div>';
  }
  h+='</div>';
  return h;
}

function toggleTeamHub(tid){
  var b=document.getElementById("th-body-"+tid);

  b.classList.toggle("th-collapsed");
  // Atualizar setinha
  var card=b.parentElement;
  var toggle=card.querySelector(".th-toggle");
  if(toggle){
    toggle.textContent=b.classList.contains("th-collapsed")?"\u25B6":"\u25BC";
  }
}

function renderGameCard(g,torColor){
  var color=torColor||"#64748b";
  var r=g.result||{};
  var borderColor=color;
  var resultLabel='';
  if(r.type==="win"){borderColor="#059669";resultLabel='<span style="background:#059669;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:13px">'+(r.sets||"V")+'</span>';}
  else if(r.type==="loss"){borderColor="#dc2626";resultLabel='<span style="background:#dc2626;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:13px">'+(r.sets||"D")+'</span>';}
  else if(r.type==="wo_win"){borderColor="#10b981";resultLabel='<span style="background:#10b981;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:11px">WO V</span>';}
  else if(r.type==="wo_loss"){borderColor="#f59e0b";resultLabel='<span style="background:#f59e0b;color:#fff;padding:3px 10px;border-radius:6px;font-weight:800;font-size:11px">WO D</span>';}
  else{resultLabel='<span style="background:var(--card2);color:var(--gray);padding:3px 10px;border-radius:6px;font-weight:700;font-size:11px">A jogar</span>';}
  var dt=g.dt?fD(g.dt):"S/data";
  var tm=g.tm?g.tm.substring(0,5):"";
  var phase=g.phase||"";
  var team=tF(g.tid);
  var teamColor=team?team.c:"#64748b";
  var teamLabel=teamShortLabel(g.tid);
  var clickable=isCoord?'cursor:pointer':'';
  var clickHandler=isCoord?' onclick="openGameEditor(\''+g.id+'\')"':'';
  
  // Fase B2.1: tarja unificada (CANCELADO / SEM DADOS) via gameAutoTarja.
  // Manual (admin via g.status_tag) prevalece sobre auto (passado sem dados).
  var tarja = (typeof gameAutoTarja==='function') ? gameAutoTarja(g) : null;
  var cardTarjaCls = tarja==='cancelled' ? 'game-cancelled' : (tarja==='no_data' ? 'game-no-data' : '');

  var h='<div class="cd '+cardTarjaCls+'" style="padding:0;margin-bottom:8px;border-left:4px solid '+borderColor+';overflow:hidden;position:relative;'+clickable+'"'+clickHandler+'>';
  h+='<div style="padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
  h+='<div style="text-align:center;min-width:50px"><div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:var(--navy);line-height:1">'+dt.substring(0,5)+'</div><div style="font-size:11px;color:var(--gray);margin-top:2px">'+tm+'</div></div>';
  h+='<div style="flex:1;min-width:140px">';
  h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:14px;font-weight:700;line-height:1.2">vs '+esc(g.opp||"")+'</span>';
  if(teamLabel)h+='<span style="background:'+teamColor+'15;color:'+teamColor+';padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.3px;white-space:nowrap">'+esc(teamLabel)+'</span>';
  h+='</div>';
  var meta=[];
  if(phase)meta.push(esc(phase));
  if(g.cat)meta.push(esc(g.cat));
  if(g.loc)meta.push("\uD83D\uDCCD "+esc(g.loc));
  if(meta.length)h+='<div style="font-size:11px;color:var(--gray);margin-top:3px">'+meta.join(" \u00b7 ")+'</div>';
  h+='</div>';
  h+='<div>'+resultLabel+'</div>';
  h+='</div>';
  // Tarja (CANCELADO / SEM DADOS) — manual prevalece sobre auto via gameAutoTarja
  if(tarja){
    var tarjaTxt = tarja==='cancelled' ? 'CANCELADO' : 'SEM DADOS';
    var tarjaMod = tarja==='cancelled' ? ' is-cancelled' : '';
    h+='<div class="game-tarja"><span class="game-tarja-text'+tarjaMod+'">'+tarjaTxt+'</span></div>';
  }
  h+='</div>';
  return h;
}
