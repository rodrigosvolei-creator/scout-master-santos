<script>

// Landing particles
(function(){var cv=document.getElementById("landCanvas");if(!cv)return;var cx=cv.getContext("2d");function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rs();window.addEventListener("resize",rs);var pts=[];for(var i=0;i<40;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()*.15+.05});function draw(){cx.clearRect(0,0,cv.width,cv.height);for(var i=0;i<pts.length;i++){var p=pts[i];cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle="rgba(59,130,246,"+p.a+")";cx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>cv.width)p.dx*=-1;if(p.y<0||p.y>cv.height)p.dy*=-1;}requestAnimationFrame(draw);}draw();})();

function showAuth(){
document.getElementById("landingPage").style.display="none";
document.getElementById("authPage").style.display="flex";
setTimeout(function(){document.getElementById("authPwd").focus();},300);
}

function toggleAuthEye(){
var inp=document.getElementById("authPwd");
inp.type=inp.type==="password"?"text":"password";
document.getElementById("authEye").textContent=inp.type==="password"?"\u{1F441}":"\u{1F512}";
}

function hashPwd(p){var enc=new TextEncoder().encode(p);return crypto.subtle.digest("SHA-256",enc).then(function(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("")});}
function doAuth(){
var inp=document.getElementById("authPwd");
if(!inp||!inp.value)return;
hashPwd(inp.value).then(function(h){
if(h==="b21f65f19ec266a82965228ca3ea5b5765687dfda53e080e82ccf3fca988290f"){
document.getElementById("authPage").style.display="none";
document.getElementById("mainApp").style.display="block";
isAdmin=true;
appStarted=true;
tab="scout";
render();
}else{
var err=document.getElementById("authErr");
err.style.display="block";
inp.value="";
inp.focus();
setTimeout(function(){err.style.display="none";},3000);
}
});
}

</script>

// Retorna jogos finalizados/ao vivo, filtrados opcionalmente por equipe
function getFinGames(teamId){
  var out=[];if(!D||!D.games)return out;
  for(var i=0;i<D.games.length;i++){
    var g=D.games[i];
    if(!g.act||!g.act.length)continue;
    if(g.st!=="live"&&g.st!=="done")continue;
    if(teamId&&teamId!=="all"&&g.tid!==teamId)continue;
    out.push(g);
  }
  return out;
}
// Coleta ações de um conjunto de jogos, opcionalmente filtrado por jogo específico
function collectActs(games,gameId){
  var acts=[];
  if(gameId&&gameId!=="all"){
    var g=gF(gameId);
    if(g&&g.act)acts=g.act.slice();
  }else{
    for(var i=0;i<games.length;i++){if(games[i].act)acts=acts.concat(games[i].act);}
  }
  return acts;
}

  m+='</div></div>';
  var d=document.createElement("div");d.id="rsConfirm";d.innerHTML=m;document.body.appendChild(d);
  document.getElementById("rsConfirmOk").onclick=function(){
    closeConfirmModal();

  };

}

function addP(tid){
